syntax = "proto3";

package mockgcp.cloud.gkehub.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/GoogleCloudPlatform/k8s-config-connector/mockgcp/generated/mockgcp/cloud/gkehub/v1beta;gkehubpb";
option java_multiple_files = true;
option java_outer_classname = "ScopeProto";
option java_package = "com.mockgcp.cloud.gkehub.v1beta";

service GkeHubScopes {
  option (google.api.default_host) = "gkehub.googleapis.com";
  option (google.api.oauth_scopes) = "https://www.googleapis.com/auth/cloud-platform";

  rpc GetScope(GetScopeRequest) returns (Scope) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/scopes/*}"
    };
  }

  rpc CreateScope(CreateScopeRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*}/scopes"
      body: "resource"
    };
    option (google.longrunning.operation_info) = {
      response_type: "Scope"
      metadata_type: "OperationMetadata"
    };
  }

  rpc DeleteScope(DeleteScopeRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      delete: "/v1beta/{name=projects/*/locations/*/scopes/*}"
    };
    option (google.longrunning.operation_info) = {
      response_type: "google.protobuf.Empty"
      metadata_type: "OperationMetadata"
    };
  }

  rpc PatchScope(UpdateScopeRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1beta/{name=projects/*/locations/*/scopes/*}"
      body: "resource"
    };
    option (google.longrunning.operation_info) = {
      response_type: "Scope"
      metadata_type: "OperationMetadata"
    };
  }

  rpc GetMembershipBinding(GetMembershipBindingRequest) returns (MembershipBinding) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/memberships/*/bindings/*}"
    };
  }

  rpc CreateMembershipBinding(CreateMembershipBindingRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/memberships/*}/bindings"
      body: "resource"
    };
    option (google.longrunning.operation_info) = {
      response_type: "MembershipBinding"
      metadata_type: "OperationMetadata"
    };
  }

  rpc DeleteMembershipBinding(DeleteMembershipBindingRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      delete: "/v1beta/{name=projects/*/locations/*/memberships/*/bindings/*}"
    };
    option (google.longrunning.operation_info) = {
      response_type: "google.protobuf.Empty"
      metadata_type: "OperationMetadata"
    };
  }

  rpc PatchMembershipBinding(UpdateMembershipBindingRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1beta/{name=projects/*/locations/*/memberships/*/bindings/*}"
      body: "resource"
    };
    option (google.longrunning.operation_info) = {
      response_type: "MembershipBinding"
      metadata_type: "OperationMetadata"
    };
  }

  rpc GetScopeRBACRoleBinding(GetScopeRBACRoleBindingRequest) returns (RBACRoleBinding) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/scopes/*/rbacrolebindings/*}"
    };
  }

  rpc CreateScopeRBACRoleBinding(CreateScopeRBACRoleBindingRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/scopes/*}/rbacrolebindings"
      body: "resource"
    };
    option (google.longrunning.operation_info) = {
      response_type: "RBACRoleBinding"
      metadata_type: "OperationMetadata"
    };
  }

  rpc DeleteScopeRBACRoleBinding(DeleteScopeRBACRoleBindingRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      delete: "/v1beta/{name=projects/*/locations/*/scopes/*/rbacrolebindings/*}"
    };
    option (google.longrunning.operation_info) = {
      response_type: "google.protobuf.Empty"
      metadata_type: "OperationMetadata"
    };
  }

  rpc PatchScopeRBACRoleBinding(UpdateScopeRBACRoleBindingRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1beta/{name=projects/*/locations/*/scopes/*/rbacrolebindings/*}"
      body: "resource"
    };
    option (google.longrunning.operation_info) = {
      response_type: "RBACRoleBinding"
      metadata_type: "OperationMetadata"
    };
  }
}

message Scope {
  string name = 1;
  map<string, string> labels = 2;
  string uid = 3;
  google.protobuf.Timestamp create_time = 4;
  google.protobuf.Timestamp update_time = 5;
  google.protobuf.Timestamp delete_time = 6;
  ScopeState state = 7;
}

message ScopeState {
  enum Code {
    CODE_UNSPECIFIED = 0;
    CREATING = 1;
    READY = 2;
    DELETING = 3;
    UPDATING = 4;
  }
  Code code = 1;
}

message GetScopeRequest {
  string name = 1;
}

message CreateScopeRequest {
  string parent = 1;
  string scope_id = 2;
  Scope resource = 3;
}

message DeleteScopeRequest {
  string name = 1;
}

message UpdateScopeRequest {
  string name = 1;
  google.protobuf.FieldMask update_mask = 2;
  Scope resource = 3;
}

message MembershipBinding {
  string name = 1;
  string scope = 2;
  map<string, string> labels = 3;
  string uid = 4;
  google.protobuf.Timestamp create_time = 5;
  google.protobuf.Timestamp update_time = 6;
  google.protobuf.Timestamp delete_time = 7;
  MembershipBindingState state = 8;
}

message MembershipBindingState {
  enum Code {
    CODE_UNSPECIFIED = 0;
    CREATING = 1;
    READY = 2;
    DELETING = 3;
    UPDATING = 4;
  }
  Code code = 1;
}

message GetMembershipBindingRequest {
  string name = 1;
}

message CreateMembershipBindingRequest {
  string parent = 1;
  string membership_binding_id = 2;
  MembershipBinding resource = 3;
}

message DeleteMembershipBindingRequest {
  string name = 1;
}

message UpdateMembershipBindingRequest {
  string name = 1;
  google.protobuf.FieldMask update_mask = 2;
  MembershipBinding resource = 3;
}

message RBACRoleBinding {
  string name = 1;
  string group = 2;
  string user = 3;
  Role role = 4;
  map<string, string> labels = 5;
  string uid = 6;
  google.protobuf.Timestamp create_time = 7;
  google.protobuf.Timestamp update_time = 8;
  google.protobuf.Timestamp delete_time = 9;
  RBACRoleBindingState state = 10;
}

message Role {
  string predefined_role = 1;
}

message RBACRoleBindingState {
  enum Code {
    CODE_UNSPECIFIED = 0;
    CREATING = 1;
    READY = 2;
    DELETING = 3;
    UPDATING = 4;
  }
  Code code = 1;
}

message GetScopeRBACRoleBindingRequest {
  string name = 1;
}

message CreateScopeRBACRoleBindingRequest {
  string parent = 1;
  string rbacrolebinding_id = 2;
  RBACRoleBinding resource = 3;
}

message DeleteScopeRBACRoleBindingRequest {
  string name = 1;
}

message UpdateScopeRBACRoleBindingRequest {
  string name = 1;
  google.protobuf.FieldMask update_mask = 2;
  RBACRoleBinding resource = 3;
}
