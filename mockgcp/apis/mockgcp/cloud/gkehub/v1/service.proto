    option (google.api.http) = {
      patch: "/v1/{name=projects/*/locations/*/fleets/*}"
      body: "projects_locations_fleet"
    };
  };
}

service ProjectsLocationsMembershipsServer {

  // Creates a new Membership. **This is currently only supported for GKE clusters on Google Cloud**. To register other clusters, follow the instructions at https://cloud.google.com/anthos/multicluster-management/connect/registering-a-cluster.
  rpc CreateProjectsLocationsMembership(CreateProjectsLocationsMembershipRequest) returns (.google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{parent=projects/*/locations/*}/memberships"
      body: "projects_locations_membership"
    };
  };

  // Removes a Membership. **This is currently only supported for GKE clusters on Google Cloud**. To unregister other clusters, follow the instructions at https://cloud.google.com/anthos/multicluster-management/connect/unregistering-a-cluster.
