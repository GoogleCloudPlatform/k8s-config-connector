syntax = "proto3";
package mockgcp.cloud.gkehub.v1;
import "google/api/annotations.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
option go_package = "cloud.google.com/go/gkehub/apiv1/gkehubpb;gkehubpb";

service OrganizationsServer {
}

service OrganizationsLocationsServer {
}

service OrganizationsLocationsFleetsServer {

  // Returns all fleets within an organization or a project that the caller has access to.
  rpc ListOrganizationsLocationsFleets(ListOrganizationsLocationsFleetsRequest) returns (ListFleetsResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=organizations/*/locations/*}/fleets"
    };
  };
}

service ProjectsServer {
}

service ProjectsLocationsServer {

  // Gets information about a location.
  rpc GetProjectsLocation(GetProjectsLocationRequest) returns (Location) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*}"
    };
  };

  // Lists information about the supported locations for this service. This method can be called in two ways: * **List all public locations:** Use the path `GET /v1/locations`. * **List project-visible locations:** Use the path `GET /v1/projects/{project_id}/locations`. This may include public locations as well as private or other locations specifically visible to the project.
  rpc ListProjectsLocations(ListProjectsLocationsRequest) returns (ListLocationsResponse) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*}/locations"
    };
  };
}

service ProjectsLocationsFeaturesServer {

  // Adds a new Feature.
  rpc CreateProjectsLocationsFeature(CreateProjectsLocationsFeatureRequest) returns (.google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{parent=projects/*/locations/*}/features"
      body: "projects_locations_feature"
    };
  };

  // Removes a Feature.
  rpc DeleteProjectsLocationsFeature(DeleteProjectsLocationsFeatureRequest) returns (.google.longrunning.Operation) {
    option (google.api.http) = {
      delete: "/v1/{name=projects/*/locations/*/features/*}"
    };
  };

  // Gets details of a single Feature.
  rpc GetProjectsLocationsFeature(GetProjectsLocationsFeatureRequest) returns (Feature) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/features/*}"
    };
  };

  // Lists Features in a given project and location.
  rpc ListProjectsLocationsFeatures(ListProjectsLocationsFeaturesRequest) returns (ListFeaturesResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*}/features"
    };
  };

  // Updates an existing Feature.
  rpc PatchProjectsLocationsFeature(PatchProjectsLocationsFeatureRequest) returns (.google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1/{name=projects/*/locations/*/features/*}"
      body: "projects_locations_feature"
    };
  };
}

service ProjectsLocationsFleetsServer {

  // Creates a fleet.
  rpc CreateProjectsLocationsFleet(CreateProjectsLocationsFleetRequest) returns (.google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{parent=projects/*/locations/*}/fleets"
      body: "projects_locations_fleet"
    };
  };

  // Removes a Fleet. There must be no memberships remaining in the Fleet.
  rpc DeleteProjectsLocationsFleet(DeleteProjectsLocationsFleetRequest) returns (.google.longrunning.Operation) {
    option (google.api.http) = {
      delete: "/v1/{name=projects/*/locations/*/fleets/*}"
