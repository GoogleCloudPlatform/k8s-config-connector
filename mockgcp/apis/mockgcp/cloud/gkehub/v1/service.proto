  // Gets the details of a Membership.
  rpc GetProjectsLocationsMembership(GetProjectsLocationsMembershipRequest) returns (Membership) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/memberships/*}"
    };
  };

  // Lists Memberships in a given project and location.
  rpc ListProjectsLocationsMemberships(ListProjectsLocationsMembershipsRequest) returns (ListMembershipsResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*}/memberships"
    };
  };

  // Updates an existing Membership.
  rpc PatchProjectsLocationsMembership(PatchProjectsLocationsMembershipRequest) returns (.google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1/{name=projects/*/locations/*/memberships/*}"
      body: "projects_locations_membership"
    };
  };
}

