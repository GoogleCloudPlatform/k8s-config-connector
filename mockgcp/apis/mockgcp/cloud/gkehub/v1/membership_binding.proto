    // The resource is being deleted.
    DELETING = 3;

    // The resource is being updated.
    UPDATING = 4;
  }

  // Output only. The current state of the MembershipBinding resource.
  Code code = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
}

