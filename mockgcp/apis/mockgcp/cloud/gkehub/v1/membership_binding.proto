  // The resource name for the membershipbinding itself
  // `projects/{project}/locations/{location}/memberships/{membership}/bindings/{membershipbinding}`
  string name = 1;

  // A Scope resource name in the format
  // `projects/*/locations/*/scopes/*`.
  string scope = 2;

  // Output only. State of the membership binding resource.
  MembershipBindingLifecycleState state = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. When the membership binding was created.
  google.protobuf.Timestamp create_time = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. When the membership binding was last updated.
  google.protobuf.Timestamp update_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. When the membership binding was deleted.
  google.protobuf.Timestamp delete_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Google-generated UUID for this resource.
  string uid = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Labels for this MembershipBinding.
  map<string, string> labels = 8 [(google.api.field_behavior) = OPTIONAL];
}

// MembershipBindingLifecycleState describes the state of a MembershipBinding resource.
message MembershipBindingLifecycleState {
  // Code describes the state of a MembershipBinding resource.
  enum Code {
    // The code is not set.
    CODE_UNSPECIFIED = 0;

    // The resource is being created.
    CREATING = 1;

    // The resource is ready.
