syntax = "proto3";

package mockgcp.cloud.gkehub.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/GoogleCloudPlatform/k8s-config-connector/mockgcp/generated/mockgcp/cloud/gkehub/v1;gkehubpb";

// Scope represents a GKE Hub Scope resource.
message Scope {
  option (google.api.resource) = {
    type: "gkehub.googleapis.com/Scope"
    pattern: "projects/{project}/locations/{location}/scopes/{scope}"
  };

  // Output only. The full, unique resource name of this scope
  string name = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Labels for this Scope.
  map<string, string> namespace_labels = 2 [(google.api.field_behavior) = OPTIONAL];

  // Output only. Google-generated UUID for this resource.
  string uid = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time the Scope was created in Hub.
  google.protobuf.Timestamp create_time = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time the Scope was last updated in Hub.
  google.protobuf.Timestamp update_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time the Scope was deleted in Hub.
  google.protobuf.Timestamp delete_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. State of the scope resource.
  ScopeLifecycleState state = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ScopeLifecycleState represents the state of a Scope resource.
message ScopeLifecycleState {
  enum Code {
    CODE_UNSPECIFIED = 0;
    CREATING = 1;
    READY = 2;
    DELETING = 3;
    UPDATING = 4;
  }
  Code code = 1;
}

// Namespace is a subresource of a Scope,
message Namespace {
  option (google.api.resource) = {
    type: "gkehub.googleapis.com/Namespace"
    pattern: "projects/{project}/locations/{location}/namespaces/{namespace}"
  };

  // The resource name for the namespace
  string name = 1;

  // Optional. Namespace-level cluster namespace labels.
  map<string, string> namespace_labels = 2 [(google.api.field_behavior) = OPTIONAL];

  // Required. Scope associated with the namespace
  string scope = 3 [(google.api.field_behavior) = REQUIRED];

  // Output only. State of the namespace resource.
  NamespaceLifecycleState state = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. When the namespace was created.
  google.protobuf.Timestamp create_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. When the namespace was last updated.
  google.protobuf.Timestamp update_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. When the namespace was deleted.
  google.protobuf.Timestamp delete_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Google-generated UUID for this resource.
  string uid = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Labels for this Namespace.
  map<string, string> labels = 9 [(google.api.field_behavior) = OPTIONAL];
}

// NamespaceLifecycleState describes the state of a Namespace resource.
message NamespaceLifecycleState {
  enum Code {
    CODE_UNSPECIFIED = 0;
    CREATING = 1;
    READY = 2;
    DELETING = 3;
    UPDATING = 4;
  }
  Code code = 1;
}

// RBACRoleBinding is a subresource of a Scope,
message RBACRoleBinding {
  option (google.api.resource) = {
    type: "gkehub.googleapis.com/RBACRoleBinding"
    pattern: "projects/{project}/locations/{location}/scopes/{scope}/rbacrolebindings/{rbacrolebinding}"
  };

  // The resource name for the rbacrolebinding
  string name = 1;

  // group is the group, as seen by the kubernetes cluster.
  string group = 2;

  // user is the name of the user as seen by the kubernetes cluster,
  // example "alice" or "alice@domain.tld"
  string user = 3;

  // Required. Role to bind to the principal
  Role role = 4 [(google.api.field_behavior) = REQUIRED];

  // Output only. State of the rbacrolebinding resource.
  RBACRoleBindingLifecycleState state = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. When the rbacrolebinding was created.
  google.protobuf.Timestamp create_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. When the rbacrolebinding was last updated.
  google.protobuf.Timestamp update_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. When the rbacrolebinding was deleted.
  google.protobuf.Timestamp delete_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Google-generated UUID for this resource.
  string uid = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Labels for this RBACRolebinding.
  map<string, string> labels = 10 [(google.api.field_behavior) = OPTIONAL];
}

// Role is the role to bind to the principal.
message Role {
  string custom_role = 1 [(google.api.field_behavior) = OPTIONAL];

  enum PredefinedRole {
    UNKNOWN = 0;
    ADMIN = 1;
    EDIT = 2;
    VIEW = 3;
  }
  PredefinedRole predefined_role = 2;
}

// RBACRoleBindingLifecycleState describes the state of a RBACRoleBinding resource.
message RBACRoleBindingLifecycleState {
  enum Code {
    CODE_UNSPECIFIED = 0;
    CREATING = 1;
    READY = 2;
    DELETING = 3;
    UPDATING = 4;
  }
  Code code = 1;
}

message GetScopeRequest {
  string name = 1;
}

message CreateScopeRequest {
  string parent = 1;
  string scope_id = 2;
  Scope resource = 3;
}

message DeleteScopeRequest {
  string name = 1;
}

message UpdateScopeRequest {
  string name = 1;
  google.protobuf.FieldMask update_mask = 2;
  Scope resource = 3;
}

message GetNamespaceRequest {
  string name = 1;
}

message CreateNamespaceRequest {
  string parent = 1;
  string scope_namespace_id = 2;
  Namespace resource = 3;
}

message UpdateNamespaceRequest {
  string name = 1;
  google.protobuf.FieldMask update_mask = 2;
  Namespace resource = 3;
}

message DeleteNamespaceRequest {
  string name = 1;
}

message GetRBACRoleBindingRequest {
  string name = 1;
}

message CreateRBACRoleBindingRequest {
  string parent = 1;
  string rbacrolebinding_id = 2;
  RBACRoleBinding resource = 3;
}

message UpdateRBACRoleBindingRequest {
  string name = 1;
  google.protobuf.FieldMask update_mask = 2;
  RBACRoleBinding resource = 3;
}

message DeleteRBACRoleBindingRequest {
  string name = 1;
}
