syntax = "proto3";

package google.cloud.networksecurity.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option go_package = "cloud.google.com/go/networksecurity/apiv1/networksecuritypb;networksecuritypb";
option java_multiple_files = true;
option java_package = "com.google.cloud.networksecurity.v1";
option csharp_namespace = "Google.Cloud.NetworkSecurity.V1";
option php_namespace = "Google\\Cloud\\NetworkSecurity\\V1";
option ruby_package = "Google::Cloud::NetworkSecurity::V1";

message MirroringEndpointGroupAssociation {
  option (google.api.resource) = {
    type: "networksecurity.googleapis.com/MirroringEndpointGroupAssociation"
    pattern: "projects/{project}/locations/{location}/mirroringEndpointGroupAssociations/{mirroring_endpoint_group_association}"
  };

  enum State {
    STATE_UNSPECIFIED = 0;
    ACTIVE = 1;
    CREATING = 2;
    DELETING = 3;
    CLOSED = 4;
    OUT_OF_SYNC = 5;
    DELETE_FAILED = 6;
  }

  string name = 1 [
    (google.api.field_behavior) = IMMUTABLE,
    (google.api.field_behavior) = IDENTIFIER
  ];

  google.protobuf.Timestamp create_time = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  google.protobuf.Timestamp update_time = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  map<string, string> labels = 4 [(google.api.field_behavior) = OPTIONAL];

  string mirroring_endpoint_group = 5 [(google.api.field_behavior) = IMMUTABLE];

  string network = 6 [(google.api.field_behavior) = IMMUTABLE];

  repeated MirroringEndpointGroupAssociationLocationDetails locations_details = 7 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    deprecated = true
  ];

  State state = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  bool reconciling = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  repeated MirroringLocation locations = 10 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message MirroringEndpointGroupAssociationLocationDetails {
  string location = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  MirroringEndpointGroupAssociation.State state = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message MirroringLocation {
  string location = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  State state = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  enum State {
    STATE_UNSPECIFIED = 0;
    ACTIVE = 1;
    OUT_OF_SYNC = 2;
  }
}
