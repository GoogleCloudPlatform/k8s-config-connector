syntax = "proto3";

package google.cloud.binaryauthorization.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "google/cloud/binaryauthorization/v1/resources.proto";

option go_package = "cloud.google.com/go/binaryauthorization/apiv1/binaryauthorizationpb;binaryauthorizationpb";

message PlatformPolicy {
  option (google.api.resource) = {
    type: "binaryauthorization.googleapis.com/PlatformPolicy"
    pattern: "projects/{project}/platforms/{platform}/policies/{policy}"
  };

  string name = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  string description = 2 [(google.api.field_behavior) = OPTIONAL];
  string etag = 3 [(google.api.field_behavior) = OPTIONAL];
  google.protobuf.Timestamp update_time = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  GkePolicy gke_policy = 5 [(google.api.field_behavior) = OPTIONAL];
}

message GkePolicy {
  repeated CheckSet check_sets = 1 [(google.api.field_behavior) = OPTIONAL];
  ImageAllowlist image_allowlist = 2 [(google.api.field_behavior) = OPTIONAL];
}

message CheckSet {
  repeated Check checks = 1 [(google.api.field_behavior) = OPTIONAL];
  string display_name = 2 [(google.api.field_behavior) = OPTIONAL];
  ImageAllowlist image_allowlist = 3 [(google.api.field_behavior) = OPTIONAL];
  Scope scope = 4 [(google.api.field_behavior) = OPTIONAL];
}

message Scope {
  string kubernetes_service_account = 1 [(google.api.field_behavior) = OPTIONAL];
  string kubernetes_namespace = 2 [(google.api.field_behavior) = OPTIONAL];
}

message ImageAllowlist {
  repeated string allow_pattern = 1 [(google.api.field_behavior) = REQUIRED];
}

message Check {
  SimpleSigningAttestationCheck simple_signing_attestation_check = 1 [(google.api.field_behavior) = OPTIONAL];
  ImageAllowlist image_allowlist = 2 [(google.api.field_behavior) = OPTIONAL];
  bool always_deny = 3 [(google.api.field_behavior) = OPTIONAL];
  SlsaCheck slsa_check = 4 [(google.api.field_behavior) = OPTIONAL];
  TrustedDirectoryCheck trusted_directory_check = 5 [(google.api.field_behavior) = OPTIONAL];
  string display_name = 6 [(google.api.field_behavior) = OPTIONAL];
  ImageFreshnessCheck image_freshness_check = 7 [(google.api.field_behavior) = OPTIONAL];
  VulnerabilityCheck vulnerability_check = 8 [(google.api.field_behavior) = OPTIONAL];
  SigstoreSignatureCheck sigstore_signature_check = 9 [(google.api.field_behavior) = OPTIONAL];
}

message ImageFreshnessCheck {
  int32 max_upload_age_days = 1 [(google.api.field_behavior) = REQUIRED];
}

message SigstoreSignatureCheck {
  repeated SigstoreAuthority sigstore_authorities = 1 [(google.api.field_behavior) = REQUIRED];
}

message SigstoreAuthority {
  string display_name = 1 [(google.api.field_behavior) = OPTIONAL];
  SigstorePublicKeySet public_key_set = 2 [(google.api.field_behavior) = OPTIONAL];
}

message SigstorePublicKeySet {
  repeated SigstorePublicKey public_keys = 1 [(google.api.field_behavior) = REQUIRED];
}

message SigstorePublicKey {
  string public_key_pem = 1 [(google.api.field_behavior) = OPTIONAL];
}

message SimpleSigningAttestationCheck {
  repeated string container_analysis_attestation_projects = 1 [(google.api.field_behavior) = OPTIONAL];
  repeated AttestationAuthenticator attestation_authenticators = 2 [(google.api.field_behavior) = REQUIRED];
}

message AttestationAuthenticator {
  string display_name = 1 [(google.api.field_behavior) = OPTIONAL];
  PkixPublicKeySet pkix_public_key_set = 2 [(google.api.field_behavior) = OPTIONAL];
}

message PkixPublicKeySet {
  repeated PkixPublicKey pkix_public_keys = 1 [(google.api.field_behavior) = REQUIRED];
}


message SlsaCheck {
  repeated VerificationRule rules = 1 [(google.api.field_behavior) = OPTIONAL];
}

message VerificationRule {
  string trusted_builder = 1 [(google.api.field_behavior) = OPTIONAL];
  string trusted_source_repo_patterns = 2 [(google.api.field_behavior) = OPTIONAL];
}

message TrustedDirectoryCheck {
  repeated string trusted_dir_patterns = 1 [(google.api.field_behavior) = REQUIRED];
}

message VulnerabilityCheck {
  repeated string blocked_cves = 1 [(google.api.field_behavior) = OPTIONAL];
  enum MaximumUnfixableSeverity {
    MAXIMUM_ALLOWED_SEVERITY_UNSPECIFIED = 0;
    BLOCK_ALL = 1;
    MINIMAL = 2;
    LOW = 3;
    MEDIUM = 4;
    HIGH = 5;
    CRITICAL = 6;
    ALLOW_ALL = 7;
  }
  MaximumUnfixableSeverity maximum_unfixable_severity = 2 [(google.api.field_behavior) = REQUIRED];
  enum MaximumFixableSeverity {
    MAXIMUM_ALLOWED_SEVERITY_UNSPECIFIED_FIXABLE = 0;
    BLOCK_ALL_FIXABLE = 1;
    MINIMAL_FIXABLE = 2;
    LOW_FIXABLE = 3;
    MEDIUM_FIXABLE = 4;
    HIGH_FIXABLE = 5;
    CRITICAL_FIXABLE = 6;
    ALLOW_ALL_FIXABLE = 7;
  }
  MaximumFixableSeverity maximum_fixable_severity = 3 [(google.api.field_behavior) = REQUIRED];
  repeated string allowed_cves = 4 [(google.api.field_behavior) = OPTIONAL];
  repeated string container_analysis_vulnerability_projects = 5 [(google.api.field_behavior) = OPTIONAL];
}
