- exec: gcloud privateca pools create test-pool-${uniqueId} --location=us-central1 --tier=devops
- exec: gcloud privateca roots create test-ca-${uniqueId} --location=us-central1 --pool=test-pool-${uniqueId} --subject="CN=test-ca-${uniqueId}" --auto-enable --quiet
- exec: gcloud certificate-manager issuance-configs create test-${uniqueId} --location=us-central1 --ca-pool=projects/${projectId}/locations/us-central1/caPools/test-pool-${uniqueId} --description="Test Certificate Issuance Config" --labels=foo=bar
- exec: gcloud certificate-manager issuance-configs describe test-${uniqueId} --location=us-central1
- exec: gcloud certificate-manager issuance-configs list --location=us-central1
- exec: gcloud certificate-manager issuance-configs delete test-${uniqueId} --location=us-central1 --quiet
- exec: gcloud privateca roots disable test-ca-${uniqueId} --location=us-central1 --pool=test-pool-${uniqueId} --quiet
- exec: gcloud privateca roots delete test-ca-${uniqueId} --location=us-central1 --pool=test-pool-${uniqueId} --ignore-active-certificates --skip-grace-period --quiet
- exec: gcloud privateca pools delete test-pool-${uniqueId} --location=us-central1 --quiet
