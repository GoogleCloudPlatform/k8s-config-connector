- pre: gcloud config set api_endpoint_overrides/modelarmor "https://modelarmor.us-central1.rep.googleapis.com/"
- exec: gcloud model-armor templates create test-floor --location=us-central1 --malicious-uri-filter-settings-enforcement=enabled
- exec: gcloud model-armor templates list --location=us-central1
- exec: gcloud model-armor floorsettings describe --full-uri=projects/${projectId}/locations/us-central1/floorSetting
- exec: gcloud model-armor floorsettings update --full-uri=projects/${projectId}/locations/us-central1/floorSetting --malicious-uri-filter-settings-enforcement=enabled
- exec: gcloud model-armor floorsettings describe --full-uri=projects/${projectId}/locations/us-central1/floorSetting
- exec: gcloud model-armor templates sanitize-user-prompt test-floor --location=us-central1 --user-prompt-data-text="hello"
- exec: gcloud model-armor templates sanitize-model-response test-floor --location=us-central1 --model-response-data-text="world"
- exec: gcloud model-armor templates delete test-floor --location=us-central1 --quiet
