apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeForwardingRule
metadata:
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: "direct"
  name: memorystoreinstanceendpoint-1-dep
spec:
  allowPscGlobalAccess: true
  ipAddress:
    addressRef:
      external: projects/${projectId}/regions/us-central1/addresses/memorystoreinstanceendpoint-1-dep
  loadBalancingScheme: ""
  location: us-central1
  networkRef:
    name: memorystoreinstanceendpoint-dep
  subnetworkRef:
    name: memorystoreinstanceendpoint-dep
  target:
    memorystoreInstanceServiceAttachmentRef:
      memorystoreInstanceRef:
        name: memorystoreinstanceendpoint-dep
      pscAttachmentDetailsIndex: 0
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeForwardingRule
metadata:
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: "direct"
  name: memorystoreinstanceendpoint-2-dep
spec:
  allowPscGlobalAccess: true
  ipAddress:
    addressRef:
      external: projects/${projectId}/regions/us-central1/addresses/memorystoreinstanceendpoint-dep
  loadBalancingScheme: ""
  location: us-central1
  networkRef:
    name: memorystoreinstanceendpoint-dep
  subnetworkRef:
    name: memorystoreinstanceendpoint-dep
  target:
    memorystoreInstanceServiceAttachmentRef:
      memorystoreInstanceRef:
        name: memorystoreinstanceendpoint-dep
      pscAttachmentDetailsIndex: 1
