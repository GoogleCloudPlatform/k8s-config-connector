apiVersion: aiplatform.cnrm.cloud.google.com/v1alpha1
kind: VertexAIFeatureGroup
metadata:
  name: vertexaifeaturegroup-sample
spec:
  location: us-central1
  description: "A sample feature group"
  bigQuery:
    bigQuerySource:
      inputURI: "bq://my-project.my_dataset.my_table"
    entityIDColumns:
      - "entity_id"
