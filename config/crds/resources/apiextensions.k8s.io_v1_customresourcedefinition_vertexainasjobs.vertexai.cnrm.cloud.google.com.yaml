                                            of the zone being peered to, e.g., "my-internal-domain.corp.".
                                            Must end with a dot.
                                          type: string
                                        targetNetwork:
                                          description: Required. The VPC network name
                                            in the target_project where the DNS zone
                                            specified by 'domain' is visible.
                                          type: string
                                        targetProject:
                                          description: Required. The project ID hosting
                                            the Cloud DNS managed zone that contains
                                            the 'domain'. The Vertex AI Service Agent
                                            requires the dns.peer role on this project.
                                          type: string
                                      type: object
                                    type: array
                                  networkAttachment:
                                    description: Optional. The name of the Compute
                                      Engine [network attachment](https://cloud.google.com/vpc/docs/about-network-attachments)
                                      to attach to the resource within the region
                                      and user project. To specify this field, you
                                      must have already [created a network attachment]
                                      (https://cloud.google.com/vpc/docs/create-manage-network-attachments#create-network-attachments).
                                      This field is only used for resources using
                                      PSC-I.
                                    type: string
                                type: object
                              reservedIPRanges:
