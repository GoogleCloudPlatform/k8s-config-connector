                                   If set to `true`, you can access interactive shells at the URIs given
                                   by
                                   [CustomJob.web_access_uris][google.cloud.aiplatform.v1beta1.CustomJob.web_access_uris]
                                   or
                                   [Trial.web_access_uris][google.cloud.aiplatform.v1beta1.Trial.web_access_uris]
                                   (within
                                   [HyperparameterTuningJob.trials][google.cloud.aiplatform.v1beta1.HyperparameterTuningJob.trials]).
                                type: boolean
                              experiment:
                                description: 'Optional. The Experiment associated
                                  with this job. Format: `projects/{project}/locations/{location}/metadataStores/{metadataStores}/contexts/{experiment-name}`'
                                type: string
                              experimentRun:
                                description: 'Optional. The Experiment Run associated
