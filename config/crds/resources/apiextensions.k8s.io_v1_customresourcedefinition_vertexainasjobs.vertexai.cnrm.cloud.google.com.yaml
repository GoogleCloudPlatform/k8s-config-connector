                                   which to run

                                   If this is specified, the job will be run on existing machines held by the
                                   PersistentResource instead of on-demand short-live machines.
                                   The network and CMEK configs on the job should be consistent with those on
                                   the PersistentResource, otherwise, the job will be rejected.
                                type: string
                              protectedArtifactLocationID:
                                description: 'The ID of the location to store protected
                                  artifacts. e.g. us-central1. Populate only when
                                  the location is different than CustomJob location.
                                  List of supported locations: https://cloud.google.com/vertex-ai/docs/general/locations'
                                type: string
                              pscInterfaceConfig:
                                description: Optional. Configuration for PSC-I for
                                  CustomJob.
                                properties:
                                  dnsPeeringConfigs:
                                    description: Optional. DNS peering configurations.
                                      When specified, Vertex AI will attempt to configure
                                      DNS peering zones in the tenant project VPC
                                      to resolve the specified domains using the target
                                      network's Cloud DNS. The user must grant the
                                      dns.peer role to the Vertex AI Service Agent
                                      on the target project.
                                    items:
                                      properties:
                                        domain:
