                                              NFS server.
                                            type: string
                                        type: object
                                      type: array
                                    pythonPackageSpec:
                                      description: The Python packaged task.
                                      properties:
                                        args:
                                          description: Command line arguments to be
                                            passed to the Python task.
                                          items:
                                            type: string
                                          type: array
                                        env:
                                          description: Environment variables to be
                                            passed to the python module. Maximum limit
                                            is 100.
                                          items:
                                            properties:
                                              name:
                                                description: Required. Name of the
                                                  environment variable. Must be a
