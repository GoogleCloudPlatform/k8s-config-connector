apiVersion: core.cnrm.cloud.google.com/v1beta1
kind: ConfigConnector
metadata:
  name: configconnector.core.cnrm.cloud.google.com
spec:
  mode: cluster
  googleServiceAccount: kcc@my-project.iam.gserviceaccount.com
  resourceKinds:
    allowlist:
      - StorageBucket
      - PubSubTopic
      - ComputeNetwork
      - ComputeSubnetwork
    denylist:
      - BigtableInstance
      - SpannerInstance
