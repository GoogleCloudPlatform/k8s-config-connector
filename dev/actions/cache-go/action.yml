name: 'Go Dependency Cache & Prebuilder'
description: 'Prebuilds and caches Go dependencies to speed up subsequent parallel workflow jobs'
inputs:
  go-version:
    description: 'Go version'
    required: false
  go-version-file:
    description: 'Go version file'
    required: false
    default: 'go.mod'

runs:
  using: 'composite'
  steps:
    - name: Free up disk space
      shell: bash
      run: dev/tasks/free-disk-space-on-github-actions-runner

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: ${{ inputs.go-version-file }}
        cache: false # We handle caching ourselves below

    - name: Get Go environment variables
      id: go-env
      shell: bash
      run: |
        echo "GOCACHE=$(go env GOCACHE)" >> $GITHUB_OUTPUT
        echo "GOMODCACHE=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT

    - name: Calculate dependencies hash
      id: deps-hash
      shell: bash
      run: |
        HASH=$(find . -name "go.mod" -o -name "go.sum" -not -path "*/vendor/*" | sort | xargs cat | sha256sum | head -c 64)
        echo "hash=${HASH}" >> $GITHUB_OUTPUT

    # We intentionally do not use 'restore-keys' here. When dependencies or code change,
    # restoring a previous cache can cause old/removed dependency versions and dead build
    # artifacts to accumulate in GOMODCACHE and GOCACHE indefinitely, leading to massive cache bloat.
    # By omitting 'restore-keys', we cleanly rebuild from scratch on a cache miss, keeping the cache minimal.
    - name: Cache Go modules and build cache
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.go-env.outputs.GOMODCACHE }}
          ${{ steps.go-env.outputs.GOCACHE }}
          ~/.local/share/kubebuilder-envtest
        key: go-deps-v7-${{ runner.os }}-${{ steps.deps-hash.outputs.hash }}

    - name: Prebuild dependencies on cache miss
      if: steps.cache-deps.outputs.cache-hit != 'true'
      shell: bash
      run: |
        chmod +x ${{ github.action_path }}/prebuild.sh
        ${{ github.action_path }}/prebuild.sh
