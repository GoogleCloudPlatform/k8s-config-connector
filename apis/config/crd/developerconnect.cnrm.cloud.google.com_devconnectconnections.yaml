    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DevConnectConnection is the Schema for the DevConnectConnection
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DevConnectConnectionSpec defines the desired state of DevConnectConnection
            properties:
              annotations:
                additionalProperties:
                  type: string
                description: Optional. Allows clients to store small amounts of arbitrary
                  data.
                type: object
              bitbucketCloudConfig:
                description: Configuration for connections to an instance of Bitbucket
                  Clouds.
                properties:
                  authorizerCredential:
                    description: |-
                      Required. An access token with the minimum `repository`, `pullrequest` and
                       `webhook` scope access. It can either be a workspace, project or repository
                       access token. This is needed to create webhooks. It's recommended to use a
                       system account to generate these credentials.
                    properties:
                      userTokenSecretVersion:
                        description: |-
                          Required. A SecretManager resource containing the user token that
                           authorizes the Developer Connect connection. Format:
                           `projects/*/secrets/*/versions/*`.
                        type: string
                    type: object
                  readAuthorizerCredential:
                    description: |-
                      Required. An access token with the minimum `repository` access.
                       It can either be a workspace, project or repository access token.
                       It's recommended to use a system account to generate the credentials.
                    properties:
                      userTokenSecretVersion:
                        description: |-
                          Required. A SecretManager resource containing the user token that
                           authorizes the Developer Connect connection. Format:
                           `projects/*/secrets/*/versions/*`.
                        type: string
                    type: object
                  webhookSecretSecretVersion:
                    description: |-
                      Required. Immutable. SecretManager resource containing the webhook secret
                       used to verify webhook events, formatted as
                       `projects/*/secrets/*/versions/*`. This is used to validate and create
                       webhooks.
                    type: string
                  workspace:
                    description: |-
                      Required. The Bitbucket Cloud Workspace ID to be connected to Google Cloud
                       Platform.
                    type: string
                type: object
              bitbucketDataCenterConfig:
                description: Configuration for connections to an instance of Bitbucket
                  Data Center.
                properties:
                  authorizerCredential:
                    description: |-
                      Required. An http access token with the minimum `Repository admin` scope
                       access. This is needed to create webhooks. It's recommended to use a system
                       account to generate these credentials.
                    properties:
                      userTokenSecretVersion:
                        description: |-
                          Required. A SecretManager resource containing the user token that
                           authorizes the Developer Connect connection. Format:
                           `projects/*/secrets/*/versions/*`.
                        type: string
                    type: object
                  hostURI:
                    description: Required. The URI of the Bitbucket Data Center host
                      this connection is for.
                    type: string
                  readAuthorizerCredential:
                    description: |-
                      Required. An http access token with the minimum `Repository read` access.
                       It's recommended to use a system account to generate the credentials.
                    properties:
                      userTokenSecretVersion:
                        description: |-
                          Required. A SecretManager resource containing the user token that
                           authorizes the Developer Connect connection. Format:
                           `projects/*/secrets/*/versions/*`.
                        type: string
                    type: object
                  serviceDirectoryConfig:
                    description: |-
                      Optional. Configuration for using Service Directory to privately connect to
                       a Bitbucket Data Center instance. This should only be set if the Bitbucket
                       Data Center is hosted on-premises and not reachable by public internet. If
                       this field is left empty, calls to the Bitbucket Data Center will be made
                       over the public internet.
                    properties:
                      serviceRef:
                        description: The Service Directory service.
                        oneOf:
                        - not:
                            required:
                            - external
                          required:
                          - name
                        - not:
                            anyOf:
                            - required:
                              - name
                            - required:
                              - namespace
                          required:
                          - external
                        properties:
                          external:
                            description: |-
                              A reference to an externally managed DataprocJob resource.
                              Should be in the format "/projects/*/locations/*/namespaces/*/services/*".
                            type: string
                          name:
                            description: The name of a DataprocJob resource.
                            type: string
                          namespace:
                            description: The namespace of a DataprocJob resource.
                            type: string
                        type: object
                    type: object
                  sslCACertificate:
                    description: |-
                      Optional. SSL certificate authority to trust when making requests to
                       Bitbucket Data Center.
                    type: string
                  webhookSecretSecretVersion:
                    description: |-
                      Required. Immutable. SecretManager resource containing the webhook secret
                       used to verify webhook events, formatted as
                       `projects/*/secrets/*/versions/*`. This is used to validate webhooks.
                    type: string
                type: object
              cryptoKeyConfig:
                description: |-
                  Optional. The crypto key configuration. This field is used by the
                   Customer-Managed Encryption Keys (CMEK) feature.
                properties:
                  keyReference:
                    description: |-
                      Required. The name of the key which is used to encrypt/decrypt customer
                       data. For key in Cloud KMS, the key should be in the format of
                       `projects/*/locations/*/keyRings/*/cryptoKeys/*`.
                    type: string
                type: object
              disabled:
                description: |-
                  Optional. If disabled is set to true, functionality is disabled for this
                   connection. Repository based API methods and webhooks processing for
                   repositories in this connection will be disabled.
                type: boolean
              gitProxyConfig:
                description: |-
                  Optional. Configuration for the git proxy feature. Enabling the git proxy
                   allows clients to perform git operations on the repositories linked in the
                   connection.
                properties:
                  enabled:
                    description: |-
                      Optional. Setting this to true allows the git proxy to be used for
                       performing git operations on the repositories linked in the connection.
                    type: boolean
                type: object
              githubConfig:
                description: Configuration for connections to github.com.
                properties:
                  appInstallationID:
                    description: Optional. GitHub App installation id.
                    format: int64
                    type: integer
                  authorizerCredential:
                    description: |-
                      Optional. OAuth credential of the account that authorized the GitHub App.
                       It is recommended to use a robot account instead of a human user account.
                       The OAuth token must be tied to the GitHub App of this config.
                    properties:
                      oauthTokenSecretVersion:
                        description: |-
                          Required. A SecretManager resource containing the OAuth token that
                           authorizes the connection. Format: `projects/*/secrets/*/versions/*`.
                        type: string
                    type: object
                  githubApp:
                    description: |-
                      Required. Immutable. The GitHub Application that was installed to the
                       GitHub user or organization.
                    type: string
                type: object
              githubEnterpriseConfig:
                description: Configuration for connections to an instance of GitHub
                  Enterprise.
                properties:
                  appID:
                    description: Optional. ID of the GitHub App created from the manifest.
                    format: int64
                    type: integer
                  appInstallationID:
                    description: Optional. ID of the installation of the GitHub App.
                    format: int64
                    type: integer
                  hostURI:
                    description: Required. The URI of the GitHub Enterprise host this
                      connection is for.
                    type: string
                  privateKeySecretVersion:
                    description: |-
                      Optional. SecretManager resource containing the private key of the GitHub
                       App, formatted as `projects/*/secrets/*/versions/*`.
                    type: string
                  serviceDirectoryConfig:
                    description: |-
                      Optional. Configuration for using Service Directory to privately connect to
                       a GitHub Enterprise server. This should only be set if the GitHub
                       Enterprise server is hosted on-premises and not reachable by public
                       internet. If this field is left empty, calls to the GitHub Enterprise
                       server will be made over the public internet.
                    properties:
                      serviceRef:
                        description: The Service Directory service.
                        oneOf:
                        - not:
                            required:
                            - external
                          required:
                          - name
                        - not:
                            anyOf:
                            - required:
                              - name
                            - required:
                              - namespace
                          required:
                          - external
                        properties:
                          external:
                            description: |-
                              A reference to an externally managed DataprocJob resource.
                              Should be in the format "/projects/*/locations/*/namespaces/*/services/*".
                            type: string
                          name:
                            description: The name of a DataprocJob resource.
                            type: string
                          namespace:
                            description: The namespace of a DataprocJob resource.
                            type: string
                        type: object
                    type: object
                  sslCACertificate:
                    description: Optional. SSL certificate to use for requests to
                      GitHub Enterprise.
                    type: string
                  webhookSecretSecretVersion:
                    description: |-
                      Optional. SecretManager resource containing the webhook secret of the
                       GitHub App, formatted as `projects/*/secrets/*/versions/*`.
                    type: string
                type: object
              gitlabConfig:
                description: Configuration for connections to gitlab.com.
                properties:
                  authorizerCredential:
                    description: |-
                      Required. A GitLab personal access token with the minimum `api` scope
                       access and a minimum role of `maintainer`. The GitLab Projects visible to
                       this Personal Access Token will control which Projects Developer Connect
                       has access to.
                    properties:
                      userTokenSecretVersion:
                        description: |-
                          Required. A SecretManager resource containing the user token that
                           authorizes the Developer Connect connection. Format:
                           `projects/*/secrets/*/versions/*`.
                        type: string
                    type: object
                  readAuthorizerCredential:
                    description: |-
                      Required. A GitLab personal access token with the minimum `read_api` scope
                       access and a minimum role of `reporter`. The GitLab Projects visible to
                       this Personal Access Token will control which Projects Developer Connect
                       has access to.
                    properties:
                      userTokenSecretVersion:
                        description: |-
                          Required. A SecretManager resource containing the user token that
                           authorizes the Developer Connect connection. Format:
                           `projects/*/secrets/*/versions/*`.
                        type: string
                    type: object
                  webhookSecretSecretVersion:
                    description: |-
                      Required. Immutable. SecretManager resource containing the webhook secret
                       of a GitLab project, formatted as `projects/*/secrets/*/versions/*`. This
                       is used to validate webhooks.
                    type: string
                type: object
              gitlabEnterpriseConfig:
                description: Configuration for connections to an instance of GitLab
                  Enterprise.
                properties:
                  authorizerCredential:
                    description: |-
                      Required. A GitLab personal access token with the minimum `api` scope
                       access and a minimum role of `maintainer`. The GitLab Projects visible to
                       this Personal Access Token will control which Projects Developer Connect
                       has access to.
                    properties:
                      userTokenSecretVersion:
                        description: |-
                          Required. A SecretManager resource containing the user token that
                           authorizes the Developer Connect connection. Format:
                           `projects/*/secrets/*/versions/*`.
                        type: string
                    type: object
                  hostURI:
                    description: Required. The URI of the GitLab Enterprise host this
                      connection is for.
                    type: string
                  readAuthorizerCredential:
                    description: |-
                      Required. A GitLab personal access token with the minimum `read_api` scope
                       access and a minimum role of `reporter`. The GitLab Projects visible to
                       this Personal Access Token will control which Projects Developer Connect
                       has access to.
                    properties:
                      userTokenSecretVersion:
                        description: |-
                          Required. A SecretManager resource containing the user token that
                           authorizes the Developer Connect connection. Format:
                           `projects/*/secrets/*/versions/*`.
                        type: string
                    type: object
                  serviceDirectoryConfig:
                    description: |-
                      Optional. Configuration for using Service Directory to privately connect to
                       a GitLab Enterprise instance. This should only be set if the GitLab
                       Enterprise server is hosted on-premises and not reachable by public
                       internet. If this field is left empty, calls to the GitLab Enterprise
                       server will be made over the public internet.
                    properties:
                      serviceRef:
                        description: The Service Directory service.
                        oneOf:
                        - not:
                            required:
                            - external
                          required:
                          - name
                        - not:
                            anyOf:
                            - required:
                              - name
                            - required:
                              - namespace
                          required:
                          - external
                        properties:
                          external:
                            description: |-
                              A reference to an externally managed DataprocJob resource.
                              Should be in the format "/projects/*/locations/*/namespaces/*/services/*".
                            type: string
                          name:
                            description: The name of a DataprocJob resource.
                            type: string
                          namespace:
                            description: The namespace of a DataprocJob resource.
                            type: string
                        type: object
                    type: object
                  sslCACertificate:
                    description: |-
                      Optional. SSL Certificate Authority certificate to use for requests to
                       GitLab Enterprise instance.
                    type: string
                  webhookSecretSecretVersion:
                    description: |-
                      Required. Immutable. SecretManager resource containing the webhook secret
                       of a GitLab project, formatted as `projects/*/secrets/*/versions/*`. This
                       is used to validate webhooks.
                    type: string
                type: object
              location:
                description: The location of this resource.
                type: string
              projectRef:
                description: The project that this resource belongs to.
                oneOf:
                - not:
                    required:
                    - external
                  required:
                  - name
                - not:
                    anyOf:
                    - required:
                      - name
                    - required:
                      - namespace
                  required:
                  - external
                properties:
                  external:
                    description: The `projectID` field of a project, when not managed
                      by Config Connector.
                    type: string
                  kind:
                    description: The kind of the Project resource; optional but must
                      be `Project` if provided.
                    type: string
                  name:
                    description: The `name` field of a `Project` resource.
                    type: string
                  namespace:
                    description: The `namespace` field of a `Project` resource.
                    type: string
                type: object
              resourceID:
                description: The DevConnectConnection name. If not given, the metadata.name
                  will be used.
                type: string
            required:
            - location
            - projectRef
            type: object
          status:
            description: DevConnectConnectionStatus defines the config connector machine
              state of DevConnectConnection
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  object's current state.
                items:
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      type: string
                    message:
                      description: Human-readable message indicating details about
                        last transition.
                      type: string
                    reason:
                      description: |-
                        Unique, one-word, CamelCase reason for the condition's last
                        transition.
                      type: string
                    status:
                      description: Status is the status of the condition. Can be True,
                        False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the condition.
                      type: string
                  type: object
                type: array
              externalRef:
                description: A unique specifier for the DevConnectConnection resource
                  in GCP.
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation of the resource
                  that was most recently observed by the Config Connector controller.
                  If this is equal to metadata.generation, then that means that the
                  current reported status reflects the most recent desired state of
                  the resource.
                format: int64
                type: integer
              observedState:
                description: ObservedState is the state of the resource as most recently
                  observed in GCP.
                properties:
                  createTime:
                    description: Output only. [Output only] Create timestamp
                    type: string
                  deleteTime:
                    description: Output only. [Output only] Delete timestamp
                    type: string
                  installationState:
                    description: Output only. Installation state of the Connection.
                    properties:
                      actionURI:
                        description: |-
                          Output only. Link to follow for next action. Empty string if the
                           installation is already complete.
                        type: string
                      message:
                        description: |-
                          Output only. Message of what the user should do next to continue the
                           installation. Empty string if the installation is already complete.
                        type: string
                      stage:
                        description: Output only. Current step of the installation
                          process.
                        type: string
                    type: object
                  reconciling:
                    description: |-
                      Output only. Set to true when the connection is being set up or updated in
                       the background.
                    type: boolean
                  uid:
                    description: Output only. A system-assigned unique identifier
                      for the Connection.
                    type: string
                  updateTime:
                    description: Output only. [Output only] Update timestamp
                    type: string
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
