apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    cnrm.cloud.google.com/version: 0.0.0-dev
    controller-gen.kubebuilder.io/version: v0.16.5
  creationTimestamp: null
  labels:
    cnrm.cloud.google.com/managed-by-kcc: "true"
    cnrm.cloud.google.com/stability-level: alpha
    cnrm.cloud.google.com/system: "true"
  name: notebooksschedules.notebooks.cnrm.cloud.google.com
spec:
  group: notebooks.cnrm.cloud.google.com
  names:
    categories:
    - gcp
    kind: NotebooksSchedule
    listKind: NotebooksScheduleList
    plural: notebooksschedules
    shortNames:
    - gcpnotebooksschedule
    - gcpnotebooksschedules
    singular: notebooksschedule
  preserveUnknownFields: false
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - description: When 'True', the most recent reconcile of the resource succeeded
      jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - description: The reason for the value in 'Ready'
      jsonPath: .status.conditions[?(@.type=='Ready')].reason
      name: Status
      type: string
    - description: The last transition time for the value in 'Status'
      jsonPath: .status.conditions[?(@.type=='Ready')].lastTransitionTime
      name: Status Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: NotebooksSchedule is the Schema for the NotebooksSchedule API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NotebooksScheduleSpec defines the desired state of NotebooksSchedule
            properties:
              cronSchedule:
                description: |-
                  Cron-tab formatted schedule by which the job will execute.
                   Format: minute, hour, day of month, month, day of week,
                   e.g. `0 0 * * WED` = every Wednesday
                   More examples: https://crontab.guru/examples.html
                type: string
              description:
                description: A brief description of this environment.
                type: string
              executionTemplate:
                description: Notebook Execution Template corresponding to this schedule.
                properties:
                  acceleratorConfig:
                    description: |-
                      Configuration (count and accelerator type) for hardware running notebook
                       execution.
                    properties:
                      coreCount:
                        description: Count of cores of this accelerator.
                        format: int64
                        type: integer
                      type:
                        description: Type of this accelerator.
                        type: string
                    type: object
                  containerImageURI:
                    description: Container Image URI to a DLVM
                    type: string
                  dataprocParameters:
                    description: Parameters used in Dataproc JobType executions.
                    properties:
                      clusterRef:
                        description: The Dataproc cluster used to run Dataproc execution.
                        oneOf:
                        - not:
                            required:
                            - external
                          required:
                          - name
                        - not:
                            anyOf:
                            - required:
                              - name
                            - required:
                              - namespace
                          required:
                          - external
                        properties:
                          external:
                            description: |-
                              A reference to an externally managed DataprocCluster resource.
                              Should be in the format "projects/{{projectID}}/regions/{{region}}/clusters/{{clusterName}}".
                            type: string
                          name:
                            description: The name of a DataprocCluster resource.
                            type: string
                          namespace:
                            description: The namespace of a DataprocCluster resource.
                            type: string
                        type: object
                    type: object
                  inputNotebookFile:
                    description: Path to the notebook file to execute.
                    type: string
                  jobType:
                    description: The type of Job to be used on this execution.
                    type: string
                  kernelSpec:
                    description: Name of the kernel spec to use.
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels for execution.
                    type: object
                  masterType:
                    description: |-
                      Specifies the type of virtual machine to use for your training
                       job's master worker. You must specify this field when `scaleTier` is set to
                       `CUSTOM`.
                    type: string
                  outputNotebookFolder:
                    description: Path to the notebook folder to write to.
                    type: string
                  parameters:
                    description: Parameters used within the 'input_notebook_file'
                      notebook.
                    type: string
                  paramsYamlFile:
                    description: Parameters to be overridden in the notebook during
                      execution.
                    type: string
                  scaleTier:
                    description: |-
                      Required. Scale tier of the hardware used for notebook execution.
                       DEPRECATED Will be discontinued. As right now only CUSTOM is supported.
                    type: string
                  serviceAccountRef:
                    description: The service account to use when running the execution.
                    oneOf:
                    - not:
                        required:
                        - external
                      required:
                      - name
                    - not:
                        anyOf:
                        - required:
                          - name
                        - required:
                          - namespace
                      required:
                      - external
                    properties:
                      external:
                        description: The `email` field of an `IAMServiceAccount` resource.
                        type: string
                      name:
                        description: 'Name of the referent. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names'
                        type: string
                      namespace:
                        description: 'Namespace of the referent. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/'
                        type: string
                    type: object
                  tensorboardRef:
                    description: The Vertex AI [Tensorboard] resource to which this
                      execution will upload Tensorboard logs.
                    oneOf:
                    - not:
                        required:
                        - external
                      required:
                      - name
                    - not:
                        anyOf:
                        - required:
                          - name
                        - required:
                          - namespace
                      required:
                      - external
                    properties:
                      external:
                        description: |-
                          A reference to an externally managed VertexAITensorboard resource.
                          Should be in the format "projects/{{projectID}}/locations/{{location}}/tensorboards/{{tensorboardID}}".
                        type: string
                      name:
                        description: The name of a VertexAITensorboard resource.
                        type: string
                      namespace:
                        description: The namespace of a VertexAITensorboard resource.
                        type: string
                    type: object
                  vertexAiParameters:
                    description: Parameters used in Vertex AI JobType executions.
                    properties:
                      env:
                        additionalProperties:
                          type: string
                        description: Environment variables.
                        type: object
                      networkRef:
                        description: The Compute Engine network to which the Job should
                          be peered.
                        oneOf:
                        - not:
                            required:
                            - external
                          required:
                          - name
                        - not:
                            anyOf:
                            - required:
                              - name
                            - required:
                              - namespace
                          required:
                          - external
                        properties:
                          external:
                            description: |-
                              A reference to an externally managed ComputeNetwork resource.
                              Should be in the format "projects/{{projectID}}/global/networks/{{networkID}}".
                            type: string
                          name:
                            description: The name of a ComputeNetwork resource.
                            type: string
                          namespace:
                            description: The namespace of a ComputeNetwork resource.
                            type: string
                        type: object
                    type: object
                type: object
              location:
                description: The location of this resource.
                type: string
              projectRef:
                description: The Project that this resource belongs to.
                oneOf:
                - not:
                    required:
                    - external
                  required:
                  - name
                - not:
                    anyOf:
                    - required:
                      - name
                    - required:
                      - namespace
                  required:
                  - external
                properties:
                  external:
                    description: The `projectID` field of a project, when not managed
                      by Config Connector.
                    type: string
                  kind:
                    description: The kind of the Project resource; optional but must
                      be `Project` if provided.
                    type: string
                  name:
                    description: The `name` field of a `Project` resource.
                    type: string
                  namespace:
                    description: The `namespace` field of a `Project` resource.
                    type: string
                type: object
              resourceID:
                description: The NotebooksSchedule name. If not given, the metadata.name
                  will be used.
                type: string
              state:
                type: string
              timeZone:
                description: |-
                  Timezone on which the cron_schedule.
                   The value of this field must be a time zone name from the tz database.
                   TZ Database: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

                   Note that some time zones include a provision for daylight savings time.
                   The rules for daylight saving time are determined by the chosen tz.
                   For UTC use the string "utc". If a time zone is not specified,
                   the default will be in UTC (also known as GMT).
                type: string
            required:
            - location
            - projectRef
            type: object
          status:
            description: NotebooksScheduleStatus defines the config connector machine
              state of NotebooksSchedule
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  object's current state.
                items:
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      type: string
                    message:
                      description: Human-readable message indicating details about
                        last transition.
                      type: string
                    reason:
                      description: |-
                        Unique, one-word, CamelCase reason for the condition's last
                        transition.
                      type: string
                    status:
                      description: Status is the status of the condition. Can be True,
                        False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the condition.
                      type: string
                  type: object
                type: array
              externalRef:
                description: A unique specifier for the NotebooksSchedule resource
                  in GCP.
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation of the resource
                  that was most recently observed by the Config Connector controller.
                  If this is equal to metadata.generation, then that means that the
                  current reported status reflects the most recent desired state of
                  the resource.
                format: int64
                type: integer
              observedState:
                description: ObservedState is the state of the resource as most recently
                  observed in GCP.
                properties:
                  createTime:
                    description: Output only. Time the schedule was created.
                    type: string
                  displayName:
                    description: |-
                      Output only. Display name used for UI purposes.
                       Name can only contain alphanumeric characters, hyphens `-`,
                       and underscores `_`.
                    type: string
                  recentExecutions:
                    description: |-
                      Output only. The most recent execution names triggered from this schedule and their
                       corresponding states.
                    items:
                      description: NotebooksExecutionObservedState is the state of
                        the NotebooksExecution resource as most recently observed
                        in GCP.
                      properties:
                        createTime:
                          description: Output only. Time the Execution was instantiated.
                          type: string
                        displayName:
                          description: |-
                            Output only. Name used for UI purposes.
                             Name can only contain alphanumeric characters and underscores '_'.
                          type: string
                        jobURI:
                          description: Output only. The URI of the external job used
                            to execute the notebook.
                          type: string
                        state:
                          description: Output only. State of the underlying AI Platform
                            job.
                          type: string
                        updateTime:
                          description: Output only. Time the Execution was last updated.
                          type: string
                      type: object
                    type: array
                  updateTime:
                    description: Output only. Time the schedule was last updated.
                    type: string
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
