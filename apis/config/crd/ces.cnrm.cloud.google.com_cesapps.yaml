apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    cnrm.cloud.google.com/version: 0.0.0-dev
  creationTimestamp: null
  labels:
    cnrm.cloud.google.com/managed-by-kcc: "true"
    cnrm.cloud.google.com/stability-level: alpha
    cnrm.cloud.google.com/system: "true"
  name: cesapps.ces.cnrm.cloud.google.com
spec:
  group: ces.cnrm.cloud.google.com
  names:
    categories:
    - gcp
    kind: CESApp
    listKind: CESAppList
    plural: cesapps
    shortNames:
    - gcpcesapp
    - gcpcesapps
    singular: cesapp
  preserveUnknownFields: false
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - description: When 'True', the most recent reconcile of the resource succeeded
      jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - description: The reason for the value in 'Ready'
      jsonPath: .status.conditions[?(@.type=='Ready')].reason
      name: Status
      type: string
    - description: The last transition time for the value in 'Status'
      jsonPath: .status.conditions[?(@.type=='Ready')].lastTransitionTime
      name: Status Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CESApp is the Schema for the CESApp API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CESAppSpec defines the desired state of CESApp
            properties:
              audioProcessingConfig:
                description: Optional. Audio processing configuration of the app.
                properties:
                  ambientSoundConfig:
                    description: |-
                      Optional. Configuration for the ambient sound to be played with the
                       synthesized agent response, to enhance the naturalness of the conversation.
                    properties:
                      gcsURI:
                        description: |-
                          Optional. Ambient noise as a mono-channel, 16kHz WAV file stored in
                           [Cloud Storage](https://cloud.google.com/storage).

                           Note: Please make sure the CES service agent
                           `service-<PROJECT-NUMBER>@gcp-sa-ces.iam.gserviceaccount.com` has
                           `storage.objects.get` permission to the Cloud Storage object.
                        type: string
                      prebuiltAmbientNoise:
                        description: |-
                          Optional. Deprecated: `prebuilt_ambient_noise` is deprecated in favor of
                           `prebuilt_ambient_sound`.
                        type: string
                      prebuiltAmbientSound:
                        description: |-
                          Optional. Name of the prebuilt ambient sound.
                           Valid values are:
                           - "coffee_shop"
                           - "keyboard"
                           - "keypad"
                           - "hum"
                           - "office_1"
                           - "office_2"
                           - "office_3"
                           - "room_1"
                           - "room_2"
                           - "room_3"
                           - "room_4"
                           - "room_5"
                           - "air_conditioner"
                        type: string
                      volumeGainDb:
                        description: |-
                          Optional. Volume gain (in dB) of the normal native volume supported by
                           ambient noise, in the range [-96.0, 16.0]. If unset, or set to a value of
                           0.0 (dB), will play at normal native signal amplitude. A value of -6.0 (dB)
                           will play at approximately half the amplitude of the normal native signal
                           amplitude. A value of +6.0 (dB) will play at approximately twice the
                           amplitude of the normal native signal amplitude. We strongly recommend not
                           to exceed +10 (dB) as there's usually no effective increase in loudness for
                           any value greater than that.
                        type: number
                    type: object
                  bargeInConfig:
                    description: Optional. Configures the agent behavior for the user
                      barge-in activities.
                    properties:
                      bargeInAwareness:
                        description: |-
                          Optional. If enabled, the agent will adapt its next response based on the
                           assumption that the user hasn't heard the full preceding agent message.
                           This should not be used in scenarios where agent responses are displayed
                           visually.
                        type: boolean
                      disableBargeIn:
                        description: |-
                          Optional. Disables user barge-in while the agent is speaking. If true, user
                           input during agent response playback will be ignored.

                           Deprecated: `disable_barge_in` is deprecated in favor of
                           [`disable_barge_in_control`][google.cloud.ces.v1beta.ChannelProfile.disable_barge_in_control]
                           in ChannelProfile.
                        type: boolean
                    type: object
                  inactivityTimeout:
                    description: |-
                      Optional. The duration of user inactivity (no speech or interaction) before
                       the agent prompts the user for reengagement. If not set, the agent will not
                       prompt the user for reengagement.
                    type: string
                type: object
              clientCertificateSettings:
                description: Optional. The default client certificate settings for
                  the app.
                properties:
                  passphraseRef:
                    oneOf:
                    - not:
                        required:
                        - external
                      required:
                      - name
                    - not:
                        anyOf:
                        - required:
                          - name
                        - required:
                          - namespace
                      required:
                      - external
                    properties:
                      external:
                        description: ' If provided must be in the format `projects/*/secrets/*/versions/*`.'
                        type: string
                      name:
                        description: The `name` field of a `SecretManagerSecretVersion`
                          resource.
                        type: string
                      namespace:
                        description: The `metadata.namespace` field of a `SecretManagerSecretVersion`
                          resource.
                        type: string
                    type: object
                  privateKeyRef:
                    oneOf:
                    - not:
                        required:
                        - external
                      required:
                      - name
                    - not:
                        anyOf:
                        - required:
                          - name
                        - required:
                          - namespace
                      required:
                      - external
                    properties:
                      external:
                        description: ' If provided must be in the format `projects/*/secrets/*/versions/*`.'
                        type: string
                      name:
                        description: The `name` field of a `SecretManagerSecretVersion`
                          resource.
                        type: string
                      namespace:
                        description: The `metadata.namespace` field of a `SecretManagerSecretVersion`
                          resource.
                        type: string
                    type: object
                  tlsCertificate:
                    type: string
                type: object
              dataStoreSettings:
                description: Optional. The data store settings for the app.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              defaultChannelProfile:
                description: Optional. The default channel profile used by the app.
                properties:
                  channelType:
                    description: Optional. The type of the channel profile.
                    type: string
                  disableBargeInControl:
                    description: |-
                      Optional. Whether to disable user barge-in control in the conversation.
                       - **true**: User interruptions are disabled while the agent is speaking.
                       - **false**: The agent retains automatic control over when the user can
                       interrupt.
                    type: boolean
                  disableDtmf:
                    description: Optional. Whether to disable DTMF (dual-tone multi-frequency).
                    type: boolean
                  noiseSuppressionLevel:
                    description: |-
                      Optional. The noise suppression level of the channel profile.
                       Available values are "low", "moderate", "high", "very_high".
                    type: string
                  personaProperty:
                    description: Optional. The persona property of the channel profile.
                    properties:
                      persona:
                        description: Optional. The persona of the channel.
                        type: string
                    type: object
                  profileID:
                    description: Optional. The unique identifier of the channel profile.
                    type: string
                  webWidgetConfig:
                    description: Optional. The configuration for the web widget.
                    properties:
                      modality:
                        description: Optional. The modality of the web widget.
                        type: string
                      securitySettings:
                        description: Optional. The security settings of the web widget.
                        properties:
                          allowedOrigins:
                            description: |-
                              Optional. The origins that are allowed to host the web widget. An
                               origin is defined by RFC 6454. If empty, all origins are allowed. A
                               maximum of 100 origins is allowed. Example: "https://example.com"
                            items:
                              type: string
                            type: array
                          enableOriginCheck:
                            description: |-
                              Optional. Indicates whether origin check for the web widget is enabled.
                               If `true`, the web widget will check the origin of the website that
                               loads the web widget and only allow it to be loaded in the same origin
                               or any of the allowed origins.
                            type: boolean
                          enablePublicAccess:
                            description: |-
                              Optional. Indicates whether public access to the web widget is enabled.
                               If `true`, the web widget will be publicly accessible.
                               If `false`, the web widget must be integrated with your own
                               authentication and authorization system to return valid credentials for
                               accessing the CES agent.
                            type: boolean
                          enableRecaptcha:
                            description: |-
                              Optional. Indicates whether reCAPTCHA verification for the web widget
                               is enabled.
                            type: boolean
                        type: object
                      theme:
                        description: Optional. The theme of the web widget.
                        type: string
                      webWidgetTitle:
                        description: Optional. The title of the web widget.
                        type: string
                    type: object
                type: object
              description:
                description: Optional. Human-readable description of the app.
                type: string
              displayName:
                description: Required. Display name of the app.
                type: string
              errorHandlingSettings:
                description: Optional. Error handling settings of the app.
                properties:
                  endSessionConfig:
                    description: |-
                      Optional. Configuration for ending the session in case of system errors
                       (e.g. LLM errors).
                    properties:
                      escalateSession:
                        description: |-
                          Optional. Whether to escalate the session in
                           [EndSession][google.cloud.ces.v1beta.EndSession]. If session is
                           escalated, [metadata in
                           EndSession][google.cloud.ces.v1beta.EndSession.metadata] will contain
                           `session_escalated = true`. See
                           https://docs.cloud.google.com/customer-engagement-ai/conversational-agents/ps/deploy/google-telephony-platform#transfer_a_call_to_a_human_agent
                           for details.
                        type: boolean
                    type: object
                  errorHandlingStrategy:
                    description: Optional. The strategy to use for error handling.
                    type: string
                  fallbackResponseConfig:
                    description: Optional. Configuration for handling fallback responses.
                    properties:
                      customFallbackMessages:
                        additionalProperties:
                          type: string
                        description: |-
                          Optional. The fallback messages in case of system errors (e.g. LLM
                           errors), mapped by [supported language
                           code](https://docs.cloud.google.com/customer-engagement-ai/conversational-agents/ps/reference/language).
                        type: object
                      maxFallbackAttempts:
                        description: |-
                          Optional. The maximum number of fallback attempts to make before the
                           agent emitting [EndSession][google.cloud.ces.v1beta.EndSession] Signal.
                        format: int32
                        type: integer
                    type: object
                type: object
              evaluationMetricsThresholds:
                description: Optional. The evaluation thresholds for the app.
                properties:
                  goldenEvaluationMetricsThresholds:
                    description: Optional. The golden evaluation metrics thresholds.
                    properties:
                      expectationLevelMetricsThresholds:
                        description: Optional. The expectation level metrics thresholds.
                        properties:
                          toolInvocationParameterCorrectnessThreshold:
                            description: |-
                              Optional. The success threshold for individual tool invocation
                               parameter correctness. Must be a float between 0 and 1. Default is 1.0.
                            type: number
                        type: object
                      toolMatchingSettings:
                        description: |-
                          Optional. The tool matching settings. An
                           extra tool call is a tool call that is present in the execution but does
                           not match any tool call in the golden expectation.
                        properties:
                          extraToolCallBehavior:
                            description: |-
                              Optional. Behavior for extra tool calls.
                               Defaults to FAIL.
                            type: string
                        type: object
                      turnLevelMetricsThresholds:
                        description: Optional. The turn level metrics thresholds.
                        properties:
                          overallToolInvocationCorrectnessThreshold:
                            description: |-
                              Optional. The success threshold for overall tool invocation
                               correctness. Must be a float between 0 and 1. Default is 1.0.
                            type: number
                          semanticSimilarityChannel:
                            description: Optional. The semantic similarity channel
                              to use for evaluation.
                            type: string
                          semanticSimilaritySuccessThreshold:
                            description: |-
                              Optional. The success threshold for semantic similarity. Must be an
                               integer between 0 and 4. Default is >= 3.
                            format: int32
                            type: integer
                        type: object
                    type: object
                  goldenHallucinationMetricBehavior:
                    description: Optional. The hallucination metric behavior for golden
                      evaluations.
                    type: string
                  hallucinationMetricBehavior:
                    description: |-
                      Optional. Deprecated: Use `golden_hallucination_metric_behavior` instead.
                       The hallucination metric behavior is currently used for golden evaluations.
                    type: string
                  scenarioHallucinationMetricBehavior:
                    description: Optional. The hallucination metric behavior for scenario
                      evaluations.
                    type: string
                type: object
              evaluationPersonas:
                description: |-
                  Optional. The evaluation personas for the app. This field is used to define
                   the personas that can be used for evaluation. Maximum of 30 personas can be
                   defined.
                items:
                  properties:
                    description:
                      type: string
                    displayName:
                      type: string
                    instruction:
                      type: string
                    nameRef:
                      description: CESEvaluationPersonaRef defines the resource reference
                        to CESEvaluationPersona.
                      oneOf:
                      - not:
                          required:
                          - external
                        required:
                        - name
                      - not:
                          anyOf:
                          - required:
                            - name
                          - required:
                            - namespace
                        required:
                        - external
                      properties:
                        external:
                          type: string
                        name:
                          type: string
                        namespace:
                          type: string
                      type: object
                  type: object
                type: array
              evaluationSettings:
                description: Optional. The evaluation settings for the app.
                properties:
                  goldenEvaluationToolCallBehaviour:
                    description: |-
                      Optional. Configures the default tool call behaviour for golden
                       evaluations.
                    type: string
                  goldenRunMethod:
                    description: |-
                      Optional. The default method used to run golden evaluations. This will be
                       used if no golden_run_method is specified in the RunEvaluationRequest.
                    type: string
                  metricsConfig:
                    description: Optional. Configures the default metrics for evaluations.
                    properties:
                      goldenMetricsConfig:
                        description: Optional. Configuration for the golden metrics
                          for the evaluation.
                        properties:
                          semanticSimilarityMetricsConfig:
                            description: Optional. Global configuration for semantic
                              similarity metrics.
                            properties:
                              enableSemanticSimilarityMetrics:
                                description: |-
                                  Optional. Whether to calculate semantic similarity metrics for the
                                   evaluation.
                                type: boolean
                            type: object
                          stepToolCorrectnessMetricsConfig:
                            description: Optional. Configuration for step level tool
                              correctness metrics.
                            properties:
                              enableToolCorrectnessMetrics:
                                description: |-
                                  Optional. Whether to calculate tool correctness metrics for the
                                   evaluation.
                                type: boolean
                            type: object
                          toolCorrectnessMetricsConfig:
                            description: Optional. Configuration for turn level tool
                              correctness metrics.
                            properties:
                              enableToolCorrectnessMetrics:
                                description: |-
                                  Optional. Whether to calculate tool correctness metrics for the
                                   evaluation.
                                type: boolean
                            type: object
                        type: object
                      scenarioMetricsConfig:
                        description: Optional. Configuration for the scenario metrics
                          for the evaluation.
                        properties:
                          expectationsMetMetricsConfig:
                            description: Optional. Configuration for expectation level
                              metrics.
                            properties:
                              enableExpectationsMetMetrics:
                                description: |-
                                  Optional. Whether to calculate the expectation level metrics for the
                                   evaluation.
                                type: boolean
                            type: object
                          userGoalMetMetricsConfig:
                            description: Optional. Configuration for user goal met
                              metrics.
                            properties:
                              enableUserGoalMetMetrics:
                                description: |-
                                  Optional. Whether to calculate the user goal met metrics for the
                                   evaluation.
                                type: boolean
                            type: object
                        type: object
                    type: object
                  scenarioConversationInitiator:
                    description: Optional. Who starts the conversation in a scenario
                      evaluation.
                    type: string
                  scenarioEvaluationToolCallBehaviour:
                    description: |-
                      Optional. Configures the default tool call behaviour for scenario
                       evaluations.
                    type: string
                  scenarioExecutionMode:
                    description: |-
                      Optional. The execution mode for scenario evaluations. If not provided,
                       will default to QUALITY_OPTIMIZED.
                    type: string
                type: object
              globalInstruction:
                description: |-
                  Optional. Instructions for all the agents in the app.
                   You can use this instruction to set up a stable identity or personality
                   across all the agents.
                type: string
              guardrailRefs:
                description: |-
                  Optional. List of guardrails for the app.
                   Format:
                   `projects/{project}/locations/{location}/apps/{app}/guardrails/{guardrail}`
                items:
                  description: CESGuardrailRef defines the resource reference to CESGuardrail.
                  oneOf:
                  - not:
                      required:
                      - external
                    required:
                    - name
                  - not:
                      anyOf:
                      - required:
                        - name
                      - required:
                        - namespace
                    required:
                    - external
                  properties:
                    external:
                      description: |-
                        A reference to an externally managed CES Guardrail.
                        Format: `projects/{project}/locations/{location}/apps/{app}/guardrails/{guardrail}`
                      type: string
                    name:
                      description: The `name` of a `CESGuardrail` resource.
                      type: string
                    namespace:
                      description: The `namespace` of a `CESGuardrail` resource.
                      type: string
                  type: object
                type: array
              languageSettings:
                description: Optional. Language settings of the app.
                properties:
                  defaultLanguageCode:
                    description: Optional. The default language code of the app.
                    type: string
                  enableMultilingualSupport:
                    description: |-
                      Optional. Enables multilingual support. If true, agents in the app will use
                       pre-built instructions to improve handling of multilingual input.
                    type: boolean
                  fallbackAction:
                    description: |-
                      Optional. Deprecated: This feature is no longer supported. Use
                       `enable_multilingual_support` instead to improve handling of multilingual
                       input.
                       The action to perform when an agent receives input in an unsupported
                       language.

                       This can be a predefined action or a custom tool call.
                       Valid values are:
                       - A tool's full resource name, which triggers a specific tool execution.
                       - A predefined system action, such as "escalate" or "exit", which triggers
                       an [EndSession][google.cloud.ces.v1beta.EndSession] signal with
                       corresponding [metadata][google.cloud.ces.v1beta.EndSession.metadata] to
                       terminate the conversation.
                    type: string
                  supportedLanguageCodes:
                    description: |-
                      Optional. List of languages codes supported by the app, in addition to the
                       `default_language_code`.
                    items:
                      type: string
                    type: array
                type: object
              location:
                description: The location of this resource.
                type: string
              locked:
                description: |-
                  Optional. Indicates whether the app is locked for changes. If the app is
                   locked, modifications to the app resources will be rejected.
                type: boolean
              loggingSettings:
                description: Optional. Logging settings of the app.
                properties:
                  audioRecordingConfig:
                    description: |-
                      Optional. Configuration for how audio interactions should be recorded. The
                       audio is subject to redaction as configured in
                       [RedactionConfig][google.cloud.ces.v1beta.LoggingSettings.redaction_config].
                    properties:
                      gcsBucket:
                        description: |-
                          Optional. The [Cloud Storage](https://cloud.google.com/storage) bucket to
                           store the session audio recordings. The URI must start with "gs://".

                           Please choose a bucket location that meets your data residency
                           requirements.

                           Note: If the Cloud Storage bucket is in a different project from the app,
                           you should grant `storage.objects.create` permission to the CES service
                           agent `service-<PROJECT-NUMBER>@gcp-sa-ces.iam.gserviceaccount.com`.
                        type: string
                      gcsPathPrefix:
                        description: |-
                          Optional. The Cloud Storage path prefix for audio recordings.

                           This prefix can include the following placeholders, which will be
                           dynamically substituted at serving time:
                             - $project:   project ID
                             - $location:  app location
                             - $app:       app ID
                             - $date:      session date in YYYY-MM-DD format
                             - $session:   session ID

                           If the path prefix is not specified, the default prefix
                           `$project/$location/$app/$date/$session/` will be used.
                        type: string
                    type: object
                  bigqueryExportSettings:
                    description: |-
                      Optional. Configures the BigQuery export behaviors for the app. The
                       conversation data is subject to redaction as configured in
                       [RedactionConfig][google.cloud.ces.v1beta.LoggingSettings.redaction_config].
                    properties:
                      dataset:
                        description: Optional. The BigQuery **dataset ID** to export
                          the data to.
                        type: string
                      enabled:
                        description: Optional. Indicates whether the BigQuery export
                          is enabled.
                        type: boolean
                      project:
                        description: |-
                          Optional. The **project ID** of the BigQuery dataset to export the data to.

                           Note: If the BigQuery dataset is in a different project from the app,
                           you should grant `roles/bigquery.admin` role to the CES service agent
                           `service-<PROJECT-NUMBER>@gcp-sa-ces.iam.gserviceaccount.com`.
                        type: string
                    type: object
                  cloudLoggingSettings:
                    description: Optional. Settings to describe the Cloud Logging
                      behaviors for the app.
                    properties:
                      enableCloudLogging:
                        description: Optional. Whether to enable Cloud Logging for
                          the sessions.
                        type: boolean
                    type: object
                  conversationLoggingSettings:
                    description: |-
                      Optional. Settings to describe the conversation logging behaviors for the
                       app.
                    properties:
                      disableConversationLogging:
                        description: Optional. Whether to disable conversation logging
                          for the sessions.
                        type: boolean
                      retentionWindow:
                        description: |-
                          Optional. Controls the retention window for the conversation.
                           If not set, the conversation will be retained for 365 days.
                        type: string
                    type: object
                  evaluationAudioRecordingConfig:
                    description: |-
                      Optional. Configuration for how audio interactions should be recorded for
                       the evaluation. By default, audio recording is not enabled for evaluation
                       sessions.
                    properties:
                      gcsBucket:
                        description: |-
                          Optional. The [Cloud Storage](https://cloud.google.com/storage) bucket to
                           store the session audio recordings. The URI must start with "gs://".

                           Please choose a bucket location that meets your data residency
                           requirements.

                           Note: If the Cloud Storage bucket is in a different project from the app,
                           you should grant `storage.objects.create` permission to the CES service
                           agent `service-<PROJECT-NUMBER>@gcp-sa-ces.iam.gserviceaccount.com`.
                        type: string
                      gcsPathPrefix:
                        description: |-
                          Optional. The Cloud Storage path prefix for audio recordings.

                           This prefix can include the following placeholders, which will be
                           dynamically substituted at serving time:
                             - $project:   project ID
                             - $location:  app location
                             - $app:       app ID
                             - $date:      session date in YYYY-MM-DD format
                             - $session:   session ID

                           If the path prefix is not specified, the default prefix
                           `$project/$location/$app/$date/$session/` will be used.
                        type: string
                    type: object
                  metricAnalysisSettings:
                    description: |-
                      Optional. Settings to describe the conversation data collection behaviors
                       for the LLM analysis pipeline for the app.
                    properties:
                      llmMetricsOptedOut:
                        description: |-
                          Optional. Whether to collect conversation data for llm analysis metrics. If
                           true, conversation data will not be collected for llm analysis metrics;
                           otherwise, conversation data will be collected.
                        type: boolean
                    type: object
                  redactionConfig:
                    description: Optional. Configuration for how sensitive data should
                      be redacted.
                    properties:
                      deidentifyTemplateRef:
                        oneOf:
                        - not:
                            required:
                            - external
                          required:
                          - name
                        - not:
                            anyOf:
                            - required:
                              - name
                            - required:
                              - namespace
                          required:
                          - external
                        properties:
                          external:
                            description: |-
                              A reference to an externally managed DLP Deidentify Template.
                              Should be in the format `projects/[project_id]/locations/[location]/deidentifyTemplates/[deidentify_template]`.
                            type: string
                          name:
                            description: The `name` of a `DLPDeidentifyTemplate` resource.
                            type: string
                          namespace:
                            description: The `namespace` of a `DLPDeidentifyTemplate`
                              resource.
                            type: string
                        type: object
                      enableRedaction:
                        type: boolean
                      inspectTemplateRef:
                        oneOf:
                        - not:
                            required:
                            - external
                          required:
                          - name
                        - not:
                            anyOf:
                            - required:
                              - name
                            - required:
                              - namespace
                          required:
                          - external
                        properties:
                          external:
                            description: |-
                              A reference to an externally managed DLP Inspect Template.
                              Should be in the format `projects/[project_id]/locations/[location]/inspectTemplates/[inspect_template]`.
                            type: string
                          name:
                            description: The `name` of a `DLPInspectTemplate` resource.
                            type: string
                          namespace:
                            description: The `namespace` of a `DLPInspectTemplate`
                              resource.
                            type: string
                        type: object
                    type: object
                  unredactedAudioRecordingConfig:
                    description: |-
                      Optional. Configures an additional recording of unredacted audio. This can
                       be used to maintain a raw audio copy when audio redaction is
                       [enabled][google.cloud.ces.v1beta.RedactionConfig.enable_redaction],
                       typically for auditing or monitoring purposes.
                    properties:
                      gcsBucket:
                        description: |-
                          Optional. The [Cloud Storage](https://cloud.google.com/storage) bucket to
                           store the session audio recordings. The URI must start with "gs://".

                           Please choose a bucket location that meets your data residency
                           requirements.

                           Note: If the Cloud Storage bucket is in a different project from the app,
                           you should grant `storage.objects.create` permission to the CES service
                           agent `service-<PROJECT-NUMBER>@gcp-sa-ces.iam.gserviceaccount.com`.
