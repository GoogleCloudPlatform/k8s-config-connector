apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    cnrm.cloud.google.com/version: 0.0.0-dev
    controller-gen.kubebuilder.io/version: v0.16.5
  creationTimestamp: null
  labels:
    cnrm.cloud.google.com/managed-by-kcc: "true"
    cnrm.cloud.google.com/stability-level: alpha
    cnrm.cloud.google.com/system: "true"
  name: dlpconnections.dlp.cnrm.cloud.google.com
spec:
  group: dlp.cnrm.cloud.google.com
  names:
    categories:
    - gcp
    kind: DLPConnection
    listKind: DLPConnectionList
    plural: dlpconnections
    shortNames:
    - gcpdlpconnection
    - gcpdlpconnections
    singular: dlpconnection
  preserveUnknownFields: false
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - description: When 'True', the most recent reconcile of the resource succeeded
      jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - description: The reason for the value in 'Ready'
      jsonPath: .status.conditions[?(@.type=='Ready')].reason
      name: Status
      type: string
    - description: The last transition time for the value in 'Status'
      jsonPath: .status.conditions[?(@.type=='Ready')].lastTransitionTime
      name: Status Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DLPConnection is the Schema for the DLPConnection API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DLPConnectionSpec defines the desired state of DLPConnection
            properties:
              cloudSQL:
                description: Connect to a Cloud SQL instance.
                properties:
                  cloudSQLIAM:
                    description: Built-in IAM authentication (must be configured in
                      Cloud SQL).
                    type: object
                  connectionName:
                    description: |-
                      Optional. Immutable. The Cloud SQL instance for which the connection is
                       defined. Only one connection per instance is allowed. This can only be set
                       at creation time, and cannot be updated.

                       It is an error to use a connection_name from different project or region
                       than the one that holds the connection.
                       For example, a Connection resource for Cloud SQL connection_name
                       `project-id:us-central1:sql-instance`
                       must be created under the parent
                       `projects/project-id/locations/us-central1`
                    type: string
                  databaseEngine:
                    description: |-
                      Required. The database engine used by the Cloud SQL instance that this
                       connection configures.
                    type: string
                  maxConnections:
                    description: |-
                      Required. The DLP API will limit its connections to max_connections.
                       Must be 2 or greater.
                    format: int32
                    type: integer
                  usernamePassword:
                    description: A username and password stored in Secret Manager.
                    properties:
                      secretRef:
                        description: Required. The Secret Manager secret version that
                          stores the password.
                        oneOf:
                        - not:
                            required:
                            - external
                          required:
                          - name
                        - not:
                            anyOf:
                            - required:
                              - name
                            - required:
                              - namespace
                          required:
                          - external
                        properties:
                          external:
                            description: ' If provided must be in the format `projects/*/secrets/*/versions/*`.'
                            type: string
                          name:
                            description: The `name` field of a `SecretManagerSecretVersion`
                              resource.
                            type: string
                          namespace:
                            description: The `metadata.namespace` field of a `SecretManagerSecretVersion`
                              resource.
                            type: string
                        type: object
                      username:
                        description: Required. The username.
                        type: string
                    required:
                    - secretRef
                    - username
                    type: object
                required:
                - databaseEngine
                - maxConnections
                type: object
              location:
                description: The location of this resource.
                type: string
              projectRef:
                description: The Project that this resource belongs to.
                oneOf:
                - not:
                    required:
                    - external
                  required:
                  - name
                - not:
                    anyOf:
                    - required:
                      - name
                    - required:
                      - namespace
                  required:
                  - external
                properties:
                  external:
                    description: The `projectID` field of a project, when not managed
                      by Config Connector.
                    type: string
                  kind:
                    description: The kind of the Project resource; optional but must
                      be `Project` if provided.
                    type: string
                  name:
                    description: The `name` field of a `Project` resource.
                    type: string
                  namespace:
                    description: The `namespace` field of a `Project` resource.
                    type: string
                type: object
              resourceID:
                description: The DLPConnection name. If not given, the metadata.name
                  will be used.
                type: string
              state:
                description: Required. The connection's state in its lifecycle.
                enum:
                - CONNECTION_STATE_UNSPECIFIED
                - MISSING_CREDENTIALS
                - AVAILABLE
                - ERROR
                type: string
            required:
            - location
            - projectRef
            - state
            type: object
          status:
            description: DLPConnectionStatus defines the config connector machine
              state of DLPConnection
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  object's current state.
                items:
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      type: string
                    message:
                      description: Human-readable message indicating details about
                        last transition.
                      type: string
                    reason:
                      description: |-
                        Unique, one-word, CamelCase reason for the condition's last
                        transition.
                      type: string
                    status:
                      description: Status is the status of the condition. Can be True,
                        False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the condition.
                      type: string
                  type: object
                type: array
              externalRef:
                description: A unique specifier for the DLPConnection resource in
                  GCP.
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation of the resource
                  that was most recently observed by the Config Connector controller.
                  If this is equal to metadata.generation, then that means that the
                  current reported status reflects the most recent desired state of
                  the resource.
                format: int64
                type: integer
              observedState:
                description: ObservedState is the state of the resource as most recently
                  observed in GCP.
                properties:
                  errors:
                    description: |-
                      Output only. Set if status == ERROR, to provide additional details. Will
                       store the last 10 errors sorted with the most recent first.
                    items:
                      properties:
                        details:
                          description: Detailed error codes and messages.
                          properties:
                            code:
                              description: |-
                                The status code, which should be an enum value of
                                 [google.rpc.Code][google.rpc.Code].
                              format: int32
                              type: integer
                            message:
                              description: |-
                                A developer-facing error message, which should be in English. Any
                                 user-facing error message should be localized and sent in the
                                 [google.rpc.Status.details][google.rpc.Status.details] field, or localized
                                 by the client.
                              type: string
                          type: object
                        extraInfo:
                          description: Additional information about the error.
                          type: string
                        timestamps:
                          description: |-
                            The times the error occurred. List includes the oldest timestamp and the
                             last 9 timestamps.
                          items:
                            type: string
                          type: array
                      type: object
                    type: array
                  name:
                    description: |-
                      Output only. Name of the connection:
                       `projects/{project}/locations/{location}/connections/{name}`.
                    type: string
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
