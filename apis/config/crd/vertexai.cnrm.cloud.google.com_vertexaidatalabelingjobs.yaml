---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  labels:
    cnrm.cloud.google.com/managed-by-kcc: "true"
    cnrm.cloud.google.com/stability-level: alpha
    cnrm.cloud.google.com/system: "true"
  name: vertexaidatalabelingjobs.vertexai.cnrm.cloud.google.com
spec:
  group: vertexai.cnrm.cloud.google.com
  names:
    categories:
    - gcp
    kind: VertexAIDataLabelingJob
    listKind: VertexAIDataLabelingJobList
    plural: vertexaidatalabelingjobs
    shortNames:
    - gcpvertexaidatalabelingjob
    - gcpvertexaidatalabelingjobs
    singular: vertexaidatalabelingjob
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - description: When 'True', the most recent reconcile of the resource succeeded
      jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - description: The reason for the value in 'Ready'
      jsonPath: .status.conditions[?(@.type=='Ready')].reason
      name: Status
      type: string
    - description: The last transition time for the value in 'Status'
      jsonPath: .status.conditions[?(@.type=='Ready')].lastTransitionTime
      name: Status Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: VertexAIDataLabelingJob is the Schema for the VertexAIDataLabelingJob
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VertexAIDataLabelingJobSpec defines the desired state of
              VertexAIDataLabelingJob
            properties:
              activeLearningConfig:
                description: |-
                  Parameters that configure the active learning pipeline. Active learning
                  will label the data incrementally via several iterations. For every
                  iteration, it will select a batch of data based on the sampling strategy.
                properties:
                  maxDataItemCount:
                    description: Max number of human labeled DataItems.
                    format: int64
                    type: integer
                  maxDataItemPercentage:
                    description: Max percent of total DataItems for human labeling.
                    format: int32
                    type: integer
                  sampleConfig:
                    description: |-
                      Active learning data sampling config. For every active learning labeling
                       iteration, it will select a batch of data based on the sampling strategy.
                    properties:
                      followingBatchSamplePercentage:
                        description: |-
                          The percentage of data needed to be labeled in each following batch
                           (except the first batch).
                        format: int32
                        type: integer
                      initialBatchSamplePercentage:
                        description: The percentage of data needed to be labeled in
                          the first batch.
                        format: int32
                        type: integer
                      sampleStrategy:
                        description: |-
                          Field to choose sampling strategy. Sampling strategy will decide which data
                           should be selected for human labeling in every batch.
                        type: string
                    type: object
                  trainingConfig:
                    description: |-
                      CMLE training config. For every active learning labeling iteration, system
                       will train a machine learning model on CMLE. The trained model will be used
                       by data sampling algorithm to select DataItems.
                    properties:
                      timeoutTrainingMilliHours:
                        description: |-
                          The timeout hours for the CMLE training job, expressed in milli hours
                           i.e. 1,000 value in this field means 1 hour.
                        format: int64
                        type: integer
                    type: object
                type: object
              annotationLabels:
                additionalProperties:
                  type: string
                description: |-
                  Labels to assign to annotations generated by this DataLabelingJob.

                  Label keys and values can be no longer than 64 characters
                  (Unicode codepoints), can only contain lowercase letters, numeric
                  characters, underscores and dashes. International characters are allowed.
                  See https://goo.gl/xmQnxf for more information and examples of labels.
                  System reserved label keys are prefixed with "aiplatform.googleapis.com/"
                  and are immutable.
                type: object
              datasetRefs:
                description: |-
                  Required. Dataset resource names. Right now we only support labeling from a
                  single Dataset. Format:
                  projects/{project}/locations/{location}/datasets/{dataset}
                items:
                  description: VertexAIDatasetRef is a reference to a VertexAIDataset
                    resource.
                  properties:
                    external:
                      description: If provided, must be in the format `projects/[projectId]/locations/[location]/datasets/[datasetId]`.
                      type: string
                    name:
                      description: The `metadata.name` field of a `VertexAIDataset`
                        resource.
                      type: string
                    namespace:
                      description: The `metadata.namespace` field of a `VertexAIDataset`
                        resource.
                      type: string
                  type: object
                type: array
              displayName:
                description: |-
                  Required. The user-defined name of the DataLabelingJob.
                  The name can be up to 128 characters long and can consist of any UTF-8
                  characters.
                  Display name of a DataLabelingJob.
                type: string
              encryptionSpec:
                description: |-
                  Customer-managed encryption key spec for a DataLabelingJob. If set, this
                  DataLabelingJob will be secured by this key.
                properties:
                  kmsKeyRef:
                    description: |-
                      Required. The Cloud KMS resource identifier of the customer managed
                       encryption key used to protect a resource.
                       The key needs to be in the same region as where the compute resource is
                       created.
                    properties:
                      external:
                        description: |-
                          A reference to an externally managed KMSCryptoKey.
                          Should be in the format `projects/[kms_project_id]/locations/[region]/keyRings/[key_ring_id]/cryptoKeys/[key]`.
                        type: string
                      name:
                        description: The `name` of a `KMSCryptoKey` resource.
                        type: string
                      namespace:
                        description: The `namespace` of a `KMSCryptoKey` resource.
                        type: string
                    type: object
                required:
                - kmsKeyRef
                type: object
              inputs:
                description: Required. Input config parameters for the DataLabelingJob.
                x-kubernetes-preserve-unknown-fields: true
              inputsSchemaURI:
                description: |-
                  Required. Points to a YAML file stored on Google Cloud Storage describing
                  the config for a specific type of DataLabelingJob. The schema files that
                  can be used here are found in the
                  https://storage.googleapis.com/google-cloud-aiplatform bucket in the
                  /schema/datalabelingjob/inputs/ folder.
                type: string
              instructionURI:
                description: |-
                  Required. The Google Cloud Storage location of the instruction pdf. This
                  pdf is shared with labelers, and provides detailed description on how to
                  label DataItems in Datasets.
                type: string
              labelerCount:
                description: Required. Number of labelers to work on each DataItem.
                format: int32
                type: integer
              labels:
                additionalProperties:
                  type: string
                description: The labels with user-defined metadata to organize your
                  DataLabelingJobs.
                type: object
              location:
                description: The location of this resource.
                type: string
              projectRef:
                description: The project that this resource belongs to.
                properties:
                  external:
                    description: The `projectID` field of a project, when not managed
                      by Config Connector.
                    type: string
                  kind:
                    description: The kind of the Project resource; optional but must
                      be `Project` if provided.
                    type: string
                  name:
                    description: The `name` field of a `Project` resource.
                    type: string
                  namespace:
                    description: The `namespace` field of a `Project` resource.
                    type: string
                type: object
              resourceID:
                description: The VertexAIDataLabelingJob name. If not given, the metadata.name
                  will be used.
                type: string
              specialistPools:
                description: The SpecialistPools' resource names associated with this
                  job.
                items:
                  type: string
                type: array
            required:
            - location
            - projectRef
            type: object
          status:
            description: VertexAIDataLabelingJobStatus defines the config connector
              machine state of VertexAIDataLabelingJob
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  object's current state.
                items:
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      type: string
                    message:
                      description: Human-readable message indicating details about
                        last transition.
                      type: string
                    reason:
                      description: |-
                        Unique, one-word, CamelCase reason for the condition's last
                        transition.
                      type: string
                    status:
                      description: Status is the status of the condition. Can be True,
                        False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the condition.
                      type: string
                  type: object
                type: array
              externalRef:
                description: A unique specifier for the VertexAIDataLabelingJob resource
                  in GCP.
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation of the resource
                  that was most recently observed by the Config Connector controller.
                  If this is equal to metadata.generation, then that means that the
                  current reported status reflects the most recent desired state of
                  the resource.
                format: int64
                type: integer
              observedState:
                description: ObservedState is the state of the resource as most recently
                  observed in GCP.
                properties:
                  createTime:
                    description: Output only. Timestamp when this DataLabelingJob
                      was created.
                    type: string
                  currentSpend:
                    description: |-
                      Output only. Estimated cost(in US dollars) that the DataLabelingJob has
                      incurred to date.
                    properties:
                      currencyCode:
                        description: The three-letter currency code defined in ISO
                          4217.
                        type: string
                      nanos:
                        description: |-
                          Number of nano (10^-9) units of the amount.
                           The value must be between -999,999,999 and +999,999,999 inclusive.
                           If `units` is positive, `nanos` must be positive or zero.
                           If `units` is zero, `nanos` can be positive, zero, or negative.
                           If `units` is negative, `nanos` must be negative or zero.
                           For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
                        format: int32
                        type: integer
                      units:
                        description: |-
                          The whole units of the amount.
                           For example if `currencyCode` is `"USD"`, then 1 unit is one US dollar.
                        format: int64
                        type: integer
                    type: object
                  error:
                    description: |-
                      Output only. DataLabelingJob errors. It is only populated when job's state
                      is `JOB_STATE_FAILED` or `JOB_STATE_CANCELLED`.
                    properties:
                      code:
                        description: |-
                          The status code, which should be an enum value of
                           [google.rpc.Code][google.rpc.Code].
                        format: int32
                        type: integer
                      details:
                        description: |-
                          A list of messages that carry the error details.  There is a common set of
                           message types for APIs to use.
                        items:
                          properties:
                            typeURL:
                              description: |-
                                A URL/resource name that uniquely identifies the type of the serialized
                                 protocol buffer message. This string must contain at least
                                 one "/" character. The last segment of the URL's path must represent
                                 the fully qualified name of the type (as in
                                 `path/google.protobuf.Duration`). The name should be in a canonical form
                                 (e.g., leading "." is not accepted).

                                 In practice, teams usually precompile into the binary all types that they
                                 expect it to use in the context of Any. However, for URLs which use the
                                 scheme `http`, `https`, or no scheme, one can optionally set up a type
                                 server that maps type URLs to message definitions as follows:

                                 * If no scheme is provided, `https` is assumed.
                                 * An HTTP GET on the URL must yield a [google.protobuf.Type][]
                                   value in binary format, or produce an error.
                                 * Applications are allowed to cache lookup results based on the
                                   URL, or have them precompiled into a binary to avoid any
                                   lookup. Therefore, binary compatibility needs to be preserved
                                   on changes to types. (Use versioned type names to manage
                                   breaking changes.)

                                 Note: this functionality is not currently available in the official
                                 protobuf release, and it is not used for type URLs beginning with
                                 type.googleapis.com.

                                 Schemes other than `http`, `https` (or the empty scheme) might be
                                 used with implementation specific semantics.
                              type: string
                            value:
                              description: Must be a valid serialized protocol buffer
                                of the above specified type.
                              format: byte
                              type: string
                          type: object
                        type: array
                      message:
                        description: |-
                          A developer-facing error message, which should be in English. Any
                           user-facing error message should be localized and sent in the
                           [google.rpc.Status.details][google.rpc.Status.details] field, or localized
                           by the client.
                        type: string
                    type: object
                  labelingProgress:
                    description: |-
                      Output only. Current labeling job progress percentage scaled in interval
                      [0, 100], indicating the percentage of DataItems that has been finished.
                    format: int32
                    type: integer
                  name:
                    description: Output only. Resource name of the DataLabelingJob.
                    type: string
                  state:
                    description: Output only. The detailed state of the job.
                    type: string
                  updateTime:
                    description: Output only. Timestamp when this DataLabelingJob
                      was updated most recently.
                    type: string
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
