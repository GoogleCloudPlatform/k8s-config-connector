apiVersion: monitoring.cnrm.cloud.google.com/v1beta1
kind: MonitoringDashboard
metadata:
  name: kcc-metrics
  namespace: ${NAMESPACE?} # Replace with your Config Connector managed namespace
spec:
  projectRef:
    # Replace ${PROJECT_ID?} with your project ID
    external: "projects/${PROJECT_ID?}"
  displayName: "Config Connector (KCC) Metrics"
  mosaicLayout:
    columns: 12
    tiles:
    - height: 4
      widget:
        scorecard:
          timeSeriesQuery:
            timeSeriesFilter:
              aggregation:
                alignmentPeriod: 60s
                crossSeriesReducer: REDUCE_SUM
                perSeriesAligner: ALIGN_MEAN
              filter: metric.type="prometheus.googleapis.com/configconnector_applied_resources_total/gauge" AND resource.type="prometheus_target"
        title: Total Managed Resources
      width: 6
      xPos: 0
      yPos: 0
    - height: 4
      widget:
        title: Reconciliation Errors by Kind
        xyChart:
          chartOptions:
            mode: COLOR
          dataSets:
          - minAlignmentPeriod: 60s
            plotType: STACKED_BAR
            targetAxis: Y1
            timeSeriesQuery:
              timeSeriesFilter:
                aggregation:
                  alignmentPeriod: 60s
                  crossSeriesReducer: REDUCE_SUM
                  groupByFields:
                  - metric.label."group_version_kind"
                  perSeriesAligner: ALIGN_RATE
                filter: metric.type="prometheus.googleapis.com/configconnector_reconcile_requests_total/counter" AND resource.type="prometheus_target" AND metric.label."status"="ERROR"
          timeshiftDuration: 0s
          yAxis:
            label: y1Axis
            scale: LINEAR
      width: 6
      xPos: 6
      yPos: 0
    - height: 4
      widget:
        title: Reconciliation Latency (Duration)
        xyChart:
          chartOptions:
            mode: COLOR
          dataSets:
          - minAlignmentPeriod: 60s
            plotType: LINE
            targetAxis: Y1
            timeSeriesQuery:
              timeSeriesFilter:
                aggregation:
                  alignmentPeriod: 60s
                  crossSeriesReducer: REDUCE_PERCENTILE_99
                  groupByFields:
                  - metric.label."group_version_kind"
                  perSeriesAligner: ALIGN_DELTA
                filter: metric.type="prometheus.googleapis.com/configconnector_reconcile_request_duration_seconds/histogram" AND resource.type="prometheus_target"
          timeshiftDuration: 0s
          yAxis:
            label: y1Axis
            scale: LINEAR
      width: 12
      xPos: 0
      yPos: 4
    - height: 4
      widget:
        title: Working Set Memory (cnrm-system)
        xyChart:
          chartOptions:
            mode: COLOR
          dataSets:
          - minAlignmentPeriod: 60s
            plotType: LINE
            targetAxis: Y1
            timeSeriesQuery:
              timeSeriesFilter:
                aggregation:
                  alignmentPeriod: 60s
                  crossSeriesReducer: REDUCE_SUM
                  groupByFields:
                  - resource.label."pod_name"
                  perSeriesAligner: ALIGN_MEAN
                filter: metric.type="kubernetes.io/container/memory/used_bytes" AND resource.type="k8s_container" AND resource.label."namespace_name"="cnrm-system"
          timeshiftDuration: 0s
          yAxis:
            label: y1Axis
            scale: LINEAR
      width: 4
      xPos: 0
      yPos: 8
    - height: 4
      widget:
        title: CPU Core Usage (cnrm-system)
        xyChart:
          chartOptions:
            mode: COLOR
          dataSets:
          - minAlignmentPeriod: 60s
            plotType: LINE
            targetAxis: Y1
            timeSeriesQuery:
              timeSeriesFilter:
                aggregation:
                  alignmentPeriod: 60s
                  crossSeriesReducer: REDUCE_SUM
                  groupByFields:
                  - resource.label."pod_name"
                  perSeriesAligner: ALIGN_RATE
                filter: metric.type="kubernetes.io/container/cpu/core_usage_time" AND resource.type="k8s_container" AND resource.label."namespace_name"="cnrm-system"
          timeshiftDuration: 0s
          yAxis:
            label: y1Axis
            scale: LINEAR
      width: 4
      xPos: 4
      yPos: 8
    - height: 4
      widget:
        title: Container Restarts (cnrm-system)
        xyChart:
          chartOptions:
            mode: COLOR
          dataSets:
          - minAlignmentPeriod: 60s
            plotType: STACKED_BAR
            targetAxis: Y1
            timeSeriesQuery:
              timeSeriesFilter:
                aggregation:
                  alignmentPeriod: 60s
                  crossSeriesReducer: REDUCE_SUM
                  groupByFields:
                  - resource.label."pod_name"
                  perSeriesAligner: ALIGN_DELTA
                filter: metric.type="kubernetes.io/container/restart_count" AND resource.type="k8s_container" AND resource.label."namespace_name"="cnrm-system"
          timeshiftDuration: 0s
          yAxis:
            label: y1Axis
            scale: LINEAR
      width: 4
      xPos: 8
      yPos: 8
