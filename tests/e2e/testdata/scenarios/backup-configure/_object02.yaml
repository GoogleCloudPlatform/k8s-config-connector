apiVersion: batch/v1
kind: CronJob
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  generation: 1
  name: cnrm-backup-daily
  namespace: ${projectId}
spec:
  concurrencyPolicy: Allow
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      labels:
        app: cnrm-backup
    spec:
      template:
        metadata:
          labels:
            app: cnrm-backup
        spec:
          containers:
          - command:
            - config-connector
            - backup
            - create
            - --bucket
            - config-bucket-${uniqueId}
            - --project
            - ${projectId}
            - --namespace
            - ${projectId}
            image: gcr.io/gke-release/cnrm/config-connector-cli:1.145.0
            imagePullPolicy: IfNotPresent
            name: backup
            resources: {}
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          restartPolicy: OnFailure
          schedulerName: default-scheduler
          securityContext: {}
          serviceAccount: cnrm-backup-manager
          serviceAccountName: cnrm-backup-manager
          terminationGracePeriodSeconds: 30
  schedule: 0 0 * * *
  successfulJobsHistoryLimit: 3
  suspend: false
status: {}
