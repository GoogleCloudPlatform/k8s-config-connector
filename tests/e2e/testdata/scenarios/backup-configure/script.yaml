# Step 0: Run backup configure
apiVersion: RunCLI
kind: RunCLI
TEST: SKIP_HTTP
args:
  - backup
  - configure
  - --project
  - ${projectId}
  - --bucket
  - config-bucket-${uniqueId}
  - --namespace
  - ${namespace}
---
# Step 1: Verify StorageBucket created by configure
apiVersion: storage.cnrm.cloud.google.com/v1beta1
kind: StorageBucket
TEST: SKIP_HTTP
metadata:
  name: config-bucket-${uniqueId}
  namespace: ${namespace}
spec:
  location: us-central1
---
# Step 2: Verify CronJob created by configure
apiVersion: batch/v1
kind: CronJob
TEST: SKIP_HTTP
metadata:
  name: cnrm-backup-daily
  namespace: ${namespace}
spec:
  schedule: "0 0 * * *"
