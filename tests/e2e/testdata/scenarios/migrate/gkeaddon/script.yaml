apiVersion: core.cnrm.cloud.google.com/v1beta1
kind: ConfigConnector
metadata:
  name: configconnector.core.cnrm.cloud.google.com
spec:
  mode: cluster
---
apiVersion: storage.cnrm.cloud.google.com/v1beta1
kind: StorageBucket
metadata:
  name: storagebucket-${uniqueId}
spec:
  location: US
---
# Step 2: Prepare migration
kind: RunCLI
args: [ "migrate", "gke-addon", "prepare", "--output=backup.yaml" ]
---
# Step 3: Verify CC is paused
TEST: READ-OBJECT
apiVersion: core.cnrm.cloud.google.com/v1beta1
kind: ConfigConnector
metadata:
  name: configconnector.core.cnrm.cloud.google.com
---
# Step 4: Verify Bucket has no finalizers
TEST: READ-OBJECT
apiVersion: storage.cnrm.cloud.google.com/v1beta1
kind: StorageBucket
metadata:
  name: storagebucket-${uniqueId}
---
# Step 5: Finish migration
kind: RunCLI
args: [ "migrate", "gke-addon", "finish", "--input=backup.yaml" ]
---
# Step 6: Verify CC is resumed
TEST: READ-OBJECT
apiVersion: core.cnrm.cloud.google.com/v1beta1
kind: ConfigConnector
metadata:
  name: configconnector.core.cnrm.cloud.google.com
---
# Step 7: Verify Bucket still exists (re-applied)
TEST: READ-OBJECT
apiVersion: storage.cnrm.cloud.google.com/v1beta1
kind: StorageBucket
metadata:
  name: storagebucket-${uniqueId}
