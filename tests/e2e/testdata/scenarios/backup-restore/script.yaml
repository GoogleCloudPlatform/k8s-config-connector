# Step 0: Create a Storage Bucket for backups
apiVersion: storage.cnrm.cloud.google.com/v1beta1
kind: StorageBucket
metadata:
  name: backup-bucket-${uniqueId}
spec:
  location: us-central1
---
# Step 1: Create a dummy resource to backup
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: backup-test-network-${uniqueId}
spec:
  autoCreateSubnetworks: false
---
# Step 2: Trigger a manual backup using the CLI
apiVersion: RunCLI
kind: RunCLI
args:
  - backup
  - create
  - --project
  - ${projectId}
  - --bucket
  - backup-bucket-${uniqueId}
---
# Step 3: Verify backup status in GCS
apiVersion: RunCLI
kind: RunCLI
args:
  - backup
  - status
  - --project
  - ${projectId}
  - --bucket
  - backup-bucket-${uniqueId}
