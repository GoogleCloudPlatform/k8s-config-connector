---
# Step 1: Create RedisInstance with read replicas disabled
apiVersion: redis.cnrm.cloud.google.com/v1beta1
kind: RedisInstance
metadata:
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: direct
  name: redisinstance-${uniqueId}
spec:
  displayName: Initial Display Name
  memorySizeGb: 1
  region: us-central1
  tier: STANDARD_HA
  replicaCount: 1
  reservedIpRange: test-range-reserved
---
# Step 2: Enable read replicas and set secondaryIpRange.
# Secondary ip range can only be set during Update request on read-replica disabled instance.
# The update should SUCCEED.
apiVersion: redis.cnrm.cloud.google.com/v1beta1
kind: RedisInstance
metadata:
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: direct
  name: redisinstance-${uniqueId}
spec:
  displayName: Initial Display Name
  memorySizeGb: 1
  region: us-central1
  tier: STANDARD_HA
  replicaCount: 1
  readReplicasMode: READ_REPLICAS_ENABLED
  reservedIpRange: test-range-reserved
  secondaryIpRange: test-range-secondary
---
# Step 3: Update replicaCount to trigger a re-reconciliation.
# The update should SUCCEED with diff suppression in direct controller.
apiVersion: redis.cnrm.cloud.google.com/v1beta1
kind: RedisInstance
metadata:
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: direct
  name: redisinstance-${uniqueId}
spec:
  displayName: Initial Display Name
  memorySizeGb: 1
  region: us-central1
  tier: STANDARD_HA
  replicaCount: 2
  readReplicasMode: READ_REPLICAS_ENABLED
  reservedIpRange: test-range-reserved
  secondaryIpRange: test-range-secondary
---
# Step 4: Update secondaryIpRange to "auto".
# The update should FAIL, updating secondaryIpRange on existing instances already have READ_REPLICAS_ENABLED is not allowed.
apiVersion: redis.cnrm.cloud.google.com/v1beta1
kind: RedisInstance
metadata:
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: direct
  name: redisinstance-${uniqueId}
spec:
  displayName: Initial Display Name
  memorySizeGb: 1
  region: us-central1
  tier: STANDARD_HA
  replicaCount: 2
  readReplicasMode: READ_REPLICAS_ENABLED
  reservedIpRange: test-range-reserved
  secondaryIpRange: auto