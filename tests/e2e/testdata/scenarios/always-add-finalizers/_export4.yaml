apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeForwardingRule
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  labels:
    managed-by-cnrm: "true"
  name: forwardingrule-${uniqueId}
spec:
  allowGlobalAccess: true
  backendServiceRef:
    external: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1/backendServices/computebackendservice-${uniqueId}
  description: ""
  ipAddress:
    ip: 10.0.1.2
  ipProtocol: TCP
  loadBalancingScheme: INTERNAL
  location: us-central1
  networkRef:
    external: https://www.googleapis.com/compute/beta/projects/${projectId}/global/networks/network-${uniqueId}
  networkTier: PREMIUM
  ports:
  - "443"
  resourceID: forwardingrule-${uniqueId}
  subnetworkRef:
    external: https://www.googleapis.com/compute/beta/projects/${projectId}/regions/us-central1/subnetworks/subnetwork-${uniqueId}