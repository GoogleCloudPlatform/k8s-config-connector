# Create primary with ENTERPRISE_PLUS
# * Primary should have backup and PITR enabled to support switchover
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: original-primary-${uniqueId}
spec:
  databaseVersion: POSTGRES_15
  region: us-east1
  settings:
    tier: db-perf-optimized-N-2
    edition: ENTERPRISE_PLUS
    backupConfiguration:
      enabled: true
      pointInTimeRecoveryEnabled: true
---
# Create replica with ENTERPRISE_PLUS
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: original-replica-${uniqueId}
spec:
  databaseVersion: POSTGRES_15
  region: us-west2
  masterInstanceRef:
    name: original-primary-${uniqueId}
  # TODO: instanceType is immutable (and is it input or output?)
  instanceType: READ_REPLICA_INSTANCE
  settings:
    tier: db-perf-optimized-N-2
    edition: ENTERPRISE_PLUS
---
# We designate the replica as DR replica of the primary
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: original-primary-${uniqueId}
spec:
  databaseVersion: POSTGRES_15
  region: us-east1
  settings:
    tier: db-perf-optimized-N-2
    edition: ENTERPRISE_PLUS
    backupConfiguration:
      enabled: true
      pointInTimeRecoveryEnabled: true
  #replicaNames:
  #- original-replica-${uniqueId}
  replicationCluster:
    failoverDrReplicaRef:
      name: original-replica-${uniqueId}
---
# Make sure the original primary does not reconcile during the switchover.
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: original-primary-${uniqueId}
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
spec:
  databaseVersion: POSTGRES_15
  region: us-east1
  settings:
    tier: db-perf-optimized-N-2
    edition: ENTERPRISE_PLUS
    backupConfiguration:
      enabled: true
      pointInTimeRecoveryEnabled: true
  #replicaNames:
  #- original-replica-${uniqueId}
  replicationCluster:
    failoverDrReplicaRef:
      name: original-replica-${uniqueId}
---
# Switchover: Promote Replica to Primary
# * Change instanceType to CLOUD_SQL_INSTANCE
# * Remove masterInstanceRef
# * Add replicationCluster.failoverDrReplicaRef
# * Add replicaNames (TODO)
# * Configure settings.backupConfiguration
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: original-replica-${uniqueId}
spec:
  databaseVersion: POSTGRES_15
  region: us-west2
  instanceType: CLOUD_SQL_INSTANCE
  #replicaNames:
  #  - original-primary-${uniqueId}
  replicationCluster:
    failoverDrReplicaRef:
      name: original-primary-${uniqueId}
  settings:
    tier: db-perf-optimized-N-2
    edition: ENTERPRISE_PLUS
    backupConfiguration:
      enabled: true
      pointInTimeRecoveryEnabled: true
---
# Demote Old Primary to Replica
# * Change instanceType to READ_REPLICA_INSTANCE
# * Add masterInstanceRef
# * Remove replicationCluster.failoverDrReplicaRef
# * Remove replica from replicaNames
# * Configure settings.backupConfiguration
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: original-primary-${uniqueId}
spec:
  databaseVersion: POSTGRES_15
  region: us-east1
  masterInstanceRef:
    name: original-replica-${uniqueId}
  instanceType: READ_REPLICA_INSTANCE
  settings:
    tier: db-perf-optimized-N-2
    edition: ENTERPRISE_PLUS
    backupConfiguration:
      enabled: false
      pointInTimeRecoveryEnabled: false
---
# Manually verify that there's no continuous-re-reconciliation
TEST: TOUCH
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: original-primary-${uniqueId}
---
# Manually verify that there's no continuous-re-reconciliation
TEST: TOUCH
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: original-replica-${uniqueId}
