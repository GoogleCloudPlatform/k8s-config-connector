# Test scenario: Create a ComputeGlobalNetworkEndpoint with INTERNET_IP_PORT NEG
# using only ipAddress (no fqdn). This validates the IP-only code path of the
# direct controller.
---
apiVersion: compute.cnrm.cloud.google.com/v1alpha1
kind: ComputeGlobalNetworkEndpointGroup
metadata:
  name: computeneggroup-${uniqueId}
spec:
  projectRef:
    external: ${TEST_PROJECT_ID}
  networkEndpointType: INTERNET_IP_PORT
  defaultPort: 80
---
apiVersion: compute.cnrm.cloud.google.com/v1alpha1
kind: ComputeGlobalNetworkEndpoint
metadata:
  name: computeglobalnetworkendpoint-${uniqueId}
spec:
  projectRef:
    external: ${TEST_PROJECT_ID}
  globalNetworkEndpointGroup: computeneggroup-${uniqueId}
  port: 80
  ipAddress: "8.8.8.8"
