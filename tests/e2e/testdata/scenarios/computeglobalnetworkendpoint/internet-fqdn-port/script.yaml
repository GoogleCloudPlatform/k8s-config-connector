# Test scenario: Create a ComputeGlobalNetworkEndpoint with INTERNET_FQDN_PORT NEG
# using only fqdn (no ipAddress). This tests fix for issue #4541 where the TF2CRD
# controller would fail with "unable to resolve missing value: ip_address".
---
apiVersion: compute.cnrm.cloud.google.com/v1alpha1
kind: ComputeGlobalNetworkEndpointGroup
metadata:
  name: computeneggroup-${uniqueId}
spec:
  projectRef:
    external: ${TEST_PROJECT_ID}
  networkEndpointType: INTERNET_FQDN_PORT
  defaultPort: 443
---
apiVersion: compute.cnrm.cloud.google.com/v1alpha1
kind: ComputeGlobalNetworkEndpoint
metadata:
  name: computeglobalnetworkendpoint-${uniqueId}
spec:
  projectRef:
    external: ${TEST_PROJECT_ID}
  globalNetworkEndpointGroup: computeneggroup-${uniqueId}
  port: 443
  fqdn: "example.com"
