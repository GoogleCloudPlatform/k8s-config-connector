# Create dependencies.
apiVersion: storage.cnrm.cloud.google.com/v1beta1
kind: StorageBucket
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  name: computebbkey-noupdate-${uniqueId}
spec:
  location: us-central1
  uniformBucketLevelAccess: true
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeBackendBucket
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  name: computebbkey-noupdate-${uniqueId}
spec:
  bucketRef:
    name: computebbkey-noupdate-${uniqueId}
  enableCdn: true
  cdnPolicy:
    signedUrlCacheMaxAgeSec: 0
---
apiVersion: v1
kind: Secret
metadata:
  name: signing-key-noupdate-${uniqueId}
stringData:
  storage-signing-key: "AAAAAAAAAAAAAAAAAAAAAA"
---
# Create the signed URL key.
apiVersion: compute.cnrm.cloud.google.com/v1alpha1
kind: ComputeBackendBucketSignedURLKey
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  name: computebbkey-noupdate-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  backendBucketRef:
    external: computebbkey-noupdate-${uniqueId}
  keyValue:
    valueFrom:
      secretKeyRef:
        name: signing-key-noupdate-${uniqueId}
        key: storage-signing-key
---
# TOUCH triggers a second reconcile cycle.
# The controller's Update() is a no-op; the key must remain present and the
# resource must stay Ready. Verifies that the immutable resource is not re-created
# on every reconcile (which would cause a GCP error "key already exists").
TEST: TOUCH
apiVersion: compute.cnrm.cloud.google.com/v1alpha1
kind: ComputeBackendBucketSignedURLKey
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  name: computebbkey-noupdate-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  backendBucketRef:
    external: computebbkey-noupdate-${uniqueId}
  keyValue:
    valueFrom:
      secretKeyRef:
        name: signing-key-noupdate-${uniqueId}
        key: storage-signing-key
