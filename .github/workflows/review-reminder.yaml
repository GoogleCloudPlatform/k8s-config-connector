name: review-reminder

on:
  schedule:
    # Run twice daily at 9:00 AM and 2:00 PM UTC
    - cron: '0 9,14 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: master

      - name: Authenticate to GCP via Service Account Key
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          credentials_json: ${{ secrets.EMAIL_SA_KEY }}
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/chat.messages.create'

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Gather open PRs and send email via Gmail API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDSDK_AUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          python3 -c '
          import os, subprocess, json, urllib.request, email.message, base64

          team_users = ["acpana", "anfernee", "anhdle-sso", "barney-s", "gemmahou", "ldanielmadariaga", "maqiuyujoyce"]
          email_sections = []
          has_prs = False

          for user in team_users:
              cmd = [
                  "gh", "pr", "list",
                  "--repo", "GoogleCloudPlatform/k8s-config-connector",
                  "--search", f"user-review-requested:{user} state:open",
                  "--json", "url"
              ]
              res = subprocess.run(cmd, capture_output=True, text=True)
              if res.returncode == 0:
                  prs = json.loads(res.stdout)
                  if prs:
                      has_prs = True
                      urls = "\n".join(["* " + pr["url"] for pr in prs])
                      email_sections.append(f"{user}:\n{urls}")
              else:
                  print(f"Error fetching PRs for {user}: returncode={res.returncode} stderr={res.stderr}")

          if not has_prs:
              print("No open PRs pending review. Exiting.")
              exit(0)

          # Replace <SPACE_ID> with the actual Google Chat Space ID from the room URL
          # Room URL format: https://chat.google.com/room/<SPACE_ID>
          space_id = "AAAAxxx_yyy" # TODO: Update with actual Space ID
          
          body = "Hi team,\n\nThis is a friendly reminder of open PRs that need your review:\n\n" + "\n\n".join(email_sections)

          access_token = os.environ.get("CLOUDSDK_AUTH_ACCESS_TOKEN")
          if not access_token:
              print("CLOUDSDK_AUTH_ACCESS_TOKEN not found. Exiting.")
              exit(1)

          req = urllib.request.Request(
              f"https://chat.googleapis.com/v1/spaces/{space_id}/messages",
              data=json.dumps({"text": body}).encode(),
              headers={
                  "Authorization": f"Bearer {access_token}",
                  "Content-Type": "application/json"
              }
          )
          with urllib.request.urlopen(req) as resp:
              print("Notification sent successfully to Google Chat. Response code:", resp.status)
          '
