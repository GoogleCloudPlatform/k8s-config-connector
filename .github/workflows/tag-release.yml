name: Tag Release

on:
  pull_request:
    types: [closed]
    branches:
      - master
      - 'release-*'

jobs:
  tag-release:
    # Only run if the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true && github.repository == 'GoogleCloudPlatform/k8s-config-connector'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: "Check for version change"
        id: check_version
        run: |
          # Use the PR's specific commit range to check for changes
          # This ensures that even if batched, we only look at THIS PR's files
          if git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -q "version/VERSION"; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: "Set git user"
        if: steps.check_version.outputs.version_changed == 'true'
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions Release Tagger"
      
      - name: "Run tag script"
        if: steps.check_version.outputs.version_changed == 'true'
        run: |
          # Pass the PR SHA directly to the script
          ./dev/tasks/auto-tag-on-version-update.sh ${{ github.sha }}