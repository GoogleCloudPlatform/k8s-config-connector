fullname:
- spec
shortname: spec
description: PubSubSubscriptionSpec defines the desired state of PubSubSubscription
type: object
format: ""
requirementlevel: Required
children:
- fullname:
  - spec
  - ackDeadlineSeconds
  shortname: ackDeadlineSeconds
  description: This value is the maximum time after a subscriber receives a message
    before the subscriber should acknowledge the message.
  type: integer
  format: int32
  requirementlevel: Optional
  children: []
  additionalproperties: []
- fullname:
  - spec
  - bigqueryConfig
  shortname: bigqueryConfig
  description: If delivery to BigQuery is used with this subscription, this field
    is used to configure it. Either pushConfig, bigQueryConfig or cloudStorageConfig
    can be set, but not combined. If all three are empty, then the subscriber will
    pull and ack messages using API methods.
  type: object
  format: ""
  requirementlevel: Optional
  children:
  - fullname:
    - spec
    - bigqueryConfig
    - dropUnknownFields
    shortname: dropUnknownFields
    description: When true and useTopicSchema is true, any fields that are a part
      of the topic schema that are not part of the BigQuery table schema are dropped
      when writing to BigQuery. Otherwise, the schemas must be kept in sync and any
      messages with extra fields are not written and remain in the subscription's
      backlog.
    type: boolean
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - bigqueryConfig
    - tableRef
    shortname: tableRef
    description: The name of the table to which to write data.
    type: object
    format: ""
    requirementlevel: RequiredWhenParentPresent
    children:
    - fullname:
      - spec
      - bigqueryConfig
      - tableRef
      - external
      shortname: external
      description: A reference to an externally-managed BigQueryTable resource. Should
        be in the format "projects/{{projectID}}/datasets/{{datasetID}}/tables/{{tableID}}".
      type: string
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    - fullname:
      - spec
      - bigqueryConfig
      - tableRef
      - name
      shortname: name
      description: The name of a BigQueryTable resource.
      type: string
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    - fullname:
      - spec
      - bigqueryConfig
      - tableRef
      - namespace
      shortname: namespace
      description: The namespace of a BigQueryTable resource.
      type: string
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    additionalproperties: []
  - fullname:
    - spec
    - bigqueryConfig
    - useTopicSchema
    shortname: useTopicSchema
    description: When true, use the topic's schema as the columns to write to in BigQuery,
      if it exists.
    type: boolean
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - bigqueryConfig
    - writeMetadata
    shortname: writeMetadata
    description: When true, write the subscription name, messageId, publishTime, attributes,
      and orderingKey to additional columns in the table. The subscription name, messageId,
      and publishTime fields are put in their own columns while all other message
      properties (other than data) are written to a JSON object in the attributes
      column.
    type: boolean
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  additionalproperties: []
- fullname:
  - spec
  - cloudStorageConfig
  shortname: cloudStorageConfig
  description: If delivery to Cloud Storage is used with this subscription, this field
    is used to configure it. Either pushConfig, bigQueryConfig or cloudStorageConfig
    can be set, but not combined. If all three are empty, then the subscriber will
    pull and ack messages using API methods.
  type: object
  format: ""
  requirementlevel: Optional
  children:
  - fullname:
    - spec
    - cloudStorageConfig
    - avroConfig
    shortname: avroConfig
    description: If set, message data will be written to Cloud Storage in Avro format.
    type: object
    format: ""
    requirementlevel: Optional
    children:
    - fullname:
      - spec
      - cloudStorageConfig
      - avroConfig
      - writeMetadata
      shortname: writeMetadata
      description: When true, write the subscription name, messageId, publishTime,
        attributes, and orderingKey as additional fields in the output.
      type: boolean
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    additionalproperties: []
  - fullname:
    - spec
    - cloudStorageConfig
    - bucketRef
    shortname: bucketRef
    description: User-provided name for the Cloud Storage bucket. The bucket must
      be created by the user. The bucket name must be without any prefix like "gs://".
    type: object
    format: ""
    requirementlevel: RequiredWhenParentPresent
    children:
    - fullname:
      - spec
      - cloudStorageConfig
      - bucketRef
      - external
      shortname: external
      description: A reference to an externally managed StorageBucket resource. Should
        be in the format "projects/{{projectID}}/buckets/{{bucketID}}".
      type: string
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    - fullname:
      - spec
      - cloudStorageConfig
      - bucketRef
      - name
      shortname: name
      description: The name of a StorageBucket resource.
      type: string
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    - fullname:
      - spec
      - cloudStorageConfig
      - bucketRef
      - namespace
      shortname: namespace
      description: The namespace of a StorageBucket resource.
      type: string
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    additionalproperties: []
  - fullname:
    - spec
    - cloudStorageConfig
    - filenamePrefix
    shortname: filenamePrefix
    description: User-provided prefix for Cloud Storage filename.
    type: string
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - cloudStorageConfig
    - filenameSuffix
    shortname: filenameSuffix
    description: User-provided suffix for Cloud Storage filename. Must not end in
      "/".
    type: string
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - cloudStorageConfig
    - maxBytes
    shortname: maxBytes
    description: The maximum bytes that can be written to a Cloud Storage file before
      a new file is created. Min 1 KB, max 10 GiB. The maxBytes limit may be exceeded
      in cases where messages are larger than the limit.
    type: integer
    format: int64
    requirementlevel: Optional
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - cloudStorageConfig
    - maxDuration
    shortname: maxDuration
    description: 'The maximum duration that can elapse before a new Cloud Storage
      file is created. Min 1 minute, max 10 minutes, default 5 minutes. May not exceed
      the subscription''s acknowledgement deadline. A duration in seconds with up
      to nine fractional digits, ending with ''s''. Example: "3.5s".'
    type: string
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - cloudStorageConfig
    - state
    shortname: state
    description: An output-only field that indicates whether or not the subscription
      can receive messages.
    type: string
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  additionalproperties: []
- fullname:
  - spec
  - deadLetterPolicy
  shortname: deadLetterPolicy
  description: A policy that specifies the conditions for dead lettering messages
    in this subscription. If dead_letter_policy is not set, dead lettering is disabled.
  type: object
  format: ""
  requirementlevel: Optional
  children:
  - fullname:
    - spec
    - deadLetterPolicy
    - deadLetterTopicRef
    shortname: deadLetterTopicRef
    description: The name of the topic to which dead letter messages should be published.
    type: object
    format: ""
    requirementlevel: Optional
    children:
    - fullname:
      - spec
      - deadLetterPolicy
      - deadLetterTopicRef
      - external
      shortname: external
      description: A reference to an externally managed PubSubTopic resource. Should
        be in the format "projects/{{projectID}}/topics/{{topicID}}".
      type: string
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    - fullname:
      - spec
      - deadLetterPolicy
      - deadLetterTopicRef
      - name
      shortname: name
      description: The name of a PubSubTopic resource.
      type: string
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    - fullname:
      - spec
      - deadLetterPolicy
      - deadLetterTopicRef
      - namespace
      shortname: namespace
      description: The namespace of a PubSubTopic resource.
      type: string
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    additionalproperties: []
  - fullname:
    - spec
    - deadLetterPolicy
    - maxDeliveryAttempts
    shortname: maxDeliveryAttempts
    description: The maximum number of delivery attempts for any message. The value
      must be between 5 and 100.
    type: integer
    format: int32
    requirementlevel: Optional
    children: []
    additionalproperties: []
  additionalproperties: []
- fullname:
  - spec
  - enableExactlyOnceDelivery
  shortname: enableExactlyOnceDelivery
  description: If 'true', Pub/Sub provides the guarantees for the delivery of a message
    with a given value of messageId on this Subscriptions'.
  type: boolean
  format: ""
  requirementlevel: Optional
  children: []
  additionalproperties: []
- fullname:
  - spec
  - enableMessageOrdering
  shortname: enableMessageOrdering
  description: Immutable. If 'true', messages published with the same orderingKey
    in PubsubMessage will be delivered to the subscribers in the order in which they
    are received by the Pub/Sub system. Otherwise, they may be delivered in any order.
  type: boolean
  format: ""
  requirementlevel: Optional
  children: []
  additionalproperties: []
- fullname:
  - spec
  - expirationPolicy
  shortname: expirationPolicy
  description: A policy that specifies the conditions for this subscription's expiration.
  type: object
  format: ""
  requirementlevel: Optional
  children:
  - fullname:
    - spec
    - expirationPolicy
    - ttl
    shortname: ttl
    description: Specifies the "time-to-live" duration for an associated resource.
      The resource expires if it is not active for a period of ttl. If ttl is set
      to "", the associated resource never expires. A duration in seconds with up
      to nine fractional digits, terminated by 's'. Example - "3.5s".
    type: string
    format: ""
    requirementlevel: RequiredWhenParentPresent
    children: []
    additionalproperties: []
  additionalproperties: []
- fullname:
  - spec
  - filter
  shortname: filter
  description: Immutable. The subscription only delivers the messages that match the
    filter.
  type: string
  format: ""
  requirementlevel: Optional
  children: []
  additionalproperties: []
- fullname:
  - spec
  - messageRetentionDuration
  shortname: messageRetentionDuration
  description: How long to retain unacknowledged messages in the subscription's backlog,
    from the moment a message is published.
  type: string
  format: ""
  requirementlevel: Optional
  children: []
  additionalproperties: []
- fullname:
  - spec
  - pushConfig
  shortname: pushConfig
  description: If push delivery is used with this subscription, this field is used
    to configure it. An empty pushConfig signifies that the subscriber will pull and
    ack messages using API methods.
  type: object
  format: ""
  requirementlevel: Optional
  children:
  - fullname:
    - spec
    - pushConfig
    - attributes
    shortname: attributes
    description: Endpoint configuration attributes.
    type: 'map (key: string, value: string)'
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - pushConfig
    - noWrapper
    shortname: noWrapper
    description: When set, the payload to the push endpoint is not wrapped.Sets the
      'data' field as the HTTP body for delivery.
    type: object
    format: ""
    requirementlevel: Optional
    children:
    - fullname:
      - spec
      - pushConfig
      - noWrapper
      - writeMetadata
      shortname: writeMetadata
      description: When true, writes the Pub/Sub message metadata to 'x-goog-pubsub-<KEY>:<VAL>'
        headers of the HTTP request. Writes the Pub/Sub message attributes to '<KEY>:<VAL>'
        headers of the HTTP request.
      type: boolean
      format: ""
      requirementlevel: RequiredWhenParentPresent
      children: []
      additionalproperties: []
    additionalproperties: []
  - fullname:
    - spec
    - pushConfig
    - oidcToken
    shortname: oidcToken
    description: If specified, Pub/Sub will generate and attach an OIDC JWT token
      as an Authorization header in the HTTP request for every pushed message.
    type: object
    format: ""
    requirementlevel: Optional
    children:
    - fullname:
      - spec
      - pushConfig
      - oidcToken
      - audience
      shortname: audience
      description: 'Audience to be used when generating OIDC token. The audience claim
        identifies the recipients that the JWT is intended for. The audience value
        is a single case-sensitive string. Having multiple values (array) for the
        audience field is not supported. More info about the OIDC JWT token audience
        here: https://tools.ietf.org/html/rfc7519#section-4.1.3 Note: if not specified,
        the Push endpoint URL will be used.'
      type: string
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    - fullname:
      - spec
      - pushConfig
      - oidcToken
      - serviceAccountEmail
      shortname: serviceAccountEmail
      description: Service account email to be used for generating the OIDC token.
        The caller (for subscriptions.create, subscriptions.patch, and subscriptions.modifyPushConfig
        RPCs) must have the iam.serviceAccounts.actAs permission for the service account.
      type: string
      format: ""
      requirementlevel: RequiredWhenParentPresent
      children: []
      additionalproperties: []
    additionalproperties: []
  - fullname:
    - spec
    - pushConfig
    - pushEndpoint
    shortname: pushEndpoint
    description: A URL locating the endpoint to which messages should be pushed. For
      example, a Webhook endpoint might use "https://example.com/push".
    type: string
    format: ""
    requirementlevel: RequiredWhenParentPresent
    children: []
    additionalproperties: []
  additionalproperties: []
- fullname:
  - spec
  - resourceID
  shortname: resourceID
  description: Immutable. Optional. The name of the resource. Used for creation and
    acquisition. When unset, the value of `metadata.name` is used as the default.
  type: string
  format: ""
  requirementlevel: Optional
  children: []
  additionalproperties: []
- fullname:
  - spec
  - retainAckedMessages
  shortname: retainAckedMessages
  description: Indicates whether to retain acknowledged messages. If 'true', then
    messages are not expunged from the subscription's backlog, even if they are acknowledged,
    until they fall out of the messageRetentionDuration window.
  type: boolean
  format: ""
  requirementlevel: Optional
  children: []
  additionalproperties: []
- fullname:
  - spec
  - retryPolicy
  shortname: retryPolicy
  description: A policy that specifies how Pub/Sub retries message delivery for this
    subscription.
  type: object
  format: ""
  requirementlevel: Optional
  children:
  - fullname:
    - spec
    - retryPolicy
    - maximumBackoff
    shortname: maximumBackoff
    description: 'The maximum delay between consecutive deliveries of a given message.
      Value should be between 0 and 600 seconds. Defaults to 600 seconds. A duration
      in seconds with up to nine fractional digits, terminated by ''s''. Example:
      "3.5s".'
    type: string
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - retryPolicy
    - minimumBackoff
    shortname: minimumBackoff
    description: 'The minimum delay between consecutive deliveries of a given message.
      Value should be between 0 and 600 seconds. Defaults to 10 seconds. A duration
      in seconds with up to nine fractional digits, terminated by ''s''. Example:
      "3.5s".'
    type: string
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  additionalproperties: []
- fullname:
  - spec
  - topicRef
  shortname: topicRef
  description: Reference to a PubSubTopic.
  type: object
  format: ""
  requirementlevel: Required
  children:
  - fullname:
    - spec
    - topicRef
    - external
    shortname: external
    description: A reference to an externally managed PubSubTopic resource. Should
      be in the format "projects/{{projectID}}/topics/{{topicID}}".
    type: string
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - topicRef
    - name
    shortname: name
    description: The name of a PubSubTopic resource.
    type: string
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - topicRef
    - namespace
    shortname: namespace
    description: The namespace of a PubSubTopic resource.
    type: string
    format: ""
    requirementlevel: Optional
    children: []
    additionalproperties: []
  additionalproperties: []
additionalproperties: []
