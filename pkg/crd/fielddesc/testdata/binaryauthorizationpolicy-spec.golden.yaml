fullname:
- spec
shortname: spec
description: BinaryAuthorizationPolicySpec defines the desired state of BinaryAuthorizationPolicy
type: object
format: ""
requirementlevel: Required
children:
- fullname:
  - spec
  - admissionWhitelistPatterns
  shortname: admissionWhitelistPatterns
  description: Optional. Admission policy allowlisting. A matching admission request
    will always be permitted. This feature is typically used to exclude Google or
    third-party infrastructure images from Binary Authorization policies.
  type: list (object)
  format: ""
  requirementlevel: Optional
  children:
  - fullname:
    - spec
    - admissionWhitelistPatterns
    - '[]'
    shortname: '[]'
    description: ""
    type: object
    format: ""
    requirementlevel: Optional
    children:
    - fullname:
      - spec
      - admissionWhitelistPatterns
      - '[]'
      - namePattern
      shortname: namePattern
      description: An image name pattern to allowlist, in the form `registry/path/to/image`.
        This supports a trailing `*` wildcard, but this is allowed only in text after
        the `registry/` part. This also supports a trailing `**` wildcard which matches
        subdirectories of a given entry.
      type: string
      format: ""
      requirementlevel: Optional
      children: []
      additionalproperties: []
    additionalproperties: []
  additionalproperties: []
- fullname:
  - spec
  - clusterAdmissionRules
  shortname: clusterAdmissionRules
  description: 'Optional. Per-cluster admission rules. Cluster spec format: location.clusterId.
    There can be at most one admission rule per cluster spec. A location is either
    a compute zone (e.g. us-central1-a) or a region (e.g. us-central1). For clusterId
    syntax restrictions see https://cloud.google.com/container-engine/reference/rest/v1/projects.zones.clusters.'
  type: 'map (key: string, value: object)'
  format: ""
  requirementlevel: Optional
  children: []
  additionalproperties:
  - fullname:
    - spec
    - clusterAdmissionRules
    - enforcementMode
    shortname: enforcementMode
    description: 'Required. The action when a pod creation is denied by the admission
      rule. Possible values: ENFORCEMENT_MODE_UNSPECIFIED, ENFORCED_BLOCK_AND_AUDIT_LOG,
      DRYRUN_AUDIT_LOG_ONLY'
    type: string
    format: ""
    requirementlevel: RequiredWhenParentPresent
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - clusterAdmissionRules
    - evaluationMode
    shortname: evaluationMode
    description: 'Required. How this admission rule will be evaluated. Possible values:
      ALWAYS_ALLOW, ALWAYS_DENY, REQUIRE_ATTESTATION'
    type: string
    format: ""
    requirementlevel: RequiredWhenParentPresent
    children: []
    additionalproperties: []
  - fullname:
    - spec
    - clusterAdmissionRules
    - requireAttestationsBy
    shortname: requireAttestationsBy
    description: |-
      Optional. The resource names of the attestors that must attest to
       a container image, in the format `projects/*/attestors/*`. Each
       attestor must exist before a policy can reference it.  To add an attestor
       to a policy the principal issuing the policy change request must be able
       to read the attestor resource.

       Note: this field must be non-empty when the evaluation_mode field specifies
       REQUIRE_ATTESTATION, otherwise it must be empty.
    type: list (object)
    format: ""
    requirementlevel: Optional
    children:
    - fullname:
      - spec
      - clusterAdmissionRules
      - requireAttestationsBy
      - '[]'
      shortname: '[]'
      description: ""
      type: object
      format: ""
      requirementlevel: Optional
      children:
      - fullname:
        - spec
        - clusterAdmissionRules
        - requireAttestationsBy
        - '[]'
        - external
        shortname: external
        description: A reference to an externally managed BinaryAuthorizationAttestor.
          Should be in the format `projects/[project_id]/attestors/[attestor_id]`.
        type: string
        format: ""
        requirementlevel: Optional
        children: []
        additionalproperties: []
      - fullname:
        - spec
        - clusterAdmissionRules
        - requireAttestationsBy
        - '[]'
        - name
        shortname: name
        description: The `name` of a `BinaryAuthorizationAttestor` resource.
        type: string
        format: ""
        requirementlevel: Optional
        children: []
        additionalproperties: []
      - fullname:
        - spec
        - clusterAdmissionRules
        - requireAttestationsBy
        - '[]'
        - namespace
        shortname: namespace
        description: The `namespace` of a `BinaryAuthorizationAttestor` resource.
        type: string
        format: ""
        requirementlevel: Optional
        children: []
        additionalproperties: []
      additionalproperties: []
    additionalproperties: []
