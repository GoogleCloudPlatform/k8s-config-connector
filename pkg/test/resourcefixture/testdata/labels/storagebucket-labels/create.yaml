apiVersion: storage.cnrm.cloud.google.com/v1beta1
kind: StorageBucket
metadata:
  labels:
    label-one: one
    label-two: two
  name: storagebucket-sample-${uniqueId}
spec:
  lifecycleRule:
  - action:
      type: Delete
    condition:
      age: 7
  softDeletePolicy:
    retentionDurationSeconds: 604800
  versioning:
    enabled: false
