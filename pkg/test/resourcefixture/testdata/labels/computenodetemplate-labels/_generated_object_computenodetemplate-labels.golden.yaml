apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNodeTemplate
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 1
  labels:
    cnrm-test: "true"
    label-one: two
    label-three: three
    label-two: two
  name: ${nodeTemplateID}
  namespace: ${uniqueId}
spec:
  description: Node template for sole tenant nodes running in us-central1, with 96vCPUs
    and any amount of memory on any machine type.
  nodeTypeFlexibility:
    cpus: "96"
    memory: any
  region: us-central1
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: 'Update call failed: error updating: ComputeNodeTemplate is immutable
      and cannot be updated'
    reason: UpdateFailed
    status: "False"
    type: Ready
  creationTimestamp: "1970-01-01T00:00:00Z"
  externalRef: projects/${projectId}/regions/us-central1/nodeTemplates/${nodeTemplateID}
  observedGeneration: 1
  selfLink: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1/nodeTemplates/${nodeTemplateID}
