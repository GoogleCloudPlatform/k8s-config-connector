apiVersion: dataflow.cnrm.cloud.google.com/v1beta1
kind: DataflowJob
metadata:
  annotations:
    cnrm.cloud.google.com/on-delete: cancel
    cnrm.cloud.google.com/project-id: ${projectId}
  labels:
    label-one: two
    label-three: three
  name: dataflowjob-${uniqueId}
spec:
  additionalExperiments:
  - enable_stackdriver_agent_metrics
  ipConfiguration: WORKER_IP_PUBLIC
  machineType: n1-standard-1
  maxWorkers: 3
  networkRef:
    name: default
  parameters:
    inputFile: gs://dataflow-samples/shakespeare/various.txt
    output: gs://storagebucket-${uniqueId}/output
  serviceAccountRef:
    name: gsa-${uniqueId}
  subnetworkRef:
    name: default
  tempGcsLocation: gs://storagebucket-${uniqueId}/tmp
  templateGcsPath: gs://dataflow-templates/2020-02-03-01_RC00/Word_Count
  zone: us-central1-a
