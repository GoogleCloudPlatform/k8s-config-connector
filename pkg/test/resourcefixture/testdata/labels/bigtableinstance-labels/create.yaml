apiVersion: bigtable.cnrm.cloud.google.com/v1beta1
kind: BigtableInstance
metadata:
  labels:
    label-one: one
    label-two: two
  name: btinstance-${uniqueId}
spec:
  cluster:
  - clusterId: cluster-1-${uniqueId}
