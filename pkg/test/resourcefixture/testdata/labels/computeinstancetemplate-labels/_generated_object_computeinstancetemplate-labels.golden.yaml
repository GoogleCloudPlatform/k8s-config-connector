apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeInstanceTemplate
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
    label-one: two
    label-three: three
    label-two: two
  name: ${instanceTemplateID}
  namespace: ${uniqueId}
spec:
  description: a basic instance template example
  disk:
  - autoDelete: false
    boot: true
    sourceDiskRef:
      name: ${diskID}
  - autoDelete: true
    boot: false
    sourceImageRef:
      name: ${imageID}
  machineType: n1-standard-1
  metadata:
  - key: foo
    value: bar
  - key: bar
    value: baz
  networkInterface:
  - networkRef:
      name: ${networkID}
    subnetworkRef:
      name: ${subnetworkID}
  region: us-central1
  resourceID: ${instanceTemplateID}
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: 'Update call failed: error applying desired state: summary: Error creating
      instance template: googleapi: Error 409: instanceTemplate "projects/${projectId}/global/instanceTemplates/${instanceTemplateID}"
      already exists'
    reason: UpdateFailed
    status: "False"
    type: Ready
  metadataFingerprint: AG7NZyadcU5zABXJL4GMwg==
  observedGeneration: 2
  selfLink: https://compute.googleapis.com/compute/v1/projects/${projectId}/global/instanceTemplates/${instanceTemplateID}
  selfLinkUnique: https://compute.googleapis.com/compute/v1/projects/${projectId}/global/instanceTemplates/${instanceTemplateID}?uniqueId=${instanceTemplateID}
