apiVersion: networksecurity.cnrm.cloud.google.com/v1beta1
kind: NetworkSecurityClientTLSPolicy
metadata:
  labels:
    label-one: two
    label-three: three
  name: networksecurityclienttlspolicy-${uniqueId}
spec:
