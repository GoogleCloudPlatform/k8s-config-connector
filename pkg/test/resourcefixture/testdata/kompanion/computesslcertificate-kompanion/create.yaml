apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSSLCertificate
metadata:
  name: computesslcertificate-kompanion-${uniqueId}
  namespace: ${projectId}
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
spec:
  description: ilbtest compute SSL certificate
  location: australia-southeast1
  certificate:
    valueFrom:
      secretKeyRef:
        key: tls.crt
        name: computesslcertificate-kompanion-secret-${uniqueId}
  privateKey:
    valueFrom:
      secretKeyRef:
        key: tls.key
        name: computesslcertificate-kompanion-secret-${uniqueId}
