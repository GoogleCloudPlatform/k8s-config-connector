apiVersion: certificatemanager.cnrm.cloud.google.com/v1beta1
kind: CertificateManagerCertificate
metadata:
  name: projects-${projectId}-locations-global-certificates-certificatemanagercertificate-kompanion-${uniqueId}
spec:
  description: sample managed certificate for kcc
  location: ""
  managed:
    domains:
    - '*.${uniqueId}.com'
