apiVersion: certificatemanager.cnrm.cloud.google.com/v1beta1
kind: CertificateManagerCertificate
metadata:
  name: certificatemanagercertificate-managed-kompanion-${uniqueId}
  namespace: ${projectId}
spec:
  description: sample managed certificate for kcc
  location: global
  managed:
    domains:
    - '*.cloudnetworks.x.gcpnp.example.com'
    - test.cloudnetworks.x.gcpnp.example.com
    - test2.cloudnetworks.x.gcpnp.example.com
    issuanceConfigRef:
      external: projects/${projectId}/locations/global/certificateIssuanceConfigs/my-test-ic
  scope: ALL_REGIONS
