apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  name: cnrm-dns-example-${uniqueId}.com.a
spec:
  managedZoneRef:
    external: dnsmanagedzone-${uniqueId}
  name: cnrm-dns-example-${uniqueId}.com.
  routingPolicy:
    wrr:
    - rrdatasRefs:
      - external: 1.2.3.6
      - external: 1.2.3.7
      weight: 0.5
    - healthCheckedTargets:
        internalLoadBalancers:
        - ipAddressRef:
            external: projects/${projectId}/regions/us-central1/addresses/${addressID}
          ipProtocol: tcp
          loadBalancerType: regionalL4ilb
          networkRef:
            external: projects/${projectId}/global/networks/${networkID}
          port: "80"
          projectRef:
            external: projects/${projectId}
      weight: 0.5
    - healthCheckedTargets:
        internalLoadBalancers:
        - ipAddressRef:
            external: projects/${projectId}/regions/us-central1/addresses/${addressID}
          ipProtocol: tcp
          loadBalancerType: regionalL4ilb
          networkRef:
            external: projects/${projectId}/global/networks/${networkID}
          port: "80"
          projectRef:
            external: projects/${projectId}
      weight: 0.5
  ttl: 300
  type: A