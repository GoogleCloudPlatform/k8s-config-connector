apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  name: cnrm-dns-example-${uniqueId}.com.a
spec:
  managedZoneRef:
    external: dnsmanagedzone-${uniqueId}
  name: cnrm-dns-example-${uniqueId}.com.
  rrdatas:
  - '8888:8888:8888:8888::'
  - '9999:9999:9999:9999::'
  ttl: 300
  type: AAAA