apiVersion: backupdr.cnrm.cloud.google.com/v1beta1
kind: BackupDRBackupPlan
metadata:
  labels:
    cnrm-test: "true"
    managed-by-cnrm: "true"
  name: backupdrbackupplan-pitr-${uniqueId}
spec:
  backupRules:
  - backupRetentionDays: 14
    ruleID: rule-1
    standardSchedule:
      backupWindow:
        endHourOfDay: 5
        startHourOfDay: 1
      recurrenceType: DAILY
      timeZone: UTC
  backupVaultRef:
    external: projects/${projectNumber}/locations/us-central1/backupVaults/backupdrbackupvault-pitr-${uniqueId}
  description: Cloud SQL backup plan with PITR log retention of 7 days
  location: us-central1
  logRetentionDays: 7
  projectRef:
    external: ${projectId}
  resourceID: backupdrbackupplan-pitr-${uniqueId}
  resourceType: sqladmin.googleapis.com/Instance