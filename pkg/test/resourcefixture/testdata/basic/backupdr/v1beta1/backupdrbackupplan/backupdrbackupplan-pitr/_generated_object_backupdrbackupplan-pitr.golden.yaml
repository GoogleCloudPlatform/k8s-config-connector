apiVersion: backupdr.cnrm.cloud.google.com/v1beta1
kind: BackupDRBackupPlan
metadata:
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 1
  labels:
    cnrm-test: "true"
  name: backupdrbackupplan-pitr-${uniqueId}
  namespace: ${uniqueId}
spec:
  backupRules:
  - backupRetentionDays: 14
    ruleID: rule-1
    standardSchedule:
      backupWindow:
        endHourOfDay: 5
        startHourOfDay: 1
      recurrenceType: DAILY
      timeZone: UTC
  backupVaultRef:
    name: backupdrbackupvault-pitr-${uniqueId}
  description: Cloud SQL backup plan with PITR log retention of 7 days
  location: us-central1
  logRetentionDays: 7
  projectRef:
    external: ${projectId}
  resourceType: sqladmin.googleapis.com/Instance
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  externalRef: projects/${projectId}/locations/us-central1/backupPlans/backupdrbackupplan-pitr-${uniqueId}
  observedGeneration: 1
  observedState:
    backupVaultServiceAccount: vault-${projectNumber}-12345@gcp-sa-backupdr-pr.iam.gserviceaccount.com
    createTime: "1970-01-01T00:00:00Z"
    state: ACTIVE
    updateTime: "1970-01-01T00:00:00Z"
