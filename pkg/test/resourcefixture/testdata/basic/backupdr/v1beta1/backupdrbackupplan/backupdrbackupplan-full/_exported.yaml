apiVersion: backupdr.cnrm.cloud.google.com/v1beta1
kind: BackupDRBackupPlan
metadata:
  labels:
    cnrm-test: "true"
    key1: value1
    managed-by-cnrm: "true"
  name: backupdrbackupplan-full-${uniqueId}
spec:
  backupRules:
  - backupRetentionDays: 10
    ruleID: daily-rule
    standardSchedule:
      backupWindow:
        endHourOfDay: 10
        startHourOfDay: 6
      recurrenceType: DAILY
      timeZone: America/New_York
  - backupRetentionDays: 30
    ruleID: weekly-rule
    standardSchedule:
      backupWindow:
        endHourOfDay: 12
        startHourOfDay: 8
      daysOfWeek:
      - MONDAY
      recurrenceType: WEEKLY
      timeZone: America/New_York
  - backupRetentionDays: 90
    ruleID: monthly-rule
    standardSchedule:
      backupWindow:
        endHourOfDay: 14
        startHourOfDay: 10
      recurrenceType: MONTHLY
      timeZone: America/New_York
      weekDayOfMonth:
        dayOfWeek: SUNDAY
        weekOfMonth: FIRST
  - backupRetentionDays: 365
    ruleID: yearly-rule
    standardSchedule:
      backupWindow:
        endHourOfDay: 16
        startHourOfDay: 12
      daysOfMonth:
      - 1
      months:
      - JANUARY
      - JULY
      recurrenceType: YEARLY
      timeZone: America/New_York
  backupVaultRef:
    external: projects/${projectNumber}/locations/us-central1/backupVaults/backupdrbackupvault-full-${uniqueId}
  description: A full backup plan for testing.
  location: us-central1
  projectRef:
    external: ${projectId}
  resourceID: backupdrbackupplan-full-${uniqueId}
  resourceType: compute.googleapis.com/Instance