# Covers dryRunSpec.rules[].allowAll (spec uses a complementary list rule).
apiVersion: orgpolicy.cnrm.cloud.google.com/v1beta1
kind: OrgPolicyPolicy
metadata:
  name: orgpolicypolicy-dryrun-list-allowall${uniqueId}
spec:
  resourceID: gcp.restrictServiceUsage
  projectRef:
    external: ${projectId}
  spec:
    inheritFromParent: false
    reset: false
    rules:
      - denyAll: true
  dryRunSpec:
    inheritFromParent: false
    reset: false
    rules:
      - allowAll: true
