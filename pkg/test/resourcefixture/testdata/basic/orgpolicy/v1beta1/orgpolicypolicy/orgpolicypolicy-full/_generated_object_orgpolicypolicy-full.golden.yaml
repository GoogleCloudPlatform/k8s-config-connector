apiVersion: orgpolicy.cnrm.cloud.google.com/v1beta1
kind: OrgPolicyPolicy
metadata:
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
  name: custom.orgpolicypolicy${uniqueId}
  namespace: ${uniqueId}
  selfLink: /apis/orgpolicy.cnrm.cloud.google.com/v1beta1/namespaces/${uniqueId}/orgpolicypolicies/custom.orgpolicypolicy${uniqueId}
spec:
  dryRunSpec:
    reset: false
    rules:
    - condition:
        description: Staging environment updated
        expression: resource.matchTag('123456789/environment', 'staging')
        location: us-east1
        title: staging-env-updated
      enforce: false
    - enforce: true
  projectRef:
    external: ${projectId}
  spec:
    reset: false
    rules:
    - condition:
        description: Production environment updated
        expression: resource.matchTag('123456789/environment', 'prod')
        location: us-west1
        title: prod-env-updated
      enforce: true
    - enforce: false
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  externalRef: projects/${projectId}/policies/custom.orgpolicypolicy${uniqueId}
  observedGeneration: 2
  observedState:
    dryRunSpec:
      updateTime: "2024-04-01T12:34:56.123456Z"
    spec:
      updateTime: "2024-04-01T12:34:56.123456Z"
