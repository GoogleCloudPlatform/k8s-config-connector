apiVersion: apihub.cnrm.cloud.google.com/v1alpha1
kind: APIHubDeployment
metadata:
  name: apihubdeployment-maximal-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: global
  displayName: "Maximal Deployment"
  description: "A very detailed deployment description."
  documentation:
    externalURI: "https://docs.example.com/api"
  deploymentTypeRef:
    external: "projects/${projectId}/locations/global/attributes/system-deployment-type/allowedValues/apigee"
  resourceURI: "https://apigee.googleapis.com/v1/organizations/${projectId}"
  endpoints:
    - "https://api.example.com/v1"
    - "https://api.example.com/v2"
  sloRef:
    external: "projects/${projectId}/locations/global/attributes/system-slo/allowedValues/99_9"
  environmentRef:
    external: "projects/${projectId}/locations/global/attributes/system-environment/allowedValues/production"
