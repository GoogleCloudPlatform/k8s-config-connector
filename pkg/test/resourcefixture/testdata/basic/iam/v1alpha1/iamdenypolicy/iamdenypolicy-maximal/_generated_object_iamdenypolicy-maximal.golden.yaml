  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
  name: iamdenypolicy-${uniqueId}
  namespace: ${uniqueId}
spec:
  displayName: My Updated Deny Policy
  projectRef:
    external: projects/projectiam-${uniqueId}
  rules:
  - denyRule:
      deniedPermissions:
