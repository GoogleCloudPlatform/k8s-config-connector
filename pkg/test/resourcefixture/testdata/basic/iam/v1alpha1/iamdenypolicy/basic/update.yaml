apiVersion: iam.cnrm.cloud.google.com/v1alpha1
kind: IAMDenyPolicy
metadata:
  name: denypolicy-${uniqueId}
  labels:
    test-label: ${uniqueId}
spec:
  parentRef:
    kind: Project
    name: ${projectId}
  rules:
  - description: "Deny all updated"
    denyRule:
      deniedPrincipals:
      - "principalSet://goog/public:all"
      deniedPermissions:
      - "iam.googleapis.com/roles.list"
      - "iam.googleapis.com/roles.get"
