apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
kind: Project
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
    cnrm.cloud.google.com/folder-id: ${TEST_FOLDER_ID}
  name: projectiam-${uniqueId}
spec:
  name: "projectiam"
  resourceID: projectiam-${uniqueId}
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: projectiam-${uniqueId}
  name: sa-${uniqueId}
spec:
  displayName: "Test Service Account"
