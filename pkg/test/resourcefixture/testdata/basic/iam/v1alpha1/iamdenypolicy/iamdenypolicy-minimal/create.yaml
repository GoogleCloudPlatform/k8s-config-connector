apiVersion: iam.cnrm.cloud.google.com/v1alpha1
kind: IAMDenyPolicy
metadata:
  name: iamdenypolicy-${uniqueId}
spec:
  folderRef:
    name: folder-${uniqueId}
  rules:
    - denyRule:
        deniedPermissions:
          - "iam.googleapis.com/roles.list"
        deniedPrincipals:
          - "principalSet://goog/public:all"
