apiVersion: securitycenter.cnrm.cloud.google.com/v1alpha1
kind: SecurityCenterCustomModule
metadata:
  name: ${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  displayName: "Maximal Custom Module"
  enablementState: ENABLED
  customConfig:
    predicate:
      expression: resource.type == "compute.googleapis.com/Instance"
      title: "Title"
      description: "Description"
    customOutput:
      properties:
      - name: "my_prop"
        valueExpression:
          expression: "resource.name"
    resourceSelector:
      resourceTypes:
      - compute.googleapis.com/Instance
    severity: CRITICAL
    description: "Detailed description"
    recommendation: "Fix it"
