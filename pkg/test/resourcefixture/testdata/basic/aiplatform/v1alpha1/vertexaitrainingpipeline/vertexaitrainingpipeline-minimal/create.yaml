apiVersion: aiplatform.cnrm.cloud.google.com/v1alpha1
kind: VertexAITrainingPipeline
metadata:
  name: vertexaitrainingpipeline-minimal-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  displayName: "Minimal Training Pipeline"
  trainingTaskDefinition: "gs://google-cloud-aiplatform/schema/trainingjob/definition/custom_task_1.0.0.yaml"
  trainingTaskInputs:
    structValue:
      fields:
        workerPoolSpecs:
          listValue:
            values:
              - structValue:
                  fields:
                    machineSpec:
                      structValue:
                        fields:
                          machineType:
                            stringValue: "n1-standard-4"
                    replicaCount:
                      stringValue: "1"
                    containerSpec:
                      structValue:
                        fields:
                          imageUri:
                            stringValue: "gcr.io/google-samples/hello-app:1.0"
