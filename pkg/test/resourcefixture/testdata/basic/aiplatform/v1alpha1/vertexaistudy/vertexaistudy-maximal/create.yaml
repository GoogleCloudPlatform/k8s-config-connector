apiVersion: aiplatform.cnrm.cloud.google.com/v1alpha1
kind: VertexAIStudy
metadata:
  name: vertexaistudy-maximal-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  displayName: "Config Connector Maximal Study"
  studySpec:
    algorithm: "GRID_SEARCH"
    observationNoise: "LOW"
    measurementSelectionType: "BEST_MEASUREMENT"
    metrics:
      - metricID: "accuracy"
        goal: "MAXIMIZE"
    parameters:
      - parameterID: "learning_rate"
        doubleValueSpec:
          minValue: 0.001
          maxValue: 0.1
