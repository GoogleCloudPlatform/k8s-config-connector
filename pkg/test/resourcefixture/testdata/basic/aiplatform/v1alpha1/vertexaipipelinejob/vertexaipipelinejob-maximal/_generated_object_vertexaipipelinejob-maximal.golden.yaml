apiVersion: aiplatform.cnrm.cloud.google.com/v1alpha1
kind: VertexAIPipelineJob
metadata:
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 1
  labels:
    cnrm-test: "true"
  name: vertexaipipelinejob-maximal-${uniqueId}
  namespace: ${uniqueId}
spec:
  displayName: Maximal Pipeline Job
  labels:
    baz: qux
    foo: bar
  location: us-central1
  pipelineSpec:
    components:
      hello-world-component:
        executorLabel: hello-world-executor
    deploymentConfig:
      '@type': type.googleapis.com/ml_pipelines.PipelineDeploymentConfig
      executors:
        hello-world-executor:
          container:
            command:
            - echo
            - Hello World
            image: alpine:latest
    pipelineInfo:
      name: hello-world-pipeline
    root:
      dag:
        tasks:
          hello-world-task:
            cachingOptions:
              enableCache: true
            componentRef:
              name: hello-world-component
            taskInfo:
              name: hello-world-task
    schemaVersion: 2.1.0
  preflightValidations: true
  projectRef:
    external: ${projectId}
  runtimeConfig:
    failurePolicy: PIPELINE_FAILURE_POLICY_FAIL_FAST
    gcsOutputDirectory: gs://vertexai-pipelinejob-bucket-${uniqueId}/output
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  externalRef: projects/${projectId}/locations/us-central1/pipelineJobs/vertexaipipelinejob-maximal-${uniqueId}
  observedGeneration: 1
  observedState:
    createTime: "1970-01-01T00:00:00Z"
    endTime: "1970-01-01T00:00:00Z"
    name: projects/${projectNumber}/locations/us-central1/pipelineJobs/vertexaipipelinejob-maximal-${uniqueId}
    startTime: "2024-04-01T12:34:56.123456Z"
    state: PIPELINE_STATE_SUCCEEDED
    updateTime: "1970-01-01T00:00:00Z"
