apiVersion: networkservices.cnrm.cloud.google.com/v1alpha1
kind: NetworkServicesAuthzExtension
metadata:
  name: authzext-max-${uniqueId}
  labels:
    key-create: val-create
    key-update: val-update
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  resourceID: authzext-max-${uniqueId}
  description: "Updated description for AuthzExtension"
  loadBalancingScheme: INTERNAL_MANAGED
  authority: ext-service-updated.example.com:443
  backendServiceRef:
    name: bs-callout-${uniqueId}
  timeout: 0.200s
  failOpen: true
  metadata:
    updatedKey: updatedVal
  forwardHeaders:
    - "x-my-header"
    - "x-another-header"
  wireFormat: EXT_PROC_GRPC
