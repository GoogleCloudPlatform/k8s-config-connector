apiVersion: networkservices.cnrm.cloud.google.com/v1alpha1
kind: NetworkServicesEdgeCacheService
metadata:
  name: networkservicesedgecacheservice-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  routing:
    hostRule:
    - hosts:
      - "foo.bar.com"
      pathMatcher: "path-matcher"
    pathMatcher:
    - name: "path-matcher"
      routeRule:
      - priority: "1"
        matchRule:
        - prefixMatch: "/"
          queryParameterMatch:
          - name: "param-name"
            exactMatch: "param-value"
        headerAction:
          requestHeaderToAdd:
          - headerName: "x-request-header-to-add"
            headerValue: "foo"
          requestHeaderToRemove:
          - headerName: "x-request-header-to-remove"
          responseHeaderToAdd:
          - headerName: "x-response-header-to-add"
            headerValue: "bar"
