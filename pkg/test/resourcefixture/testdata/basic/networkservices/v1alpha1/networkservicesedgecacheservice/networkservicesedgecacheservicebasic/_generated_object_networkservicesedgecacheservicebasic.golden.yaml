apiVersion: networkservices.cnrm.cloud.google.com/v1alpha1
kind: NetworkServicesEdgeCacheService
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
  name: service-${uniqueId}
  namespace: ${uniqueId}
spec:
  description: some updated description
  projectRef:
    external: ${projectId}
  resourceID: service-${uniqueId}
  routing:
    hostRule:
    - description: host rule description
      hosts:
      - sslcert.tf-test.club
      pathMatcher: routes
    pathMatcher:
    - name: routes
      routeRule:
      - description: a route rule to match against
        matchRule:
        - prefixMatch: /
        origin: projects/${projectId}/locations/global/edgeCacheOrigins/origin-${uniqueId}
        priority: "1"
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  observedGeneration: 2
