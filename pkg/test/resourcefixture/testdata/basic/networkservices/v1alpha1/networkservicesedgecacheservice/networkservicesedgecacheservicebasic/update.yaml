apiVersion: networkservices.cnrm.cloud.google.com/v1alpha1
kind: NetworkServicesEdgeCacheService
metadata:
  name: networkservicesedgecacheservice-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  description: "An updated sample EdgeCacheService"
  disableHttp2: true
  disableQuic: true
  requireTls: false
  logConfig:
    enable: false
  routing:
    hostRule:
    - description: "Updated host rule description"
      hosts:
      - "foo.bar.com"
      - "baz.qux.com"
      pathMatcher: "path-matcher"
    pathMatcher:
    - name: "path-matcher"
      description: "Updated path matcher description"
      routeRule:
      - description: "Updated route rule description"
        priority: "1"
        matchRule:
        - prefixMatch: "/updated"
          ignoreCase: false
          headerMatch:
          - headerName: "x-prefix"
            prefixMatch: "pre-"
          - headerName: "x-suffix"
            suffixMatch: "-suf"
          - headerName: "x-present"
            presentMatch: true
          queryParameterMatch:
          - name: "param-present"
            presentMatch: true
        headerAction:
          requestHeaderToAdd:
          - headerName: "x-request-header-to-add-updated"
            headerValue: "foo-updated"
            replace: false
