apiVersion: alloydb.cnrm.cloud.google.com/v1beta1
kind: AlloyDBCluster
metadata:
  annotations:
    cnrm.cloud.google.com/state-into-spec: absent
  name: alloydbcluster-${uniqueId}
spec:
  initialUser:
    password:
      value: updated
    user: postgres
  location: southamerica-east1
  networkRef:
    name: default
  projectRef:
    external: ${projectId}
  resourceID: alloydbcluster${uniqueId}
