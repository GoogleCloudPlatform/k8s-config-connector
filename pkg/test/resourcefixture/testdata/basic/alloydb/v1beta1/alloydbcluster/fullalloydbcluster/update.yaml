apiVersion: alloydb.cnrm.cloud.google.com/v1beta1
kind: AlloyDBCluster
metadata:
  annotations:
    cnrm.cloud.google.com/state-into-spec: absent
  labels:
    label-one: value-two
  name: alloydbcluster-${uniqueId}
spec:
  automatedBackupPolicy:
    backupWindow: 3600s
    enabled: true
    encryptionConfig:
      kmsKeyNameRef:
        name: kmscryptokey-2-${uniqueId}
    labels:
      source: kcc-test-updated
    location: us-central1
    timeBasedRetention:
      retentionPeriod: 43200s
    weeklySchedule:
      daysOfWeek:
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
      startTimes:
      - hours: 10
        minutes: 0
        nanos: 0
        seconds: 0
  clusterType: PRIMARY
  continuousBackupConfig:
    enabled: true
    encryptionConfig:
      kmsKeyNameRef:
        name: kmscryptokey-2-${uniqueId}
    recoveryWindowDays: 7
  deletionPolicy: FORCE
  displayName: A test alloyDB cluster with updated display name
  encryptionConfig:
    kmsKeyNameRef:
      name: kmscryptokey-1-${uniqueId}
  initialUser:
    password:
      valueFrom:
        secretKeyRef:
          key: newValue
          name: secret-2-${uniqueId}
    user: postgres2
  location: us-central1
  maintenanceUpdatePolicy:
    maintenanceWindows:
    - day: MONDAY
      startTime:
        hours: 1
        minutes: 2
        nanos: 4
        seconds: 3
  networkConfig:
    allocatedIpRange: test-range-1
    networkRef:
      name: computenetwork-${uniqueId}
  projectRef:
    external: ${projectId}
