apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: '0'
  name: computenetwork-${uniqueId}
spec:
  autoCreateSubnetworks: false
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: '0'
  name: computesubnetwork-${uniqueId}
spec:
  ipCidrRange: 10.2.0.0/16
  networkRef:
    name: computenetwork-${uniqueId}
  region: us-central1
  secondaryIpRange:
  - ipCidrRange: 192.168.10.0/24
    rangeName: test-range-1
---
apiVersion: serviceusage.cnrm.cloud.google.com/v1beta1
kind: ServiceIdentity
metadata:
  annotations:
    cnrm.cloud.google.com/deletion-policy: abandon
    cnrm.cloud.google.com/reconcile-interval-in-seconds: '0'
  name: serviceidentity-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  resourceID: alloydb.googleapis.com
---
apiVersion: kms.cnrm.cloud.google.com/v1beta1
kind: KMSKeyRing
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: '0'
  name: kmskeyring-${uniqueId}
spec:
  location: us-central1
---
apiVersion: kms.cnrm.cloud.google.com/v1beta1
kind: KMSCryptoKey
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: '0'
  labels:
    key-one: value-one
  name: kmscryptokey-1-${uniqueId}
spec:
  keyRingRef:
    name: kmskeyring-${uniqueId}
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPartialPolicy
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: '0'
  name: iampartialpolicy-1-${uniqueId}
spec:
  bindings:
  - members:
    - memberFrom:
        serviceIdentityRef:
          name: serviceidentity-${uniqueId}
    role: roles/cloudkms.cryptoKeyEncrypterDecrypter
  resourceRef:
    apiVersion: kms.cnrm.cloud.google.com/v1beta1
    kind: KMSCryptoKey
    name: kmscryptokey-1-${uniqueId}
---
apiVersion: kms.cnrm.cloud.google.com/v1beta1
kind: KMSCryptoKey
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: '0'
  name: kmscryptokey-2-${uniqueId}
spec:
  keyRingRef:
    name: kmskeyring-${uniqueId}
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPartialPolicy
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: '0'
  name: iampartialpolicy-2-${uniqueId}
spec:
  bindings:
  - members:
    - memberFrom:
        serviceIdentityRef:
          name: serviceidentity-${uniqueId}
    role: roles/cloudkms.cryptoKeyEncrypterDecrypter
  resourceRef:
    apiVersion: kms.cnrm.cloud.google.com/v1beta1
    kind: KMSCryptoKey
    name: kmscryptokey-2-${uniqueId}
---
