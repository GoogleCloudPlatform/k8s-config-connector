apiVersion: alloydb.cnrm.cloud.google.com/v1beta1
kind: AlloyDBCluster
metadata:
  annotations:
    cnrm.cloud.google.com/state-into-spec: absent
  labels:
    label-one: value-one
  name: alloydbcluster-${uniqueId}
spec:
  automatedBackupPolicy:
    backupWindow: 7200s
    enabled: false
    encryptionConfig:
      kmsKeyNameRef:
        name: kmscryptokey-1-${uniqueId}
    labels:
      source: kcc-test
    location: us-central1
    timeBasedRetention:
      retentionPeriod: 86400s
    weeklySchedule:
      daysOfWeek:
      - MONDAY
      startTimes:
      - hours: 4
        minutes: 0
        nanos: 0
        seconds: 0
  clusterType: PRIMARY
  continuousBackupConfig:
    enabled: false
    encryptionConfig:
      kmsKeyNameRef:
        name: kmscryptokey-1-${uniqueId}
    recoveryWindowDays: 10
  deletionPolicy: DEFAULT
  displayName: A test alloyDB cluster
  encryptionConfig:
    kmsKeyNameRef:
      name: kmscryptokey-1-${uniqueId}
  initialUser:
    password:
      valueFrom:
        secretKeyRef:
          key: password
          name: secret-1-${uniqueId}
    user: postgres
  location: us-central1
  maintenanceUpdatePolicy:
    maintenanceWindows:
    - day: TUESDAY
      startTime:
        hours: 10
        minutes: 9
        nanos: 7
        seconds: 8
  networkConfig:
    allocatedIpRange: test-range-1
    networkRef:
      name: computenetwork-${uniqueId}
  projectRef:
    external: ${projectId}
