apiVersion: bigquerybiglake.cnrm.cloud.google.com/v1alpha1
kind: BigLakeDatabase
metadata:
  name: biglakedatabase-${uniqueId}
spec:
  parentCatalogRef:
    external: projects/${projectId}/locations/us-central1/catalogs/biglakedatabase-dep-${uniqueId}
  type: "HIVE"
  hiveOptions:
    locationURI: "gs://my-bucket/hive-db"
    parameters:
      key1: "value1"
