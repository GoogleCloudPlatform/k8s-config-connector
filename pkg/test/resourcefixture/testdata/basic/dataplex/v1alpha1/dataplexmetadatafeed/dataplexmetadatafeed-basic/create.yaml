apiVersion: dataplex.cnrm.cloud.google.com/v1alpha1
kind: DataplexMetadataFeed
metadata:
  name: dataplexmetadatafeed-basic-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  resourceID: dataplexmetadatafeed-basic-${uniqueId}
  scope:
    organizationLevel: false
    projectRefs:
      - external: ${projectId}
    entryGroupRefs:
      - external: projects/${projectId}/locations/us-central1/entryGroups/entrygroup-${uniqueId}
  filters:
    entryTypeRefs:
      - external: projects/${projectId}/locations/us-central1/entryTypes/entrytype-${uniqueId}
    aspectTypeRefs:
      - external: projects/${projectId}/locations/us-central1/aspectTypes/aspecttype-${uniqueId}
    changeTypes:
      - CREATE
      - UPDATE
  labels:
    foo: bar
  pubsubTopic: projects/${projectId}/topics/topic-${uniqueId}
