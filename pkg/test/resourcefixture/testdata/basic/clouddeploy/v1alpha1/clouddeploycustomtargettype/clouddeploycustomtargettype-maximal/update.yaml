apiVersion: clouddeploy.cnrm.cloud.google.com/v1alpha1
kind: CloudDeployCustomTargetType
metadata:
  name: clouddeploycustomtargettype-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  description: "Maximal Custom Target Type Updated"
  customActions:
    renderAction: "custom-render-updated"
    deployAction: "custom-deploy-updated"
    includeSkaffoldModules:
      - configs:
          - "module1-updated"
        googleCloudStorage:
          source: "gs://my-bucket/dir/configs/*"
          path: "skaffold-updated.yaml"
