apiVersion: clouddeploy.cnrm.cloud.google.com/v1alpha1
kind: CloudDeployTarget
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: clouddeploytarget-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  description: "Test Target for Automation"
  run:
    location: projects/${projectId}/locations/us-central1
---
apiVersion: clouddeploy.cnrm.cloud.google.com/v1beta1
kind: CloudDeployDeliveryPipeline
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: clouddeploydeliverypipeline-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  description: "Test Delivery Pipeline for Automation"
  serialPipeline:
    stages:
      - targetID: clouddeploytarget-${uniqueId}
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: gsa-${uniqueId}
spec:
  displayName: "Test SA for Cloud Deploy Automation"
