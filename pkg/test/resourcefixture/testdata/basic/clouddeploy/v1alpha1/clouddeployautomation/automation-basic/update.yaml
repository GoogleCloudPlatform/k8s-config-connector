apiVersion: clouddeploy.cnrm.cloud.google.com/v1alpha1
kind: CloudDeployAutomation
metadata:
  labels:
    test-label: "updated-value"
  name: clouddeployautomation-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  deliveryPipelineRef:
    name: clouddeploydeliverypipeline-${uniqueId}
  serviceAccountRef:
    name: gsa-${uniqueId}
  description: "Updated Test Automation"
  suspended: true
  selector:
    targets:
      - targetRef:
          name: clouddeploytarget-${uniqueId}
  rules:
    - promoteReleaseRule:
        id: "promote-release"
        wait: "120s"
