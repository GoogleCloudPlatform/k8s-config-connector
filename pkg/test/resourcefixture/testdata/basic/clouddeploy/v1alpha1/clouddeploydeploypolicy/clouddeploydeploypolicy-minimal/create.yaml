apiVersion: clouddeploy.cnrm.cloud.google.com/v1alpha1
kind: CloudDeployDeployPolicy
metadata:
  name: clouddeploydeploypolicy-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  selectors:
  - target:
      targetRef:
        external: "*"
  rules:
  - rolloutRestriction:
      id: "no-rollout-rule"
      timeWindows:
        timeZone: "America/New_York"
        weeklyWindows:
        - daysOfWeek:
          - "MONDAY"
          startTime:
            hours: 9
          endTime:
            hours: 17
