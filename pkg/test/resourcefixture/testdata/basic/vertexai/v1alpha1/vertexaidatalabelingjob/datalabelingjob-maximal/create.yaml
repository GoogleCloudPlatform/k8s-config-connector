apiVersion: vertexai.cnrm.cloud.google.com/v1alpha1
kind: VertexAIDataLabelingJob
metadata:
  name: vertexaidatalabelingjob-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  displayName: "maximal-datalabelingjob-${uniqueId}"
  datasetRefs:
    - name: vertexaidataset-${uniqueId}
  labelerCount: 1
  instructionURI: "gs://my-bucket/instructions.pdf"
  inputsSchemaURI: "gs://google-cloud-aiplatform/schema/datalabelingjob/inputs/image_classification_1.0.0.yaml"
  inputs:
    annotationSpecColorMap:
      color: "#ff0000"
      displayName: "red"
  annotationLabels:
    foo: bar
  labels:
    baz: qux
  activeLearningConfig:
    maxDataItemCount: 100
    maxDataItemPercentage: 50
    sampleConfig:
      initialBatchSamplePercentage: 10
      followingBatchSamplePercentage: 5
      sampleStrategy: "UNCERTAINTY"
    trainingConfig:
      timeoutTrainingMilliHours: 1000
