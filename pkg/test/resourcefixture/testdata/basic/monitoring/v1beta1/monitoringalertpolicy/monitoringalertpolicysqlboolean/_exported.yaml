apiVersion: monitoring.cnrm.cloud.google.com/v1beta1
kind: MonitoringAlertPolicy
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  labels:
    cnrm-test: "true"
    managed-by-cnrm: "true"
  name: ${alertPolicyId}
spec:
  combiner: OR
  conditions:
  - conditionSql:
      booleanTest:
        column: has_error
      daily:
        executionTime:
          hours: 15
          minutes: 30
        periodicity: 2
      query: |-
        SELECT
          timestamp, log_name, severity, (severity = 'ERROR') AS has_error
        FROM
          `${projectId}.global.logginglogbucket-${uniqueId}._AllLogs`
        LIMIT 20
    displayName: SQL Log Alert Condition Daily Boolean
  displayName: Test SQL Alert Policy Daily Boolean
  enabled: true
  resourceID: ${alertPolicyId}