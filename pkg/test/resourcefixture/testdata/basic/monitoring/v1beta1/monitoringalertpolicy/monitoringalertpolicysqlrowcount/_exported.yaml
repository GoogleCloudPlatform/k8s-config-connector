apiVersion: monitoring.cnrm.cloud.google.com/v1beta1
kind: MonitoringAlertPolicy
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  labels:
    cnrm-test: "true"
    managed-by-cnrm: "true"
  name: ${alertPolicyId}
spec:
  combiner: OR
  conditions:
  - conditionSql:
      minutes:
        periodicity: 10
      query: |-
        SELECT
          timestamp, log_name, severity
        FROM
          `${projectId}.global.logginglogbucket-${uniqueId}._AllLogs`
        LIMIT 20
      rowCountTest:
        comparison: COMPARISON_GT
        threshold: 20
    displayName: SQL Log Alert Condition
  displayName: Test SQL Alert Policy
  enabled: true
  resourceID: ${alertPolicyId}