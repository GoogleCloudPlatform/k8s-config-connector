apiVersion: monitoring.cnrm.cloud.google.com/v1beta1
kind: MonitoringAlertPolicy
metadata:
  name: monitoringalertpolicy-${uniqueId}
spec:
  displayName: Test SQL Alert Policy Hourly
  enabled: true
  combiner: OR
  conditions:
    - displayName: SQL Log Alert Condition Hourly
      conditionSql:
        query: |-
          SELECT
            timestamp, log_name, severity
          FROM
            `${projectId}.global.logginglogbucket-${uniqueId}._AllLogs`
          LIMIT 10
        rowCountTest:
          comparison: COMPARISON_GT
          threshold: 10
        hourly:
          periodicity: 1
          minuteOffset: 30
