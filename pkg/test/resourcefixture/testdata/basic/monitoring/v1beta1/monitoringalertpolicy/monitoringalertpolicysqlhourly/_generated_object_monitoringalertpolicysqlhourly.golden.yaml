apiVersion: monitoring.cnrm.cloud.google.com/v1beta1
kind: MonitoringAlertPolicy
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 3
  labels:
    cnrm-test: "true"
  name: monitoringalertpolicy-${uniqueId}
  namespace: ${uniqueId}
  selfLink: /apis/monitoring.cnrm.cloud.google.com/v1beta1/namespaces/${uniqueId}/monitoringalertpolicies/monitoringalertpolicy-${uniqueId}
spec:
  combiner: OR
  conditions:
  - conditionSql:
      hourly:
        minuteOffset: 45
        periodicity: 2
      query: |-
        SELECT
          timestamp, log_name, severity
        FROM
          `${projectId}.global.logginglogbucket-${uniqueId}._AllLogs`
        LIMIT 20
      rowCountTest:
        comparison: COMPARISON_GT
        threshold: 20
    displayName: SQL Log Alert Condition Hourly
  displayName: Test SQL Alert Policy Hourly
  enabled: true
  resourceID: ${alertPolicyId}
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  creationRecord:
  - mutateTime: "1970-01-01T00:00:00Z"
    mutatedBy: user@google.com
  name: projects/${projectId}/alertPolicies/${alertPolicyId}
  observedGeneration: 3
