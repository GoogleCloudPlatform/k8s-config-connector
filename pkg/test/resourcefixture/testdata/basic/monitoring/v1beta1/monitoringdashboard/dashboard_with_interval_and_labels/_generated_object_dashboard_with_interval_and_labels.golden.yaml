apiVersion: monitoring.cnrm.cloud.google.com/v1beta1
kind: MonitoringDashboard
metadata:
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
    label-one: value-one
  name: ${dashboardID}
  namespace: ${uniqueId}
spec:
  displayName: Dashboard with Interval and Labels
  gridLayout:
    columns: 2
    widgets:
    - timeSeriesTable:
        dataSets:
        - timeSeriesQuery:
            timeSeriesFilter:
              aggregation:
                alignmentPeriod: 60s
                perSeriesAligner: ALIGN_MEAN
              filter: metric.type="compute.googleapis.com/instance/cpu/utilization"
                resource.type="gce_instance"
              pickTimeSeriesFilter:
                direction: TOP
                interval:
                  endTime: "2026-03-04T00:00:00Z"
                numTimeSeries: 5
                rankingMethod: METHOD_MEAN
      title: Top 5 GCE Instances by CPU
    - title: Chart with Thresholds
      xyChart:
        dataSets:
        - plotType: LINE
          timeSeriesQuery:
            timeSeriesFilter:
              filter: metric.type="compute.googleapis.com/instance/cpu/utilization"
                resource.type="gce_instance"
        thresholds:
        - label: Critical
          value: 0.8
  labels:
    user-label: user-value
  projectRef:
    external: projects/${projectId}
  resourceID: ${dashboardID}
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  etag: abcdef123456
  observedGeneration: 2
