apiVersion: monitoring.cnrm.cloud.google.com/v1beta1
kind: MonitoringDashboard
metadata:
  name: monitoringdashboard-${uniqueId}
  labels:
    label-one: "value-one"
spec:
  projectRef:
    external: projects/${projectId}
  displayName: "Dashboard with Interval and Labels"
  labels:
    user-label: "user-value"
  gridLayout:
    columns: 2
    widgets:
    - title: "Top 5 GCE Instances by CPU"
      timeSeriesTable:
        dataSets:
        - timeSeriesQuery:
            timeSeriesFilter:
              filter: "metric.type=\"compute.googleapis.com/instance/cpu/utilization\" resource.type=\"gce_instance\""
              aggregation:
                alignmentPeriod: 60s
                perSeriesAligner: ALIGN_MEAN
              pickTimeSeriesFilter:
                direction: TOP
                numTimeSeries: 5
                rankingMethod: METHOD_MEAN
                interval:
                  endTime: "2026-03-04T00:00:00Z"
    - title: "Chart with Thresholds"
      xyChart:
        dataSets:
        - timeSeriesQuery:
            timeSeriesFilter:
              filter: "metric.type=\"compute.googleapis.com/instance/cpu/utilization\" resource.type=\"gce_instance\""
          plotType: LINE
        thresholds:
        - label: "Critical"
          value: 0.8
