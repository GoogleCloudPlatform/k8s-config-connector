apiVersion: bigquery.cnrm.cloud.google.com/v1beta1
kind: BigQueryTable
metadata:
  name: bigquerytable-${uniqueId}
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: direct
spec:
  datasetRef:
    name: bigquerydataset${uniqueId}
  friendlyName: BigQueryTable Inherited Encryption Example
  description: "An UPDATED BigQuery Table that inherits its encryption key from its parent dataset."
  schema: |-
    [
      {
        "name": "name",
        "type": "STRING",
        "mode": "REQUIRED"
      },
      {
        "name": "age",
        "type": "INTEGER"
      }
    ]
