apiVersion: redis.cnrm.cloud.google.com/v1beta1
kind: RedisInstance
metadata:
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: direct
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
  name: redisinstances-${uniqueId}
  namespace: ${uniqueId}
spec:
  alternativeLocationId: europe-west4-b
  authEnabled: true
  authorizedNetworkRef:
    external: projects/${projectId}/global/networks/default
  connectMode: PRIVATE_SERVICE_ACCESS
  displayName: My Redis Instance
  locationId: europe-west4-a
  memorySizeGb: 10
  persistenceConfig:
    persistenceMode: RDB
    rdbSnapshotPeriod: TWENTY_FOUR_HOURS
  readReplicasMode: READ_REPLICAS_ENABLED
  redisVersion: REDIS_7_2
  region: europe-west4
  replicaCount: 2
  reservedIpRange: test-range-reserved
  secondaryIpRange: test-range-secondary
  tier: STANDARD_HA
  transitEncryptionMode: SERVER_AUTHENTICATION
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  createTime: "1970-01-01T00:00:00Z"
  currentLocationId: us-central1-a
  host: 10.20.30.40
  nodes:
  - id: node-0
    zone: us-central1-a
  observedGeneration: 2
  observedState:
    authString: secret-squirrel
    lastAppliedValues:
      reservedIpRange: test-range-reserved
      secondaryIpRange: test-range-secondary
  persistenceIamIdentity: serviceAccount:service-${projectNumber}@cloud-redis.iam.gserviceaccount.com
  port: 6379
  serverCaCerts:
  - cert: '-----BEGIN CERTIFICATE-----\n-----END CERTIFICATE-----\n'
