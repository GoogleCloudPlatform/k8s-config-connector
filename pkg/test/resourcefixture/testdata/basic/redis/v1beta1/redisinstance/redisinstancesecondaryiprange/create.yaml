apiVersion: redis.cnrm.cloud.google.com/v1beta1
kind: RedisInstance
metadata:
  labels:
    label-one: "value-one"
  name: redisinstances-${uniqueId}
spec:
  displayName: Sample Redis Instance with Secondary IP Range
  region: us-central1
  tier: STANDARD_HA
  memorySizeGb: 16
  connectMode: DIRECT_PEERING
  secondaryIpRange: auto
