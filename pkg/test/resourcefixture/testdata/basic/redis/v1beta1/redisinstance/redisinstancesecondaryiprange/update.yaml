apiVersion: redis.cnrm.cloud.google.com/v1beta1
kind: RedisInstance
metadata:
  labels:
    label-one: "value-one"
  name: redisinstances-${uniqueId}
spec:
  displayName: Sample Redis Instance with Secondary IP Range - Updated
  # Change to another region when seeing: Not enough zonal resources are available to fulfill the request
  region: europe-west4
  tier: STANDARD_HA
  memorySizeGb: 16
  connectMode: DIRECT_PEERING
  # secondary ip range is required when enabling readReplicasMode on EXISTING instance
  readReplicasMode: READ_REPLICAS_ENABLED
  # secondary ip range can only be set during Update call when enabling readReplicasMode, or it will be ignored
  secondaryIpRange: auto
