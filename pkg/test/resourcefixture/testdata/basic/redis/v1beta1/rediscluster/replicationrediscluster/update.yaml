apiVersion: redis.cnrm.cloud.google.com/v1beta1
kind: RedisCluster
metadata:
  name: rediscluster-${uniqueId}
  annotations:
    # Bypass deletion ordering after switchover
    # Clean it up manually if running against realGCP
    cnrm.cloud.google.com/deletion-policy: abandon
spec:
  shardCount: 3
  pscConfigs:
  - networkRef:
      name: computenetwork-${uniqueId}
  location: us-central1
  projectRef:
    external: ${projectId}
  replicaCount: 1
  nodeType: REDIS_STANDARD_SMALL
  crossClusterReplicationConfig:
    clusterRole: PRIMARY
    secondaryClusters:
      - clusterRef:
          name: dependency-cluster-${uniqueId}
  deletionProtectionEnabled: false
