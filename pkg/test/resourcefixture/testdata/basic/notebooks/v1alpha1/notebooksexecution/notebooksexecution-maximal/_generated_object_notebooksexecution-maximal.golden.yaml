apiVersion: notebooks.cnrm.cloud.google.com/v1alpha1
kind: NotebooksExecution
metadata:
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 1
  labels:
    cnrm-test: "true"
  name: notebooksexecution-maximal-${uniqueId}
  namespace: ${uniqueId}
spec:
  description: A maximal NotebooksExecution test fixture
  executionTemplate:
    acceleratorConfig:
      coreCount: 1
      type: NVIDIA_TESLA_T4
    containerImageURI: gcr.io/deeplearning-platform-release/base-cpu
    inputNotebookFile: gs://${projectId}-bucket-${uniqueId}/notebook.ipynb
    jobType: VERTEX_AI
    kernelSpec: python3
    labels:
      my-label: my-value
    masterType: n1-standard-4
    outputNotebookFolder: gs://${projectId}-bucket-${uniqueId}/output
    parameters: key=value
    paramsYamlFile: gs://${projectId}-bucket-${uniqueId}/params.yaml
    scaleTier: CUSTOM
    serviceAccountRef:
      external: ${projectId}@${projectId}.iam.gserviceaccount.com
    tensorboardRef:
      external: projects/${projectId}/locations/us-central1/tensorboards/my-tensorboard
    vertexAiParameters:
      env:
        MY_VAR: MY_VAL
      networkRef:
        external: projects/${projectId}/global/networks/default
  location: us-central1-a
  outputNotebookFile: gs://${projectId}-bucket-${uniqueId}/output.ipynb
  projectRef:
    external: ${projectId}
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  externalRef: projects/${projectId}/locations/us-central1-a/executions/notebooksexecution-maximal-${uniqueId}
  observedGeneration: 1
  observedState:
    createTime: "1970-01-01T00:00:00Z"
    state: SUCCEEDED
    updateTime: "1970-01-01T00:00:00Z"
