apiVersion: notebooks.cnrm.cloud.google.com/v1alpha1
kind: NotebooksSchedule
metadata:
  name: notebooksschedule-${uniqueId}
spec:
  location: us-west1
  projectRef:
    external: ${projectId}
  description: "My notebook schedule description"
  state: "ENABLED"
  cronSchedule: "0 0 * * WED"
  timeZone: "utc"
  executionTemplate:
    scaleTier: CUSTOM
    masterType: n1-standard-4
    jobType: VERTEX_AI
    inputNotebookFile: gs://notebooks-${uniqueId}/notebook.ipynb
    outputNotebookFolder: gs://notebooks-${uniqueId}/output
    containerImageURI: gcr.io/deeplearning-platform-release/base-cpu
    kernelSpec: "python3"
    labels:
      my-label-key: "my-label-val"
    parameters: "a=1,b=2"
    paramsYamlFile: gs://notebooks-${uniqueId}/params.yaml
    serviceAccountRef:
      external: notebooksschedule-${uniqueId}@${projectId}.iam.gserviceaccount.com
    acceleratorConfig:
      type: SCHEDULER_ACCELERATOR_TYPE_UNSPECIFIED
      coreCount: 1
    vertexAiParameters:
      networkRef:
        external: projects/${projectId}/global/networks/default
      env:
        MY_ENV_VAR: "my-env-value"
    dataprocParameters:
      clusterRef:
        external: projects/${projectId}/regions/us-west1/clusters/my-dataproc-cluster
    tensorboardRef:
      external: projects/${projectId}/locations/us-west1/tensorboards/my-tensorboard
