apiVersion: notebooks.cnrm.cloud.google.com/v1alpha1
kind: NotebooksSchedule
metadata:
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 1
  labels:
    cnrm-test: "true"
  name: notebooksschedule-maximal-${uniqueId}
  namespace: ${uniqueId}
spec:
  cronSchedule: 0 0 * * WED
  description: A maximal NotebooksSchedule test fixture
  executionTemplate:
    acceleratorConfig:
      coreCount: 1
      type: NVIDIA_TESLA_T4
    containerImageURI: gcr.io/deeplearning-platform-release/base-cpu
    inputNotebookFile: gs://${projectId}-bucket-${uniqueId}/notebook.ipynb
    jobType: VERTEX_AI
    kernelSpec: python3
    labels:
      my-label: my-value
    masterType: n1-standard-4
    outputNotebookFolder: gs://${projectId}-bucket-${uniqueId}/output
    parameters: key=value
    paramsYamlFile: gs://${projectId}-bucket-${uniqueId}/params.yaml
    scaleTier: CUSTOM
    serviceAccountRef:
      name: sa-${uniqueId}
    vertexAiParameters:
      env:
        MY_VAR: MY_VAL
  location: us-central1
  projectRef:
    external: ${projectId}
  state: ENABLED
  timeZone: America/Los_Angeles
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  externalRef: projects/${projectId}/locations/us-central1/schedules/notebooksschedule-maximal-${uniqueId}
  observedGeneration: 1
  observedState:
    createTime: "1970-01-01T00:00:00Z"
    updateTime: "1970-01-01T00:00:00Z"
