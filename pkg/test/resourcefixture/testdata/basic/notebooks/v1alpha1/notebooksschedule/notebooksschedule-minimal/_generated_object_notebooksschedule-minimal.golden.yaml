apiVersion: notebooks.cnrm.cloud.google.com/v1alpha1
kind: NotebooksSchedule
metadata:
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 1
  labels:
    cnrm-test: "true"
  name: notebooksschedule-minimal-${uniqueId}
  namespace: ${uniqueId}
spec:
  cronSchedule: 0 0 * * WED
  executionTemplate:
    containerImageURI: gcr.io/deeplearning-platform-release/base-cpu
    inputNotebookFile: gs://${projectId}-bucket-${uniqueId}/notebook.ipynb
    masterType: n1-standard-4
    outputNotebookFolder: gs://${projectId}-bucket-${uniqueId}/output
    scaleTier: CUSTOM
  location: us-central1
  projectRef:
    external: ${projectId}
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  externalRef: projects/${projectId}/locations/us-central1/schedules/notebooksschedule-minimal-${uniqueId}
  observedGeneration: 1
  observedState:
    createTime: "1970-01-01T00:00:00Z"
    updateTime: "1970-01-01T00:00:00Z"
