apiVersion: notebooks.cnrm.cloud.google.com/v1alpha1
kind: NotebooksSchedule
metadata:
  name: notebooksschedule-maximal-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  description: "A maximal NotebooksSchedule test fixture"
  state: ENABLED
  cronSchedule: "0 0 * * WED"
  timeZone: "America/Los_Angeles"
  executionTemplate:
    scaleTier: CUSTOM
    masterType: n1-standard-4
    inputNotebookFile: gs://${projectId}-bucket-${uniqueId}/notebook.ipynb
    containerImageURI: gcr.io/deeplearning-platform-release/base-cpu
    outputNotebookFolder: gs://${projectId}-bucket-${uniqueId}/output
    paramsYamlFile: gs://${projectId}-bucket-${uniqueId}/params.yaml
    labels:
      my-label: my-value
    jobType: VERTEX_AI
    vertexAiParameters:
      env:
        MY_VAR: MY_VAL
    acceleratorConfig:
      coreCount: 1
      type: NVIDIA_TESLA_T4
    kernelSpec: python3
    parameters: key=value
    serviceAccountRef:
      name: sa-${uniqueId}
