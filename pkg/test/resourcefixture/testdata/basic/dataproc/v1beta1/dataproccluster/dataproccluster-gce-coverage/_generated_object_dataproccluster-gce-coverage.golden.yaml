apiVersion: dataproc.cnrm.cloud.google.com/v1beta1
kind: DataprocCluster
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/mutable-but-unreadable-fields: '{}'
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
    label-one: new-value
  name: dataproccluster-${uniqueId}
  namespace: ${uniqueId}
spec:
  config:
    dataprocMetricConfig:
      metrics:
      - metricOverrides:
        - spark:spark.executor.memory
        metricSource: SPARK
    encryptionConfig:
      gcePdKmsKeyRef:
        external: projects/${projectId}/locations/us-central1/keyRings/my-keyring/cryptoKeys/my-key
    endpointConfig:
      enableHttpPortAccess: true
    gceClusterConfig:
      confidentialInstanceConfig:
        enableConfidentialCompute: false
      internalIPOnly: false
      metadata:
        key-a: value-a
      privateIPv6GoogleAccess: OUTBOUND
      reservationAffinity:
        consumeReservationType: NO_RESERVATION
      serviceAccountRef:
        external: ${projectNumber}-compute@developer.gserviceaccount.com
      serviceAccountScopes:
      - https://www.googleapis.com/auth/cloud-platform
      shieldedInstanceConfig:
        enableIntegrityMonitoring: true
        enableSecureBoot: true
        enableVtpm: true
      tags:
      - tag-a
      - tag-b
      zone: us-central1-f
    initializationActions:
    - executableFile: gs://my-bucket/init-action.sh
      executionTimeout: 300s
    lifecycleConfig:
      idleDeleteTtl: 3600s
    masterConfig:
      diskConfig:
        bootDiskSizeGb: 50
        bootDiskType: pd-standard
        numLocalSsds: 0
      machineType: n2-standard-2
      numInstances: 1
    securityConfig:
      identityConfig:
        userServiceAccountMapping:
          my-mapping: my-sa@${projectId}.iam.gserviceaccount.com
    softwareConfig:
      imageVersion: 2.2-debian12
      optionalComponents:
      - JUPYTER
      properties:
        spark:spark.executor.memory: 2048m
    workerConfig:
      diskConfig:
        bootDiskSizeGb: 50
        bootDiskType: pd-standard
        numLocalSsds: 0
      machineType: n2-standard-2
      numInstances: 2
  location: us-central1
  projectRef:
    external: projects/${projectId}
  resourceID: dataproccluster-${uniqueId}
status:
  clusterUuid: ${clusterUuid}
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  config:
    masterConfig:
      instanceNames:
      - dataproccluster-${uniqueId}-m
    workerConfig:
      instanceNames:
      - dataproccluster-${uniqueId}-w-0
      - dataproccluster-${uniqueId}-w-1
  observedGeneration: 2
  status:
    state: RUNNING
    stateStartTime: "2024-04-01T12:34:56.123456Z"
  statusHistory:
  - state: CREATING
    stateStartTime: "2024-04-01T12:34:56.123456Z"
