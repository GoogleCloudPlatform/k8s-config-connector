apiVersion: dataproc.cnrm.cloud.google.com/v1beta1
kind: DataprocCluster
metadata:
  name: dataproccluster-${uniqueId}
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: direct
spec:
  location: us-central1
  projectRef:
    external: projects/${projectId}
  config:
    securityConfig:
      identityConfig:
        userServiceAccountMapping:
          user1@example.com: usersa1-${uniqueId}@${projectId}.iam.gserviceaccount.com
          user2@example.com: usersa2-${uniqueId}@${projectId}.iam.gserviceaccount.com
    softwareConfig:
      imageVersion: "2.2.81-debian12"
      properties:
        "dataproc:dataproc.dynamic.multi.tenancy.enabled": "true"
    gceClusterConfig:
      zone: us-central1-a
    masterConfig:
      numInstances: 1
      machineType: n2-standard-2
    workerConfig:
      numInstances: 2
      machineType: n2-standard-2
