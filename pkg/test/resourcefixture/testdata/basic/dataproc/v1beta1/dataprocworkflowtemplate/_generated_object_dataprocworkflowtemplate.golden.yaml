apiVersion: dataproc.cnrm.cloud.google.com/v1beta1
kind: DataprocWorkflowTemplate
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
    foo: bar
  name: dataprocworkflowtemplate-${uniqueId}
  namespace: ${uniqueId}
  selfLink: /apis/dataproc.cnrm.cloud.google.com/v1beta1/namespaces/${uniqueId}/dataprocworkflowtemplates/dataprocworkflowtemplate-${uniqueId}
spec:
  jobs:
  - sparkJob:
      mainClass: SomeClass
    stepId: someJob
  - prerequisiteStepIds:
    - someJob
    prestoJob:
      queryFileUri: someUri
    stepId: otherJob
  location: us-central1
  placement:
    managedCluster:
      clusterName: test-cluster
      config:
        autoscalingConfig:
          policyRef:
            name: dataprocautoscalingpolicy-${uniqueId}
        gceClusterConfig:
          tags:
          - foo
          - bar
        masterConfig:
          diskConfig:
            bootDiskSizeGb: 30
            bootDiskType: pd-standard
          machineType: n2-standard-8
          numInstances: 1
        softwareConfig:
          imageVersion: 2.0.39-debian10
        workerConfig:
          diskConfig:
            bootDiskSizeGb: 30
            numLocalSsds: 1
          machineType: n2-standard-8
          numInstances: 3
  projectRef:
    external: projects/${projectId}
  resourceID: dataprocworkflowtemplate-${uniqueId}
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  createTime: "1970-01-01T00:00:00Z"
  observedGeneration: 2
  updateTime: "1970-01-01T00:00:00Z"
