apiVersion: dlp.cnrm.cloud.google.com/v1alpha1
kind: DLPConnection
metadata:
  name: dlpconnection-${uniqueId}
spec:
  projectRef:
    external: "projects/${PROJECT_ID}"
  location: "us-central1"
  state: "CONNECTION_STATE_UNSPECIFIED"
  cloudSQL:
    connectionName: "${PROJECT_ID}:us-central1:sql-instance"
    databaseEngine: "MYSQL"
    maxConnections: 5
    usernamePassword:
      username: "my-user"
      secretRef:
        external: "projects/${PROJECT_ID}/secrets/my-secret/versions/1"
    cloudSQLIAM: {}
