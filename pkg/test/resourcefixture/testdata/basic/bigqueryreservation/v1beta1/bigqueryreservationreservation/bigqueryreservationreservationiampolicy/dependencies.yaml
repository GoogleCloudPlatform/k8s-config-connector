apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: bqres-dep-${uniqueId}
spec:
  displayName: BigQuery Reservation IAM Test GSA
---
apiVersion: bigqueryreservation.cnrm.cloud.google.com/v1beta1
kind: BigQueryReservationReservation
metadata:
  name: bigqueryreservationreservation-${uniqueId}
spec:
  autoscale:
    maxSlots: 50
  concurrency: 0
  edition: STANDARD
  ignoreIdleSlots: true
  location: us-west2
  projectRef:
    external: ${projectId}
  resourceID: bigqueryreservationreservation${uniqueId}
  slotCapacity: 0
