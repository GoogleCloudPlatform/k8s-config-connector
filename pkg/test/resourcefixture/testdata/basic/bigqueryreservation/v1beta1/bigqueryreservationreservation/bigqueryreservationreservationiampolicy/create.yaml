apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicy
metadata:
  name: iampolicy-${uniqueId}
spec:
  bindings:
    - role: roles/bigquery.admin
      members:
        - serviceAccount:bqres-dep-${uniqueId}@${projectId}.iam.gserviceaccount.com
  resourceRef:
    apiVersion: bigqueryreservation.cnrm.cloud.google.com/v1beta1
    kind: BigQueryReservationReservation
    name: bigqueryreservationreservation-${uniqueId}
