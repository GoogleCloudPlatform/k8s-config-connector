apiVersion: gkemulticloud.cnrm.cloud.google.com/v1alpha1
kind: GKEMulticloudAttachedCluster
metadata:
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
  name: attachedcluster-${uniqueId}
  namespace: ${uniqueId}
spec:
  annotations:
    my-annotation-key: updated-annotation-val
  authorization:
    adminGroups:
    - group: admin-group@example.com
    adminUsers:
    - username: updated-admin-user@example.com
  binaryAuthorization:
    evaluationMode: DISABLED
  description: Updated description for attached cluster
  distribution: generic
  fleet:
    projectRef:
      external: ${projectId}
  location: us-west1
  loggingConfig:
    componentConfig:
      enableComponents:
      - SYSTEM_COMPONENTS
  monitoringConfig:
    cloudMonitoringConfig:
      enabled: true
    managedPrometheusConfig:
      enabled: false
  oidcConfig:
    issuerURL: https://oidc.eks.us-west-1.amazonaws.com/id/12345678901234567890123456789012
    jwks: dGVzdC1qd2tzLWRhdGE=
  platformVersion: 1.25.0-gke.2
  projectRef:
    external: ${projectId}
  securityPostureConfig:
    vulnerabilityMode: VULNERABILITY_DISABLED
  tags:
    my-tag-key: my-tag-val
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  externalRef: projects/${projectId}/locations/us-west1/attachedClusters/attachedcluster-${uniqueId}
  observedGeneration: 2
  observedState:
    createTime: "1970-01-01T00:00:00Z"
    fleet:
      membership: projects/${projectId}/locations/global/memberships/attachedcluster-${uniqueId}
    kubernetesVersion: "1.25"
    state: RUNNING
    uid: 0123456789abcdef
    updateTime: "1970-01-01T00:00:00Z"
