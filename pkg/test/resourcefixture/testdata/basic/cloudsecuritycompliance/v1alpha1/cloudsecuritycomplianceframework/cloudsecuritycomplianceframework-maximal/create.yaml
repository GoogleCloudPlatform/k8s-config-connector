apiVersion: cloudsecuritycompliance.cnrm.cloud.google.com/v1alpha1
kind: CloudSecurityComplianceFramework
metadata:
  name: cscframework-max-${uniqueId}
spec:
  organizationRef:
    external: "organizations/${TEST_ORG_ID}"
  location: global
  displayName: "Test Framework Max ${uniqueId}"
  description: "Test description for maximal framework"
  category:
    - GOOGLE_BEST_PRACTICES
  cloudControlDetails:
    - cloudControlRef:
        external: "organizations/${TEST_ORG_ID}/locations/global/cloudControls/my-cloud-control"
      majorRevisionID: 1
