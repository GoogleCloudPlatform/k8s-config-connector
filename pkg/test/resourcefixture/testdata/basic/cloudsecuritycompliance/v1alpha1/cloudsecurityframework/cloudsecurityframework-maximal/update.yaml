apiVersion: cloudsecuritycompliance.cnrm.cloud.google.com/v1alpha1
kind: CloudSecurityFramework
metadata:
  name: cloudsecurityframework-max-${uniqueId}
spec:
  organizationRef:
    external: "organizations/${TEST_ORG_ID}"
  location: global
  displayName: "Test Framework Max ${uniqueId} Updated"
  description: "Test description max updated"
  category:
    - "INDUSTRY_DEFINED_STANDARD"
  labels:
    key1: value2
  cloudControlDetails:
    - cloudControlRef:
        external: "organizations/${TEST_ORG_ID}/locations/global/cloudControls/test-control-updated"
      majorRevisionID: 2
      parameters:
        - name: "test-param-updated"
          parameterValue:
            stringValue: "test-value-updated"
