apiVersion: certificatemanager.cnrm.cloud.google.com/v1beta1
kind: CertificateManagerCertificateMapEntry
metadata:
  labels:
    cnrm-test: "true"
    managed-by-cnrm: "true"
  name: certificatemanagercertificatemapentry${uniqueId}
spec:
  certificatesRefs:
  - external: projects/${projectId}/locations/global/certificates/certificatemanagercertificate${uniqueId}
  description: updated certificate map entry
  mapRef:
    external: projects/${projectId}/locations/global/certificateMaps/certificatemanagercertificatemap${uniqueId}
  matcher: PRIMARY
  projectRef:
    external: ${projectId}
  resourceID: certificatemanagercertificatemapentry${uniqueId}