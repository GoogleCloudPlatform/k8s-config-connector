apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: sqlinstance-dep-${uniqueId}
spec:
  databaseVersion: MYSQL_5_7
  region: us-central1
  settings:
    locationPreference:
      zone: us-central1-a
    tier: db-custom-1-3840
    backupConfiguration:
      enabled: true
      binaryLogEnabled: true
