apiVersion: memorystore.cnrm.cloud.google.com/v1beta1
kind: MemorystoreInstance
metadata:
  name: memorystore-${uniqueId}
spec:
  authorizationMode: IAM_AUTH
  automatedBackupConfig:
    automatedBackupMode: ENABLED
    retention: 86500s
    fixedFrequencySchedule:
      startTime:
        hours: 2
  deletionProtectionEnabled: false
  endpoints:
  - connections:
    - pscAutoConnection:
          networkRef:
            external: projects/${projectId}/global/networks/computenetwork-${uniqueId}
          projectRef:
            external: ${projectId}
  engineConfigs:
    maxclients: '10000'
    maxmemory-policy: allkeys-lru
  engineVersion: VALKEY_8_0
  labels:
    key2: val2modified
    key3: val3
  location: us-central1
  maintenancePolicy:
    weeklyMaintenanceWindow:
      - day: MONDAY
        startTime:
          hours: 1
  mode: CLUSTER
  nodeType: STANDARD_SMALL
  persistenceConfig:
    mode: RDB
    rdbConfig:
      rdbSnapshotPeriod: ONE_HOUR
      rdbSnapshotStartTime: 2029-10-02T15:01:23Z
  projectRef:
    external: ${projectId}
  replicaCount: 2
  shardCount: 2
  transitEncryptionMode: SERVER_AUTHENTICATION
  zoneDistributionConfig:
    mode: SINGLE_ZONE
    zone: us-central1-b
