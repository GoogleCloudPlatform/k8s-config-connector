apiVersion: memorystore.cnrm.cloud.google.com/v1beta1
kind: MemorystoreInstance
metadata:
  name: instance-${uniqueId}
  annotations:
    # Bypass deletion ordering after switchover
    # Clean it up manually if running against realGCP
    cnrm.cloud.google.com/deletion-policy: abandon
spec:
  shardCount: 3
  location: us-east1
  projectRef:
    external: ${projectId}
  crossInstanceReplicationConfig:
    instanceRole: PRIMARY
    secondaryInstances:
    - instanceRef:
        name: dependency-instance-${uniqueId}
