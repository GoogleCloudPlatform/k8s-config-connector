apiVersion: memorystore.cnrm.cloud.google.com/v1beta1
kind: MemorystoreInstance
metadata:
  name: instance-${uniqueId}
spec:
  shardCount: 3
  location: us-east1
  projectRef:
    external: ${projectId}
  crossInstanceReplicationConfig:
    instanceRole: SECONDARY
    primaryInstance:
      instanceRef:
        name: dependency-instance-${uniqueId}
