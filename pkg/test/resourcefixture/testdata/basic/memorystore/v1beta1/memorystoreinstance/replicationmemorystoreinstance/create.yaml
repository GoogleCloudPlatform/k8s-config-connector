apiVersion: memorystore.cnrm.cloud.google.com/v1beta1
kind: MemorystoreInstance
metadata:
  name: memorystoreinstance-${uniqueId}-secondary
spec:
  shardCount: 3
  location: us-east1
  projectRef:
    external: ${projectId}
  crossInstanceReplicationConfig:
    instanceRole: SECONDARY
    primaryInstance:
      instance: projects/${projectId}/locations/us-central1/instances/memorystoreinstance-${uniqueId}-primary
