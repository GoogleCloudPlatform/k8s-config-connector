          ipAddress: 10.128.0.2
          pscConnectionID: "165866332863070210"
          serviceAttachment: projects/694128718963/regions/us-central1/serviceAttachments/gcp-memorystore-auto-p40035581a2ca9e7-psc-sa
      - pscAutoConnection:
          forwardingRule: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1/forwardingRules/sca-auto-fr-904edef6-d601-436d-a674-6a0973a4e718
          ipAddress: 10.128.0.3
