metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computeaddress-2a-${uniqueId}
spec:
  addressType: INTERNAL
  location: us-central1
  purpose: GCE_ENDPOINT
  subnetworkRef:
    name: computesubnetwork-2-${uniqueId}
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeAddress
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computeaddress-2b-${uniqueId}
spec:
  addressType: INTERNAL
  location: us-central1
  purpose: GCE_ENDPOINT
  subnetworkRef:
    name: computesubnetwork-2-${uniqueId}
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeForwardingRule
metadata:
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: "direct"
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computeforwardingrule-1a-${uniqueId}
spec:
  allowPscGlobalAccess: true
  ipAddress:
    addressRef:
      external: projects/${projectId}/regions/us-central1/addresses/computeaddress-1a-${uniqueId}
  loadBalancingScheme: ""
  location: us-central1
  networkRef:
    name: computenetwork-1-${uniqueId}
  subnetworkRef:
    name: computesubnetwork-1-${uniqueId}
  target:
    memorystoreInstanceServiceAttachmentRef:
      memorystoreInstanceRef:
        name: memorystoreinstance-1-${uniqueId}
      pscAttachmentDetailsIndex: 0
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeForwardingRule
metadata:
  annotations:
