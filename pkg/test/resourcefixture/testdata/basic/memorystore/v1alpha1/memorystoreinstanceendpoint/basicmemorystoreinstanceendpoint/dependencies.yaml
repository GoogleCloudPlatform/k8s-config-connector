apiVersion: memorystore.cnrm.cloud.google.com/v1beta1
kind: MemorystoreInstance
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: memorystoreinstance-1-${uniqueId}
spec:
  endpoints:
  - connections:
    - pscAutoConnection:
          networkRef:
            external: projects/${projectId}/global/networks/default
          projectRef:
            external: ${projectId}
  location: us-central1
  nodeType: SHARED_CORE_NANO
  projectRef:
    external: ${projectId}
  replicaCount: 0
  shardCount: 1
  zoneDistributionConfig:
    mode: SINGLE_ZONE
    zone: us-central1-a
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  annotations:
    cnrm.cloud.google.com/deletion-policy: "abandon"
    cnrm.cloud.google.com/project-id: "${projectId}"
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computenetwork-1-${uniqueId}
spec:
  autoCreateSubnetworks: false
  routingMode: REGIONAL
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computesubnetwork-1-${uniqueId}
spec:
  ipCidrRange: 10.0.0.248/29
  networkRef:
    name: computenetwork-1-${uniqueId}
  region: us-central1
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computesubnetwork-2-${uniqueId}
spec:
  ipCidrRange: 10.0.1.248/29
  networkRef:
    name: computenetwork-1-${uniqueId}
  region: us-central1
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeAddress
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computeaddress-1a-${uniqueId}
spec:
  addressType: INTERNAL
  location: us-central1
  purpose: GCE_ENDPOINT
  subnetworkRef:
    name: computesubnetwork-1-${uniqueId}
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeAddress
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computeaddress-1b-${uniqueId}
spec:
  addressType: INTERNAL
  location: us-central1
  purpose: GCE_ENDPOINT
  subnetworkRef:
    name: computesubnetwork-1-${uniqueId}
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
