apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeTargetPool
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 3
  labels:
    cnrm-test: "true"
  name: ${targetPoolID}
  namespace: ${uniqueId}
  selfLink: /apis/compute.cnrm.cloud.google.com/v1beta1/namespaces/${uniqueId}/computetargetpools/${targetPoolID}
spec:
  backupTargetPoolRef:
    name: ${targetPoolID}
  description: A pool of compute instances to use as a backend to a load balancer,
    with health check and backup pool. A hash of requester's IP is used to determine
    session affinity to instances.
  failoverRatio: 0.5
  healthChecks:
  - httpHealthCheckRef:
      name: ${httpHealthCheckID}
  instances:
  - name: ${instanceID}
  region: us-central1
  resourceID: ${targetPoolID}
  sessionAffinity: CLIENT_IP
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  observedGeneration: 3
  selfLink: https://www.googleapis.com/compute/beta/projects/${projectId}/regions/us-central1/targetPools/${targetPoolID}
