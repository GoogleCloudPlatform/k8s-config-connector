apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeHealthCheck
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computehealthcheck-${uniqueId}
spec:
  checkIntervalSec: 10
  httpHealthCheck:
    port: 80
  location: us-central1
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeBackendService
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computebackendservice-${uniqueId}
spec:
  protocol: HTTPS
  loadBalancingScheme: EXTERNAL
  healthChecks:
    - healthCheckRef:
        name: computehealthcheck-${uniqueId}
  location: us-central1
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeURLMap
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computeurlmap-${uniqueId}
spec:
  defaultService:
    backendServiceRef:
      name: computebackendservice-${uniqueId}
  location: us-central1
---
