apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: computetargethttpsproxywithcertificatemanager-${uniqueId}
spec:
  routingMode: REGIONAL
  autoCreateSubnetworks: false
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: computetargethttpsproxywithcertificatemanager-${uniqueId}
spec:
  ipCidrRange: 10.2.0.0/16
  region: us-central1
  networkRef:
    name: computetargethttpsproxywithcertificatemanager-${uniqueId}
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeRegionHealthCheck
metadata:
  name: computetargethttpsproxywithcertificatemanager-${uniqueId}
spec:
  region: us-central1
  httpHealthCheck:
    port: 80
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeRegionBackendService
metadata:
  name: computetargethttpsproxywithcertificatemanager-${uniqueId}
spec:
  healthChecks:
    - name: computetargethttpsproxywithcertificatemanager-${uniqueId}
  region: us-central1
  loadBalancingScheme: INTERNAL_MANAGED
  protocol: HTTP
  networkRef:
    name: computetargethttpsproxywithcertificatemanager-${uniqueId}
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeRegionURLMap
