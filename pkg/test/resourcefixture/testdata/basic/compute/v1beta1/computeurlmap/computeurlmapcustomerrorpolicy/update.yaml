apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeURLMap
metadata:
  name: computeurlmap-${uniqueId}
spec:
  location: global
  defaultService:
    backendBucketRef:
      name: computebackendbucket-${uniqueId}
  defaultCustomErrorResponsePolicy:
    errorServiceRef:
      name: computebackendbucket-${uniqueId}
    errorResponseRules:
      - matchResponseCodes:
          - "4xx"
          - "5xx"
        overrideResponseCode: 404
        path: /error.html
  pathMatcher:
    - name: "allpaths"
      defaultService:
        backendBucketRef:
          name: computebackendbucket-${uniqueId}
      defaultCustomErrorResponsePolicy:
        errorServiceRef:
          name: computebackendbucket-${uniqueId}
        errorResponseRules:
          - matchResponseCodes:
              - "401"
            overrideResponseCode: 403
            path: /401.html
      pathRule:
        - paths:
            - "/api/*"
          service:
            backendBucketRef:
              name: computebackendbucket-${uniqueId}
          customErrorResponsePolicy:
            errorServiceRef:
              name: computebackendbucket-${uniqueId}
            errorResponseRules:
              - matchResponseCodes:
                  - "500"
                path: /500.html
                overrideResponseCode: 502
      routeRules:
        - priority: 1
          matchRules:
            - prefixMatch: "/blog"
          service:
            backendBucketRef:
              name: computebackendbucket-${uniqueId}
          customErrorResponsePolicy:
            errorServiceRef:
              name: computebackendbucket-${uniqueId}
            errorResponseRules:
              - matchResponseCodes:
                  - "4xx"
                path: /error4xx.html
                overrideResponseCode: 404
  hostRule:
    - hosts:
        - "mysite.com"
      pathMatcher: "allpaths"
  description: Updated description
