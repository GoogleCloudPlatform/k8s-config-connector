apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeURLMap
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 1
  labels:
    cnrm-test: "true"
  name: computeurlmap-${uniqueId}
  namespace: ${uniqueId}
spec:
  defaultService:
    backendServiceRef:
      name: ${backendServiceID}
  description: test URLMap with routeRules
  hostRule:
  - hosts:
    - mysite.com
    pathMatcher: allpaths
  location: global
  pathMatcher:
  - defaultService:
      backendServiceRef:
        name: ${backendServiceID}
    name: allpaths
    routeRules:
    - matchRules:
      - prefixMatch: /bucket
      priority: 1
      service:
        backendBucketRef:
          name: ${backendBucketID}
    - matchRules:
      - prefixMatch: /service
      priority: 2
      service:
        backendServiceRef:
          name: ${backendServiceID}
  projectRef:
    external: ${projectId}
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  externalRef: projects/${projectId}/global/urlMaps/computeurlmap-${uniqueId}
  mapId: 1111111111111111
  observedGeneration: 1
  observedState:
    creationTimestamp: "1970-01-01T00:00:00Z"
    fingerprint: abcdef0123A=
    id: 1111111111111111
    selfLink: https://www.googleapis.com/compute/v1/projects/${projectId}/global/urlMaps/computeurlmap-${uniqueId}
