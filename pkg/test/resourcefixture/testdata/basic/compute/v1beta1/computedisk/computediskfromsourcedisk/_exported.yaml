apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeDisk
metadata:
  labels:
    cnrm-test: "true"
    managed-by-cnrm: "true"
  name: ${diskID}
spec:
  description: an example disk from source disk
  location: us-central1-a
  physicalBlockSizeBytes: 4096
  projectRef:
    external: ${projectId}
  resourceID: ${diskID}
  sourceDiskRef:
    external: projects/${projectId}/zones/us-central1-a/disks/${diskID}
  type: pd-standard