apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeDisk
metadata:
  labels:
    cnrm-test: "true"
    label-one: value-one
    managed-by-cnrm: "true"
  name: computedisk-${uniqueId}
spec:
  description: a sample regional disk
  location: us-central1
  physicalBlockSizeBytes: 4096
  projectRef:
    external: ${projectId}
  replicaZones:
  - us-central1-a
  - us-central1-f
  resourceID: computedisk-${uniqueId}
  type: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1/regiondiskTypes/pd-standard