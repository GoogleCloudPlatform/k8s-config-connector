apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 3
  labels:
    cnrm-test: "true"
  name: ${subnetworkID}
  namespace: ${uniqueId}
spec:
  networkRef:
    name: ${networkID}
  privateIpGoogleAccess: true
  region: us-central1
  reservedInternalRangeRef:
    name: internalrange-${uniqueId}
  resourceID: ${subnetworkID}
  secondaryIpRange:
  - ipCidrRange: 10.129.0.0/24
    rangeName: secondary-range
    reservedInternalRangeRef:
      name: internalrange-sec-${uniqueId}
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  creationTimestamp: "1970-01-01T00:00:00Z"
  gatewayAddress: 10.128.0.1
  observedGeneration: 3
  selfLink: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1/subnetworks/${subnetworkID}
