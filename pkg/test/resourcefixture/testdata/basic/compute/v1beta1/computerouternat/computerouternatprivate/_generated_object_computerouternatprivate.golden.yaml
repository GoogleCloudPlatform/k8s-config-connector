apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeRouterNAT
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
  name: computerouternat-${uniqueId}
  namespace: ${uniqueId}
spec:
  enableEndpointIndependentMapping: false
  endpointTypes:
  - ENDPOINT_TYPE_VM
  region: us-central1
  routerRef:
    name: ${routerID}
  rules:
  - action:
      sourceNatActiveRangesRefs:
      - name: ${subnetworkID}
      sourceNatDrainRangesRefs:
      - name: ${subnetworkID}
    description: private nat rule example
    match: nexthop.hub == 'https://networkconnectivity.googleapis.com/v1/projects/${projectId}/locations/global/hubs/networkconnectivityhub-${uniqueId}'
    ruleNumber: 100
  sourceSubnetworkIpRangesToNat: LIST_OF_SUBNETWORKS
  subnetwork:
  - sourceIpRangesToNat:
    - ALL_IP_RANGES
    subnetworkRef:
      name: ${subnetworkID}
  type: PRIVATE
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  observedGeneration: 2
