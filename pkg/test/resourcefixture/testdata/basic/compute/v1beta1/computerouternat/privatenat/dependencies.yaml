apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: computerouternat-dep-${uniqueId}
spec:
  autoCreateSubnetworks: false
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: computerouternat-dep-${uniqueId}
spec:
  ipCidrRange: 10.0.0.0/16
  region: us-central1
  networkRef:
    name: computerouternat-dep-${uniqueId}
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeRouter
metadata:
  name: computerouternat-dep-${uniqueId}
spec:
  networkRef:
    name: computerouternat-dep-${uniqueId}
  region: us-central1
