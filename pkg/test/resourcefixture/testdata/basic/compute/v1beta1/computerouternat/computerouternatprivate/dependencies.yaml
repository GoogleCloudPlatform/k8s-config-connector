apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computenetwork-${uniqueId}
spec:
  routingMode: REGIONAL
  autoCreateSubnetworks: false
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computesubnetwork-${uniqueId}
spec:
  ipCidrRange: 10.2.0.0/16
  region: us-central1
  networkRef:
    name: computenetwork-${uniqueId}
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computesubnetworkprivate-${uniqueId}
spec:
  ipCidrRange: 10.3.0.0/16
  region: us-central1
  networkRef:
    name: computenetwork-${uniqueId}
  purpose: PRIVATE_NAT
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeRouter
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computerouter-${uniqueId}
spec:
  description: example router description
  region: us-central1
  networkRef:
    name: computenetwork-${uniqueId}
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: computesubnetworkprivate2-${uniqueId}
spec:
  ipCidrRange: 10.4.0.0/16
  region: us-central1
  networkRef:
    name: computenetwork-${uniqueId}
  purpose: PRIVATE_NAT
---
apiVersion: networkconnectivity.cnrm.cloud.google.com/v1beta1
kind: NetworkConnectivityHub
metadata:
  name: networkconnectivityhub-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  description: "A hub for private NAT test"
---
apiVersion: networkconnectivity.cnrm.cloud.google.com/v1beta1
kind: NetworkConnectivitySpoke
metadata:
  name: networkconnectivityspoke-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: global
  hubRef:
    name: networkconnectivityhub-${uniqueId}
  linkedVPCNetwork:
    uriRef:
      name: computenetwork-${uniqueId}
