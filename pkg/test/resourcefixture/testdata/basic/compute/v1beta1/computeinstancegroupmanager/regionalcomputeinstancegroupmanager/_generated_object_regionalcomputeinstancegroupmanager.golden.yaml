apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeInstanceGroupManager
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 3
  labels:
    cnrm-test: "true"
  name: ${instanceGroupManagerID}
  namespace: ${uniqueId}
  selfLink: /apis/compute.cnrm.cloud.google.com/v1beta1/namespaces/${uniqueId}/computeinstancegroupmanagers/${instanceGroupManagerID}
spec:
  autoHealingPolicies:
  - healthCheckRef:
      name: ${healthCheckID}
    initialDelaySec: 300
  baseInstanceName: app
  instanceTemplateRef:
    name: ${instanceTemplateID}
  location: us-central1
  projectRef:
    external: projects/${projectId}
  resourceID: ${instanceGroupManagerID}
  targetSize: 4
  updatePolicy:
    instanceRedistributionType: PROACTIVE
    maxSurge:
      fixed: 3
    maxUnavailable:
      fixed: 3
    minimalAction: RESTART
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  creationTimestamp: "1970-01-01T00:00:00Z"
  currentActions:
    abandoning: 0
    creating: 1
    creatingWithoutRetries: 0
    deleting: 0
    none: 0
    recreating: 0
    refreshing: 0
    restarting: 0
    verifying: 3
  fingerprint: abcdef0123A=
  id: 1111111111111111
  instanceGroup: https://www.googleapis.com/compute/beta/projects/${projectId}/regions/us-central1/instanceGroups/${instanceGroupManagerID}
  observedGeneration: 3
  region: https://www.googleapis.com/compute/beta/projects/${projectId}/regions/us-central1
  selfLink: https://www.googleapis.com/compute/beta/projects/${projectId}/regions/us-central1/instanceGroupManagers/${instanceGroupManagerID}
  status:
    isStable: false
    stateful:
      hasStatefulConfig: false
      isStateful: false
      perInstanceConfigs:
        allEffective: true
    versionTarget:
      isReached: true
  updatePolicy:
    maxSurge:
      calculated: 3
    maxUnavailable:
      calculated: 3
