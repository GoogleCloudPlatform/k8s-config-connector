apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeInstanceGroupManager
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
  name: ${instanceGroupManagerID}
  namespace: ${uniqueId}
spec:
  autoHealingPolicies:
  - healthCheckRef:
      name: ${healthCheckID}
    initialDelaySec: 300
  baseInstanceName: app
  instanceTemplateRef:
    name: ${instanceTemplateID}
  location: us-central1
  projectRef:
    external: projects/${projectId}
  targetSize: 4
  updatePolicy:
    instanceRedistributionType: PROACTIVE
    maxSurge:
      fixed: 3
    maxUnavailable:
      fixed: 3
    minimalAction: RESTART
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  creationTimestamp: "1970-01-01T00:00:00Z"
  fingerprint: abcdef0123A=
  id: 1111111111111111
  instanceGroup: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1/instanceGroups/${instanceGroupManagerID}
  observedGeneration: 2
  region: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1
  selfLink: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1/instanceGroupManagers/${instanceGroupManagerID}
  status:
    isStable: true
    versionTarget:
      isReached: true
