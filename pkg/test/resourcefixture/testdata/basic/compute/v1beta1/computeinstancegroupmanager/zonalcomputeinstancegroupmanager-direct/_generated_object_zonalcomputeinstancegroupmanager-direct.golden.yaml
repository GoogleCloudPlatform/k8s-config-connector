apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeInstanceGroupManager
metadata:
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: direct
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
  name: ${instanceGroupManagerID}
  namespace: ${uniqueId}
  selfLink: /apis/compute.cnrm.cloud.google.com/v1beta1/namespaces/${uniqueId}/computeinstancegroupmanagers/${instanceGroupManagerID}
spec:
  autoHealingPolicies:
  - healthCheckRef:
      name: ${healthCheckID}
    initialDelaySec: 300
  baseInstanceName: app
  instanceTemplateRef:
    name: ${instanceTemplateID}
  location: us-central1-a
  projectRef:
    external: projects/${projectId}
  statefulPolicy:
    preservedState:
      disks:
        disk-a:
          autoDelete: NEVER
        disk-b:
          autoDelete: NEVER
  targetSize: 4
  updatePolicy:
    maxSurge:
      fixed: 3
    maxUnavailable:
      fixed: 3
    minimalAction: RESTART
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  creationTimestamp: "1970-01-01T00:00:00Z"
  fingerprint: abcdef0123A=
  id: 1111111111111111
  instanceGroup: https://www.googleapis.com/compute/v1/projects/${projectId}/zones/us-central1-a/instanceGroups/${instanceGroupManagerID}
  observedGeneration: 2
  selfLink: https://www.googleapis.com/compute/v1/projects/${projectId}/zones/us-central1-a/instanceGroupManagers/${instanceGroupManagerID}
  status:
    isStable: true
    versionTarget:
      isReached: true
  zone: https://www.googleapis.com/compute/v1/projects/${projectId}/zones/us-central1-a
