apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeAddress
metadata:
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: direct
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 1
  labels:
    cnrm-test: "true"
  name: ${addressID}
  namespace: ${uniqueId}
spec:
  addressType: EXTERNAL
  description: A test address with ipCollection
  ipCollectionRef:
    external: projects/${projectId}/regions/us-central1/publicDelegatedPrefixes/pdp-${uniqueId}
  location: us-central1
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  creationTimestamp: "1970-01-01T00:00:00Z"
  labelFingerprint: abcdef0123A=
  observedGeneration: 1
  observedState:
    address: 8.8.8.8
  selfLink: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1/addresses/${addressID}
