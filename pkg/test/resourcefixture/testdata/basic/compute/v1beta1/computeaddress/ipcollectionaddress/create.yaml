apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeAddress
metadata:
  name: computeaddress-ipcollection
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
spec:
  addressType: EXTERNAL
  ipVersion: IPV4
  purpose: IPV4_PD
  location: us-central1
  projectRef:
    external: ${projectId}
  ipCollectionRef:
    name: computepublicdelegatedprefix-${uniqueId}
