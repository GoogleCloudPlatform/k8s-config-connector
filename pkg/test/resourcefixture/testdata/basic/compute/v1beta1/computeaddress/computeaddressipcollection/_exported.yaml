apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeAddress
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  labels:
    cnrm-test: "true"
    managed-by-cnrm: "true"
  name: ${addressID}
spec:
  address: 8.8.8.8
  addressType: EXTERNAL
  description: A test address with ipCollection
  ipCollectionRef:
    external: regions/us-central1/publicDelegatedPrefixes/pdp-${uniqueId}
  location: us-central1
  networkTier: PREMIUM
  resourceID: ${addressID}