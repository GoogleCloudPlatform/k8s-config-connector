apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeForwardingRule
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  labels:
    cnrm-test: "true"
    label-one: value-two
    managed-by-cnrm: "true"
  name: ${forwardingRuleID}
spec:
  description: A global forwarding rule
  ipAddress:
    addressRef:
      external: projects/${projectId}/global/addresses/${addressID}
  ipProtocol: TCP
  loadBalancingScheme: EXTERNAL
  location: global
  portRange: 110-110
  resourceID: ${forwardingRuleID}
  target:
    targetHTTPProxyRef:
      external: https://www.googleapis.com/compute/v1/projects/${projectId}/global/targetTcpProxies/${targetTcpProxyID}