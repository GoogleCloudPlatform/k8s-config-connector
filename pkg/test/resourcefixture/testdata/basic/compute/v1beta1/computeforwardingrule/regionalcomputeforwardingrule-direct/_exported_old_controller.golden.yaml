apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeForwardingRule
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  labels:
    cnrm-test: "true"
    label-one: value-two
    managed-by-cnrm: "true"
  name: ${forwardingRuleID}
spec:
  description: A regional forwarding rule
  ipAddress:
    ip: projects/${projectId}/regions/us-central1/addresses/${addressID}
  ipProtocol: ESP
  loadBalancingScheme: EXTERNAL
  location: us-central1
  networkTier: PREMIUM
  resourceID: ${forwardingRuleID}
  target:
    targetVPNGatewayRef:
      external: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1/targetVpnGateways/computetargetvpngateway-2-${uniqueId}