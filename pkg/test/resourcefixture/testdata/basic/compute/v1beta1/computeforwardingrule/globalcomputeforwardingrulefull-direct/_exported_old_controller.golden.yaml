apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeForwardingRule
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  labels:
    cnrm-test: "true"
    label-one: value-two
    managed-by-cnrm: "true"
  name: ${forwardingRuleID}
spec:
  description: A global forwarding rule
  ipAddress:
    addressRef:
      external: 0.0.0.0
  ipProtocol: TCP
  ipVersion: IPV4
  loadBalancingScheme: INTERNAL_SELF_MANAGED
  location: global
  metadataFilters:
  - filterLabels:
    - name: PLANET
      value: MARS
    filterMatchCriteria: MATCH_ANY
  networkRef:
    external: https://www.googleapis.com/compute/v1/projects/${projectId}/global/networks/default
  portRange: 90-90
  resourceID: ${forwardingRuleID}
  target:
    targetHTTPProxyRef:
      external: https://www.googleapis.com/compute/v1/projects/${projectId}/global/targetHttpProxies/computetargethttpproxy-2-${uniqueId}