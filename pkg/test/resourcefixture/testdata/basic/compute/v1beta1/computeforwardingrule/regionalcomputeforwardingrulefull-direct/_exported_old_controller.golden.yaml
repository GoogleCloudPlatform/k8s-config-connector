apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeForwardingRule
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  labels:
    cnrm-test: "true"
    label-one: value-two
    managed-by-cnrm: "true"
  name: ${forwardingRuleID}
spec:
  allPorts: true
  backendServiceRef:
    external: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1/backendServices/${backendServiceID}
  description: A regional forwarding rule
  ipAddress:
    ip: 10.128.8.8
  ipProtocol: TCP
  ipVersion: IPV4
  isMirroringCollector: true
  loadBalancingScheme: INTERNAL
  location: us-central1
  networkRef:
    external: https://www.googleapis.com/compute/v1/projects/${projectId}/global/networks/${networkID}
  networkTier: PREMIUM
  resourceID: ${forwardingRuleID}
  serviceLabel: label
  subnetworkRef:
    external: https://www.googleapis.com/compute/v1/projects/${projectId}/regions/us-central1/subnetworks/${subnetworkID}