  description: Basic compute reservation
  specificReservation:
    count: 1
    instanceProperties:
      machineType: n1-standard-1
      minCpuPlatform: Intel Sandy Bridge
  zone: us-central1-a
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  creationTimestamp: "1970-01-01T00:00:00Z"
  externalRef: projects/${projectId}/zones/us-central1-a/reservations/${reservationID}
  observedGeneration: 2
  selfLink: https://www.googleapis.com/compute/v1/projects/${projectId}/zones/us-central1-a/reservations/${reservationID}
  status: READY
