    reason: UpToDate
    status: "True"
    type: Ready
  creationTimestamp: "1970-01-01T00:00:00Z"
  externalRef: projects/shared-reservations-project/zones/us-central1-a/reservations/${reservationID}
  observedGeneration: 2
  selfLink: https://www.googleapis.com/compute/v1/projects/shared-reservations-project/zones/us-central1-a/reservations/${reservationID}
  status: READY
