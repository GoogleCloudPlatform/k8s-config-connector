apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeImage
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  labels:
    cnrm-test: "true"
    label-one: value-one
    managed-by-cnrm: "true"
  name: ${imageID}
spec:
  diskRef:
    external: https://www.googleapis.com/compute/v1/projects/${projectId}/zones/us-central1-a/disks/${diskID}
  diskSizeGb: 500
  resourceID: ${imageID}
  storageLocations:
  - us