  labels:
    cnrm-test: "true"
  name: ${securityPolicyID}
  namespace: ${uniqueId}
spec:
  adaptiveProtectionConfig:
    layer7DdosDefenseConfig:
      enable: false
      ruleVisibility: STANDARD
  advancedOptionsConfig:
    jsonParsing: STANDARD
    logLevel: NORMAL
    userIpRequestHeaders:
    - X-Client-IP-Updated
  description: Maximal Security Policy Updated
  recaptchaOptionsConfig:
    redirectSiteKeyRef:
      external: recaptcha-site-key-dummy-updated
  rule:
  - action: allow
    description: Default allow rule
    match:
      config:
        srcIpRanges:
        - '*'
      versionedExpr: SRC_IPS_V1
    preview: true
    priority: 2147483647
  type: CLOUD_ARMOR
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  fingerprint: abcdef0123A=
  observedGeneration: 2
  selfLink: https://www.googleapis.com/compute/v1/projects/${projectId}/global/securityPolicies/${securityPolicyID}
