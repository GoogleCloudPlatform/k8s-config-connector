    canonicalUrl: https://www.googleapis.com/compute/beta/projects/${projectId}/regions/us-west2/forwardingRules/${forwardingRuleID}
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  id: 1111111111111111
  network:
    canonicalUrl: https://www.googleapis.com/compute/beta/projects/${projectId}/global/networks/3911336993397569248
  observedGeneration: 3
  region: https://www.googleapis.com/compute/beta/projects/${projectId}/regions/us-west2
  selfLink: https://www.googleapis.com/compute/beta/projects/${projectId}/regions/us-west2/packetMirrorings/${packetMirroringID}
