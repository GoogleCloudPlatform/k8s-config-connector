apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: computenetworkendpoint-network-${uniqueId}
spec:
  description: Network for ComputeNetworkEndpoint test
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetworkEndpointGroup
metadata:
  name: computenetworkendpointgroup-${uniqueId}
spec:
  networkRef:
    name: computenetworkendpoint-network-${uniqueId}
  location: us-central1-a
  defaultPort: 90
  networkEndpointType: NON_GCP_PRIVATE_IP_PORT
