apiVersion: compute.cnrm.cloud.google.com/v1alpha1
kind: ComputeFutureReservation
metadata:
  name: computefuturereservation-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1-a
  # Required field
  # Cannot enable autoDeleteAutoCreatedReservations and update the default auto delete time by updating timeWindow.duration in one request.
  # If enable autoDeleteAutoCreatedReservations without specifying autoCreatedReservationsDuration or autoCreatedReservationsDeleteTime,
  # it will use the previous timeWindow.duration as the default auto delete time.
  autoDeleteAutoCreatedReservations: true
  specificSkuProperties:
    totalCount: 2
    instanceProperties:
      machineType: n2-standard-4
  timeWindow:
    # Future reservation must specify a future start time.
    startTime: 2026-11-10T00:00:00Z
    # Future reservation end time must be at least 24 hours later than start time.
    # One of duration or endTime must be set.
    duration:
      seconds: 86400
