apiVersion: compute.cnrm.cloud.google.com/v1alpha1
kind: ComputeAutoscaler
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 3
  labels:
    cnrm-test: "true"
  name: ${autoscalerID}
  namespace: ${uniqueId}
spec:
  autoscalingPolicy:
    cooldownPeriod: 90
    cpuUtilization:
      target: 0.5
    maxReplicas: 6
    minReplicas: 2
  projectRef:
    external: ${projectId}
  resourceID: ${autoscalerID}
  targetRef:
    name: ${instanceGroupManagerID}
  zone: us-central1-a
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  creationTimestamp: "1970-01-01T00:00:00Z"
  observedGeneration: 3
  selfLink: https://www.googleapis.com/compute/v1/projects/${projectId}/zones/us-central1-a/autoscalers/${autoscalerID}
