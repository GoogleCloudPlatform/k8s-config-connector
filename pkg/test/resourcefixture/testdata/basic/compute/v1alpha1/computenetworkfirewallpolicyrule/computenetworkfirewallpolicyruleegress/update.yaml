apiVersion: compute.cnrm.cloud.google.com/v1alpha1
kind: ComputeNetworkFirewallPolicyRule
metadata:
  name: nfpr-egress-${uniqueId}
spec:
  projectRef:
    external: projects/${projectId}
  action: "deny"
  description: "An egress Firewall Policy Rule"
  direction: "EGRESS"
  disabled: false
  enableLogging: false
  firewallPolicyRef:
    name: nfp-${uniqueId}
  match:
    layer4Configs:
    - ipProtocol: "tcp"
    destIpRanges:
    - "10.100.0.1/32"
    - "172.20.0.0/16"
    destNetworkContext: "NON_INTERNET"
  targetServiceAccountRefs:
  - name: "gsa-2-${uniqueId}"
  resourceID: "1001"
