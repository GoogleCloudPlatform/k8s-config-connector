apiVersion: datamigration.cnrm.cloud.google.com/v1alpha1
kind: DatabaseMigrationConversionWorkspace
metadata:
  name: db-mw-min-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  source:
    engine: MYSQL
    version: "5.7"
  destination:
    engine: POSTGRESQL
    version: "14"
