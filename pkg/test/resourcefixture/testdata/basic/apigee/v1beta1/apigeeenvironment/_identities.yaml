- caisURL: //cloudresourcemanager.googleapis.com/projects/${TEST_DEPENDENT_ORG_PROJECT_ID}
  group: resourcemanager.cnrm.cloud.google.com
  kind: Project
  name: project-${uniqueId}
  namespace: ${uniqueId}
  version: v1beta1
- caisURL: //serviceusage.googleapis.com/projects/${TEST_DEPENDENT_ORG_PROJECT_ID}/services/apigee.googleapis.com
  group: serviceusage.cnrm.cloud.google.com
  kind: Service
  name: apigee.googleapis.com
  namespace: ${uniqueId}
  version: v1beta1
- caisURL: //compute.googleapis.com/projects/${projectId}/global/networks/default
  group: compute.cnrm.cloud.google.com
  kind: ComputeNetwork
  name: default
  namespace: ${uniqueId}
  version: v1beta1
- caisURL: unknown
  group: apigee.cnrm.cloud.google.com
  kind: ApigeeOrganization
  name: apigeeorganization-${uniqueId}
  namespace: ${uniqueId}
  version: v1beta1
- caisURL: unknown
  group: apigee.cnrm.cloud.google.com
  kind: ApigeeEnvironment
  name: apgenv-${uniqueId}
  namespace: ${uniqueId}
  version: v1beta1
