apiVersion: networksecurity.cnrm.cloud.google.com/v1alpha1
kind: NetworkSecurityMirroringDeployment
metadata:
  name: mirroringdep-${uniqueId}
spec:
  projectRef:
    external: "projects/${projectId}"
  location: us-central1
  forwardingRuleRef:
    external: "projects/${projectId}/regions/us-central1/forwardingRules/my-fr-${uniqueId}"
  mirroringDeploymentGroupRef:
    external: "projects/${projectId}/locations/global/mirroringDeploymentGroups/my-dg-${uniqueId}"
