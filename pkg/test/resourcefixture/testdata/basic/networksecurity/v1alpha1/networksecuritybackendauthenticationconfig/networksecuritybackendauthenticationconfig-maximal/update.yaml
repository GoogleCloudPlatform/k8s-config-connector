apiVersion: networksecurity.cnrm.cloud.google.com/v1alpha1
kind: NetworkSecurityBackendAuthenticationConfig
metadata:
  name: nsbackendauth-max-${uniqueId}
spec:
  projectRef:
    external: "projects/${projectId}"
  location: global
  description: Updated Maximal Backend Authentication Config
  labels:
    key-one: value-two
  wellKnownRoots: PUBLIC_ROOTS
  clientCertificateRef:
    external: "projects/${projectId}/locations/global/certificates/my-cert-two"
  trustConfigRef:
    external: "projects/${projectId}/locations/global/trustConfigs/my-trustconfig-two"
