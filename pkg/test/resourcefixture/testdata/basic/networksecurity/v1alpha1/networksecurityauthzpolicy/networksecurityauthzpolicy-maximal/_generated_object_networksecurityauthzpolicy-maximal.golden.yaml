apiVersion: networksecurity.cnrm.cloud.google.com/v1alpha1
kind: NetworkSecurityAuthzPolicy
metadata:
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
    gcp-label: updated-value
  name: authzpolicy-max-${uniqueId}
  namespace: ${uniqueId}
spec:
  action: ALLOW
  description: Updated test authorization policy
  httpRules:
  - from:
      sources:
      - ipBlocks:
        - length: 24
          prefix: 10.0.0.0
        principals:
        - principal:
            exact: spiffe://myproject.svc.id.goog/ns/default/sa/mysa
          principalSelector: CLIENT_CERT_URI_SAN
    to:
      operations:
      - hosts:
        - exact: example.com
          ignoreCase: true
        methods:
        - GET
        - POST
        paths:
        - prefix: /v2
    when: request.time < timestamp('2026-12-31T23:59:59Z')
  location: us-central1
  policyProfile: REQUEST_AUTHZ
  projectRef:
    external: projects/${projectId}
  target:
    loadBalancingScheme: INTERNAL_MANAGED
    resources:
    - external: projects/${projectId}/regions/us-central1/forwardingRules/non-existent-rule
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  externalRef: projects/${projectId}/locations/us-central1/authzPolicies/authzpolicy-max-${uniqueId}
  observedGeneration: 2
  observedState:
    createTime: "1970-01-01T00:00:00Z"
    updateTime: "1970-01-01T00:00:00Z"
