apiVersion: networksecurity.cnrm.cloud.google.com/v1beta1
kind: NetworkSecurityFirewallEndpointAssociation
metadata:
  name: nsfirewallendpointassoc-full-${uniqueId}
spec:
  location: us-central1
  firewallEndpointRef:
    name: nsfirewallendpoint-${uniqueId}
  networkRef:
    name: network-${uniqueId}
  projectRef:
    external: ${projectId}
  disabled: false
  labels:
    key1: updated-value1
  tlsInspectionPolicyRef:
    external: projects/${projectId}/locations/us-central1/tlsInspectionPolicies/test-policy
