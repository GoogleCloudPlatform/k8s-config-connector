apiVersion: networksecurity.cnrm.cloud.google.com/v1beta1
kind: NetworkSecurityGatewaySecurityPolicyRule
metadata:
  name: gatewaysecuritypolicyrule-${uniqueId}
spec:
  gatewaySecurityPolicyRef:
    name: gatewaysecuritypolicy-${uniqueId}
  location: us-central1
  basicProfile: ALLOW
  enabled: true
  priority: 100
  sessionMatcher: "inIpRange(source.ip, '10.0.0.0/8')"
  description: "A sample rule"
