apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: netapp-sa-${uniqueId}
spec:
  displayName: NetApp Test SA
---
apiVersion: netapp.cnrm.cloud.google.com/v1alpha1
kind: NetAppBackupPolicy
metadata:
  name: netappbackuppolicy-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-west2
  dailyBackupLimit: 2
