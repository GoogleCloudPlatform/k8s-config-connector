apiVersion: beyondcorp.cnrm.cloud.google.com/v1alpha1
kind: BeyondCorpClientConnectorService
metadata:
  name: clientconnectorservice-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  resourceID: clientconnectorservice-${uniqueId}
  displayName: "Updated Client Connector Service"
  ingress:
    config:
      transportProtocol: TCP
      destinationRoutes:
        - address: 10.0.2.0
          netmask: 255.255.255.0
  egress:
    peeredVPC:
      networkVPC: projects/${projectId}/global/networks/default
