apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
    cnrm.cloud.google.com/project-id: ${projectId}
    cnrm.cloud.google.com/management-conflict-prevention-policy: "none"
    cnrm.cloud.google.com/deletion-policy: "abandon"
  name: computenetwork-${uniqueId}
spec:
  resourceID: default
  description: Default network for the project
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
    cnrm.cloud.google.com/project-id: ${projectId}
    cnrm.cloud.google.com/management-conflict-prevention-policy: "none"
    cnrm.cloud.google.com/deletion-policy: "abandon"
  name: computesubnetwork-${uniqueId}
spec:
  resourceID: default
  ipCidrRange: 10.128.0.0/20
  region: us-central1
  networkRef:
    name: computenetwork-${uniqueId}
---
apiVersion: colab.cnrm.cloud.google.com/v1alpha1
kind: ColabRuntimeTemplate
metadata:
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "0"
  name: colabruntimetemplate-${uniqueId}
spec:
  projectRef:
    external: "${projectId}"
  location: us-central1
  displayName: "test-${uniqueId}"
  machineSpec:
    machineType: e2-standard-2
  networkSpec:
    networkRef:
      name: computenetwork-${uniqueId}
    subnetworkRef:
      name: computesubnetwork-${uniqueId}
---
apiVersion: colab.cnrm.cloud.google.com/v1alpha1
kind: ColabRuntime
metadata:
  name: colabruntime-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  displayName: "colabruntime ${uniqueId}"
  runtimeUser: test@configconnector.com
  colabRuntimeTemplateRef:
    name: colabruntimetemplate-${uniqueId}
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: sa-${uniqueId}
spec:
  displayName: "Test SA ${uniqueId}"
