apiVersion: assuredworkloads.cnrm.cloud.google.com/v1alpha1
kind: AssuredWorkloadsWorkload
metadata:
  name: assuredworkloadsworkload-${uniqueId}
spec:
  organizationRef:
    external: "organizations/123456789012"
  location: "us-central1"
  displayName: "Test Workload ${uniqueId}"
  complianceRegime: "FEDRAMP_MODERATE"
  billingAccountRef:
    external: "billingAccounts/000000-000000-000000"
  enableSovereignControls: true
  partner: "PARTNER_UNSPECIFIED"
  labels:
    label-one: "value-one"
  resourceSettings:
  - resourceID: "my-custom-project"
    resourceType: "CONSUMER_PROJECT"
    displayName: "Custom Project"
