apiVersion: storage.cnrm.cloud.google.com/v1beta1
kind: StorageBucket
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: ${projectId}
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
    label-one: value-one
  name: storagebucket-sample-${uniqueId}
  namespace: ${uniqueId}
spec:
  iamConfiguration:
    publicAccessPrevention: enforced
    uniformBucketLevelAccess:
      enabled: true
  ipFilter:
    allowAllServiceAgentAccess: true
    allowCrossOrgVPCs: true
    mode: ENABLED
    publicNetworkSource:
      allowedIPRanges:
      - 1.1.1.1/32
      - 2.2.2.2/32
    vpcNetworkSources:
    - allowedIPRanges:
      - 10.0.0.0/24
      networkRef:
        name: ${networkID}
  location: us-central1
  storageClass: STANDARD
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  externalRef: projects/${projectId}/buckets/storagebucket-sample-${uniqueId}
  observedGeneration: 2
  observedState:
    softDeletePolicy:
      effectiveTime: "1970-01-01T00:00:00Z"
      retentionDurationSeconds: 604800
  selfLink: https://www.googleapis.com/storage/v1/b/storagebucket-sample-${uniqueId}
  url: gs://storagebucket-sample-${uniqueId}
