- caisURL: //compute.googleapis.com/projects/${projectId}/global/networks/default
  group: compute.cnrm.cloud.google.com
  kind: ComputeNetwork
  name: default
  namespace: ${uniqueId}
  version: v1beta1
- caisURL: //iam.googleapis.com/projects/${projectId}/serviceAccounts/gsa-${uniqueId}
  group: iam.cnrm.cloud.google.com
  kind: IAMServiceAccount
  name: gsa-${uniqueId}
  namespace: ${uniqueId}
  version: v1beta1
- caisURL: unknown
  group: datafusion.cnrm.cloud.google.com
  kind: DataFusionInstance
  name: dfi-${uniqueId}
  namespace: ${uniqueId}
  version: v1beta1
