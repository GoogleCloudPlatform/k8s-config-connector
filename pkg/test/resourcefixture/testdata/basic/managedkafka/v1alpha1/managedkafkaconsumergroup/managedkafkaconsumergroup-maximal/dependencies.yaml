apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: managedkafka-network-${uniqueId}
spec:
  routingMode: REGIONAL
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: managedkafka-subnet-${uniqueId}
spec:
  ipCidrRange: 10.0.0.0/24
  region: us-central1
  networkRef:
    name: managedkafka-network-${uniqueId}
---
apiVersion: managedkafka.cnrm.cloud.google.com/v1beta1
kind: ManagedKafkaCluster
metadata:
  name: managedkafkacluster-${uniqueId}
  annotations:
    cnrm.cloud.google.com/reconciler: direct
spec:
  location: us-central1
  projectRef:
    external: ${projectId}
  capacityConfig:
    vcpuCount: 3
    memoryBytes: 3221225472
  gcpConfig:
    accessConfig:
      networkConfigs:
      - subnetworkRef:
          name: managedkafka-subnet-${uniqueId}
---
apiVersion: managedkafka.cnrm.cloud.google.com/v1beta1
kind: ManagedKafkaTopic
metadata:
  name: mytopic-${uniqueId}
spec:
  location: us-central1
  projectRef:
    external: ${projectId}
  clusterRef:
    name: managedkafkacluster-${uniqueId}
  partitionCount: 1
  replicationFactor: 3
