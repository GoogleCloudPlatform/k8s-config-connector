apiVersion: billingbudgets.cnrm.cloud.google.com/v1beta1
kind: BillingBudgetsBudget
metadata:
  name: ${billingAccountBudgetId}
spec:
  amount:
    specifiedAmount:
      currencyCode: USD
      nanos: 0
      units: 9000000
  billingAccountRef:
    external: billingAccounts/${billingAccountId}
  budgetFilter:
    creditTypes:
    - FREE_TIER
    creditTypesTreatment: INCLUDE_SPECIFIED_CREDITS
    customPeriod:
      endDate:
        day: 15
        month: 4
        year: 2313
      startDate:
        day: 2
        month: 2
        year: 2141
  resourceID: billingAccounts/${billingAccountId}/budgets/${billingAccountBudgetId}