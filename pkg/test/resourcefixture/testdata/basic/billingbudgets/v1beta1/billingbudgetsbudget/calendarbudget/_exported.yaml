apiVersion: billingbudgets.cnrm.cloud.google.com/v1beta1
kind: BillingBudgetsBudget
metadata:
  name: ${billingAccountBudgetId}
spec:
  allUpdatesRule:
    disableDefaultIamRecipients: true
    monitoringNotificationChannels:
    - external: projects/${projectId}/notificationChannels/${notificationChannelID}
    pubsubTopicRef:
      external: projects/${projectId}/topics/pubsubtopic-2-${uniqueId}
    schemaVersion: "1.0"
  amount:
    specifiedAmount:
      currencyCode: USD
      nanos: 1
      units: 0
  billingAccountRef:
    external: billingAccounts/${billingAccountId}
  budgetFilter:
    calendarPeriod: YEAR
    creditTypesTreatment: EXCLUDE_ALL_CREDITS
    labels:
      label-one:
        values:
        - value-one
      label-two:
        values:
        - value-two
    projects:
    - external: projects/project-2-${uniqueId}
    services:
    - services/0245-C3C9-3864
  displayName: updated-sample-budget
  resourceID: billingAccounts/${billingAccountId}/budgets/${billingAccountBudgetId}
  thresholdRules:
  - spendBasis: FORECASTED_SPEND
    thresholdPercent: 0.6