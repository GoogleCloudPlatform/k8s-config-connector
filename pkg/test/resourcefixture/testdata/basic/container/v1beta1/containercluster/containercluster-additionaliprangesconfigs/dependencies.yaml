apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: computenetwork-${uniqueId}
spec:
  routingMode: REGIONAL
  autoCreateSubnetworks: false
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: computesubnetwork-${uniqueId}
spec:
  ipCidrRange: 10.2.0.0/16
  region: us-central1
  networkRef:
    name: computenetwork-${uniqueId}
  secondaryIpRange:
    - rangeName: pods
      ipCidrRange: 10.3.0.0/16
    - rangeName: services
      ipCidrRange: 10.4.0.0/16
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: computesubnetwork-extra-${uniqueId}
spec:
  ipCidrRange: 10.5.0.0/16
  region: us-central1
  networkRef:
    name: computenetwork-${uniqueId}
  secondaryIpRange:
    - rangeName: extra-pods
      ipCidrRange: 10.6.0.0/16
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: computesubnetwork-extra2-${uniqueId}
spec:
  ipCidrRange: 10.7.0.0/16
  region: us-central1
  networkRef:
    name: computenetwork-${uniqueId}
  secondaryIpRange:
    - rangeName: extra-pods-2
      ipCidrRange: 10.8.0.0/16
