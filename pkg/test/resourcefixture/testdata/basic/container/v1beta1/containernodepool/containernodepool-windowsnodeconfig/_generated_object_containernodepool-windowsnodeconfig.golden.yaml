apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 1
  labels:
    cnrm-test: "true"
    label-one: value-one
  name: nodepool-sample-${uniqueId}
  namespace: ${uniqueId}
spec:
  clusterRef:
    name: cluster-sample-${uniqueId}
  initialNodeCount: 1
  location: us-central1-a
  nodeConfig:
    imageType: WINDOWS_LTSC_CONTAINERD
    windowsNodeConfig:
      osVersion: OS_2022
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: 'Update call failed: error applying desired state: summary: error creating
      NodePool: googleapi: Error 400: Invalid value at ''node_pool.config.windows_node_config.os_version''
      (type.googleapis.com/google.container.v1beta1.WindowsNodeConfig.OSVersion),
      "OS_2022", invalid'
    reason: UpdateFailed
    status: "False"
    type: Ready
  observedGeneration: 1
