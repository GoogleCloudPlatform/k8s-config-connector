apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
    cnrm.cloud.google.com/state-into-spec: merge
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 3
  labels:
    cnrm-test: "true"
    label-one: value-one
  name: nodepool-sample-${uniqueId}
  namespace: ${uniqueId}
spec:
  autoscaling:
    maxNodeCount: 3
    minNodeCount: 2
  clusterRef:
    name: cluster-sample-${uniqueId}
  initialNodeCount: 1
  location: us-central1-a
  management:
    autoRepair: true
    autoUpgrade: true
  maxPodsPerNode: 110
  networkConfig:
    podIpv4CidrBlock: 10.92.0.0/14
    podRange: nodepool-sample-${uniqueId}-pods-12345678
    subnetworkRef:
      external: projects/${projectId}/regions/us-central1/subnetworks/default
  nodeConfig:
    confidentialNodes:
      confidentialInstanceType: SEV
      enabled: true
    diskSizeGb: 100
    diskType: pd-balanced
    imageType: COS_CONTAINERD
    loggingVariant: DEFAULT
    machineType: n2d-standard-2
    metadata:
      disable-legacy-endpoints: "true"
    oauthScopes:
    - https://www.googleapis.com/auth/devstorage.read_only
    - https://www.googleapis.com/auth/logging.write
    - https://www.googleapis.com/auth/monitoring
    - https://www.googleapis.com/auth/service.management.readonly
    - https://www.googleapis.com/auth/servicecontrol
    - https://www.googleapis.com/auth/trace.append
    resourceLabels:
      goog-gke-node-pool-provisioning-model: on-demand
    serviceAccountRef:
      external: default
    shieldedInstanceConfig:
      enableIntegrityMonitoring: true
    taint:
    - effect: NO_SCHEDULE
      key: originalKey
      value: originalValue
  nodeCount: 1
  resourceID: nodepool-sample-${uniqueId}
  upgradeSettings:
    maxSurge: 1
    strategy: SURGE
  version: 1.30.5-gke.1014001
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  instanceGroupUrls:
  - https://www.googleapis.com/compute/v1/projects/${projectId}/zones/us-central1-a/instanceGroupManagers/gke-containercluster-abcdef-nodepool-sample-${uniqueId}-grp
  managedInstanceGroupUrls:
  - https://www.googleapis.com/compute/v1beta1/projects/${projectId}/zones/us-central1-a/instanceGroups/gke-containercluster-abcdef-nodepool-sample-${uniqueId}-grp
  observedGeneration: 3
  observedState:
    version: 1.30.5-gke.1014001
