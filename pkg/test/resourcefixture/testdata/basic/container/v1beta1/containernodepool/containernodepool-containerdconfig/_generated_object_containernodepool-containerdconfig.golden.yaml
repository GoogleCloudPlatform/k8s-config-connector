apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/project-id: ${projectId}
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 3
  labels:
    cnrm-test: "true"
  name: nodepool-sample-${uniqueId}
  namespace: ${uniqueId}
spec:
  clusterRef:
    name: cluster-sample-${uniqueId}
  initialNodeCount: 1
  location: us-central1-a
  nodeConfig:
    containerdConfig:
      privateRegistryAccessConfig:
        certificateAuthorityDomainConfig:
        - fqdns:
          - example.com
          - sub.example.com
          gcpSecretManagerCertificateConfig:
            secretRef:
              external: projects/${projectId}/secrets/kcc-test-ca-cert/versions/2
        enabled: true
      registryHosts:
      - hosts:
        - ca:
          - secretRef:
              external: projects/${projectId}/secrets/kcc-test-ca-cert/versions/2
          client:
          - cert:
            - secretRef:
                external: projects/${projectId}/secrets/kcc-test-client-cert/versions/2
            key:
            - secretRef:
                external: projects/${projectId}/secrets/kcc-test-client-key/versions/2
          host: https://my-registry.example.com
        server: my-registry.example.com
      writableCgroups:
        enabled: true
    oauthScopes:
    - https://www.googleapis.com/auth/cloud-platform
  resourceID: nodepool-sample-${uniqueId}
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  instanceGroupUrls:
  - https://www.googleapis.com/compute/v1/projects/${projectId}/zones/us-central1-a/instanceGroupManagers/gke-containercluster-abcdef-nodepool-sample-${uniqueId}-grp
  managedInstanceGroupUrls:
  - https://www.googleapis.com/compute/v1beta1/projects/${projectId}/zones/us-central1-a/instanceGroups/gke-containercluster-abcdef-nodepool-sample-${uniqueId}-grp
  observedGeneration: 3
  observedState:
    version: 1.30.5-gke.1014001
