apiVersion: mapmanagement.cnrm.cloud.google.com/v1alpha1
kind: MapManagementMapConfig
metadata:
  name: map-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  displayName: "Maximal Map Config ${uniqueId}"
  description: "A comprehensive map configuration with map features configured"
  mapFeatures:
    simpleFeatures:
      - "FLATTEN_BUILDINGS"
      - "ICONIC_ICONS"
    poiBoostLevel: 1
  mapType: "VECTOR"
