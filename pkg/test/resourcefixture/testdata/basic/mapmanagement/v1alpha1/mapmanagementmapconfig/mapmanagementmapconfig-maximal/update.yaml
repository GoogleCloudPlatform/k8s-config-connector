apiVersion: mapmanagement.cnrm.cloud.google.com/v1alpha1
kind: MapManagementMapConfig
metadata:
  name: map-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  displayName: "Updated Maximal Map Config ${uniqueId}"
  description: "An updated comprehensive map configuration with updated features"
  mapFeatures:
    simpleFeatures:
      - "FLATTEN_BUILDINGS"
    poiBoostLevel: 2
  mapType: "VECTOR"
