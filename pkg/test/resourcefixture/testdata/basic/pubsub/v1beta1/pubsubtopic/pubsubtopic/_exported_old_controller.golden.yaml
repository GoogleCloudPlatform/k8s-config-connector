apiVersion: pubsub.cnrm.cloud.google.com/v1beta1
kind: PubSubTopic
metadata:
  name: pubsubtopic-sample-${uniqueId}
spec:
  messageRetentionDuration: 1h0m0s
  messageStoragePolicy:
    allowedPersistenceRegions:
    - us-central1
    enforceInTransit: false
  schemaSettings:
    encoding: JSON
    schemaRef:
      external: projects/${projectId}/schemas/pubsubschema-${uniqueId}