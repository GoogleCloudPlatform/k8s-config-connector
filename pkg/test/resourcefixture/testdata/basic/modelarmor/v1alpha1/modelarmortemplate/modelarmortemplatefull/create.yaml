apiVersion: modelarmor.cnrm.cloud.google.com/v1alpha1
kind: ModelArmorTemplate
metadata:
  labels:
    label-one: "value-one"
  name: modelarmortemplate-${uniqueId}
spec:
  projectRef:
    name: ${projectId}
  location: us-central1
  labels:
    spec-label-one: "value"
  filterConfig:
    raiSettings:
      raiFilters:
      - filterType: "filter-type"
        confidenceLevel: "high"
    sdpSettings:
      basicConfig:
        filterEnforcement: "enforced"
      advancedConfig:
        inspectTemplateRef:
          name: inspect-template
        deidentifyTemplateRef:
          name: deidentify-template
    piAndJailbreakFilterSettings:
      filterEnforcement: "enforced"
      confidenceLevel: "high"
    maliciousURIFilterSettings:
      filterEnforcement: "enforced"
  templateMetadata:
    ignorePartialInvocationFailures: true
    customPromptSafetyErrorCode: 400
    customPromptSafetyErrorMessage: "error"
    customLlmResponseSafetyErrorCode: 400
    customLlmResponseSafetyErrorMessage: "error"
    logTemplateOperations: true
    logSanitizeOperations: true
    enforcementType: "enforce"
    multiLanguageDetection:
      enableMultiLanguageDetection: true
