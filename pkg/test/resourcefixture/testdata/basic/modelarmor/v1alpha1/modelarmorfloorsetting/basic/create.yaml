apiVersion: modelarmor.cnrm.cloud.google.com/v1alpha1
kind: ModelArmorFloorSetting
metadata:
  name: modelarmorfloorsetting-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: "us-central1"
  filterConfig:
    raiSettings:
      raiFilters:
      - filterType: "HATE_SPEECH"
        confidenceLevel: "LOW_AND_ABOVE"
    sdpSettings:
      basicConfig:
        filterEnforcement: "ENABLED"
      advancedConfig:
        inspectTemplate: "projects/test-project/locations/us-central1/inspectTemplates/test-inspect-template"
        deidentifyTemplate: "projects/test-project/locations/us-central1/deidentifyTemplates/test-deidentify-template"
    piAndJailbreakFilterSettings:
      filterEnforcement: "ENABLED"
      confidenceLevel: "LOW_AND_ABOVE"
    maliciousURIFilterSettings:
      filterEnforcement: "ENABLED"
  enableFloorSettingEnforcement: true
  integratedServices:
  - "AI_PLATFORM"
  aiPlatformFloorSetting:
    inspectOnly: true
    inspectAndBlock: false
    enableCloudLogging: true
  floorSettingMetadata:
    multiLanguageDetection:
      enableMultiLanguageDetection: true
