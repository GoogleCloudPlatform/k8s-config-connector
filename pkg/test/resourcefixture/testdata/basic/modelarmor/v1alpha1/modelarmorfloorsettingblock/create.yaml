apiVersion: modelarmor.cnrm.cloud.google.com/v1alpha1
kind: ModelArmorFloorSetting
metadata:
  name: floor-setting-block
spec:
  projectRef:
    external: ${PROJECT_ID}
  location: us-central1
  resourceID: floorSetting
  filterConfig:
    piAndJailbreakFilterSettings:
      filterEnforcement: ENFORCED
      confidenceLevel: LOW
    raiSettings:
      raiFilters:
      - filterType: SEXUALLY_EXPLICIT
        confidenceLevel: LOW
    maliciousUriFilterSettings:
      filterEnforcement: ENFORCED
    sdpSettings:
      basicConfig:
        filterEnforcement: ENFORCED
  enableFloorSettingEnforcement: true
  integratedServices:
  - SERVICE_1
  aiPlatformFloorSetting:
    inspectAndBlock: true
    enableCloudLogging: true
  floorSettingMetadata:
    multiLanguageDetection:
      enableMultiLanguageDetection: true
