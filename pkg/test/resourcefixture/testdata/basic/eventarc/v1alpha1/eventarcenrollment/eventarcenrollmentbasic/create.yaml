apiVersion: eventarc.cnrm.cloud.google.com/v1alpha1
kind: EventarcEnrollment
metadata:
  name: eventarcenrollment-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: "us-central1"
  celMatch: "message.type == 'google.cloud.pubsub.topic.v1.messagePublished'"
  messageBusRef:
    name: eventarcmessagebus-${uniqueId}
  destinationRef:
    name: eventarcpipeline-${uniqueId}
