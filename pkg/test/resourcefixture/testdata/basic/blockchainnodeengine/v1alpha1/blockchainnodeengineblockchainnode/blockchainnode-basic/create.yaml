apiVersion: blockchainnodeengine.cnrm.cloud.google.com/v1alpha1
kind: BlockchainNodeEngineBlockchainNode
metadata:
  name: blockchainnode-${uniqueId}
spec:
  projectRef:
    external: ${projectId}
  location: us-central1
  blockchainType: ETHEREUM
  ethereumDetails:
    network: MAINNET
    nodeType: FULL
    executionClient: GETH
    consensusClient: LIGHTHOUSE
    apiEnableAdmin: false
    apiEnableDebug: false
    gethDetails:
      garbageCollectionMode: FULL
    validatorConfig:
      managedValidatorClient: false
      mevRelayURLs:
        - https://mev-relay.example.com
      beaconFeeRecipient: "0x0000000000000000000000000000000000000000"
  privateServiceConnectEnabled: false
