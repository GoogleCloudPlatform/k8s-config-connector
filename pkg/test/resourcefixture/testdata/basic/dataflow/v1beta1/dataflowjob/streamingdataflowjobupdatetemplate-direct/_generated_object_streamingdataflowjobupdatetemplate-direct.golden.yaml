apiVersion: dataflow.cnrm.cloud.google.com/v1beta1
kind: DataflowJob
metadata:
  annotations:
    alpha.cnrm.cloud.google.com/reconciler: direct
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/on-delete: cancel
    cnrm.cloud.google.com/project-id: ${projectId}
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 2
  labels:
    cnrm-test: "true"
    label-one: value-one
  name: dataflowjob-${uniqueId}
  namespace: ${uniqueId}
spec:
  additionalExperiments:
  - enable_stackdriver_agent_metrics
  enableStreamingEngine: true
  ipConfiguration: WORKER_IP_PUBLIC
  machineType: n1-standard-1
  maxWorkers: 3
  networkRef:
    name: default
  parameters:
    inputTopic: projects/${projectId}/topics/pubsubtopic-${uniqueId}
    outputTableSpec: ${projectId}:bigquerydataset${uniqueId}.bigquerytable${uniqueId}
  serviceAccountRef:
    name: gsa-${uniqueId}
  subnetworkRef:
    name: default
  tempGcsLocation: gs://storagebucket-${uniqueId}/tmp
  templateGcsPath: gs://dataflow-templates/2020-02-10-00_RC00/PubSub_to_BigQuery
  zone: us-central1-a
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: The resource is up to date
    reason: UpToDate
    status: "True"
    type: Ready
  jobId: ${jobID}
  observedGeneration: 2
  state: JOB_STATE_RUNNING
  type: JOB_TYPE_STREAMING
